<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relatório de Atendimento — APH</title>
<style>
  :root{
    --rubi-1:#8B0000; --rubi-2:#B22222; --rubi-3:#d82327;
    --gold:#E7C873; --bg:#0f0f12; --card:#14161a; --muted:#8a8f98; --text:#e7e9ee; --line:#23262d;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial; background:linear-gradient(180deg,#0b0c10,#0a0b0f); color:var(--text)}
  .topnav{position:sticky; top:0; z-index:1000; display:flex; gap:10px; align-items:center; justify-content:space-between; padding:10px 14px;
    background:linear-gradient(90deg,rgba(139,0,0,.90),rgba(216,35,39,.90)); border-bottom:1px solid rgba(231,200,115,.35); backdrop-filter:saturate(160%) blur(8px)}
  .btn{border:1px solid #2a2f37; background:linear-gradient(180deg,#151820,#0f1218); color:#fff; padding:8px 12px; border-radius:10px; font-weight:700; cursor:pointer; display:inline-flex; gap:8px; align-items:center}
  .btn.ghost{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.22)}
  .btn.primary{background:linear-gradient(135deg,var(--rubi-1),var(--rubi-3)); border-color:rgba(231,200,115,.45)}
  .wrap{max-width:900px; margin:16px auto; padding:0 16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px}
  .h{margin:0 0 8px; color:#fff}
  .muted{color:#cbd1db}
  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .chip{background:linear-gradient(180deg,#1d2026,#12151b); border:1px solid #2a2f37; padding:6px 10px; border-radius:999px; font-size:12px}
  .kv{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  @media (max-width:640px){ .kv{grid-template-columns:1fr} }
  @media print{ .topnav{display:none} body{background:#fff; color:#000} .card{box-shadow:none} }
</style>
</head>
<body>
  <nav class="topnav">
    <div class="left">
      <button class="btn ghost" id="btnVoltarLista">← Atendimentos</button>
      <button class="btn ghost" id="btnVoltarFicha">← Ficha do Aluno</button>
    </div>
    <div class="right">
      <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
    </div>
  </nav>

  <div class="wrap">
    <div class="card">
      <h2 class="h">Relatório de Atendimento — APH</h2>
      <div class="kv">
        <div><b>Aluno</b><div id="alunoNome" class="muted">—</div></div>
        <div><b>Turma</b><div id="alunoTurma" class="muted">—</div></div>
        <div><b>Data/Hora</b><div id="dt" class="muted">—</div></div>
        <div><b>Responsável</b><div id="resp" class="muted">—</div></div>
        <div><b>Local</b><div id="local" class="muted">—</div></div>
        <div><b>Horário</b><div id="hora" class="muted">—</div></div>
      </div>
    </div>

    <div class="card">
      <h3 class="h">Tipos de ocorrência</h3>
      <div id="tipos" class="chips"></div>
    </div>

    <div class="card">
      <h3 class="h">Materiais & Procedimentos</h3>
      <div id="materiais" class="chips"></div>
    </div>

    <div class="card">
      <h3 class="h">Comunicação</h3>
      <div class="kv">
        <div><b>Responsáveis informados?</b><div id="info" class="muted">—</div></div>
        <div><b>Meio</b><div id="meio" class="muted">—</div></div>
        <div style="grid-column:1/-1"><b>Encaminhamento</b><div id="enc" class="muted">—</div></div>
      </div>
    </div>

    <div class="card">
      <h3 class="h">Observações</h3>
      <div id="obs" class="muted">—</div>
    </div>
  </div>

<script>
  const qs=(s)=>document.querySelector(s);
  const params = new URLSearchParams(location.search);
  const aid = params.get('aid'); // atendimento id
  const alunoId = params.get('id');

  // navegação
  qs('#btnVoltarLista').addEventListener('click', ()=>{
    const q = alunoId ? `?id=${encodeURIComponent(alunoId)}` : '';
    location.href = '/aph-atendimentos.html' + q;
  });
  qs('#btnVoltarFicha').addEventListener('click', ()=>{
    const q = alunoId ? `?id=${encodeURIComponent(alunoId)}` : '';
    location.href = '/ficha-aluno.html' + q;
  });

  function chips(el, arr){
    el.innerHTML = (arr && arr.length) ? arr.map(x=>`<span class="chip">${x}</span>`).join('') : '<span class="muted">—</span>';
  }

  async function fetchAluno(){
    if(!alunoId) return;
    try{
      const r = await fetch(`/api/ficha/dados/${alunoId}`, {credentials:'include', cache:'no-store'});
      if(r.ok){
        const { aluno } = await r.json();
        qs('#alunoNome').textContent = aluno?.nome || '—';
        qs('#alunoTurma').textContent = aluno?.turma || '—';
      }
    }catch{}
  }
  async function fetchAtendimento(){
    if(!aid){ alert('ID do atendimento ausente'); return; }
    try{
      const r = await fetch(`/api/aph/atendimento/${aid}`, {credentials:'include'});
      if(!r.ok) throw new Error('Atendimento não encontrado');
      const it = await r.json();
      qs('#dt').textContent   = new Date(it.createdAt || it.data).toLocaleString('pt-BR');
      qs('#resp').textContent = it.responsavel || '—';
      qs('#local').textContent= it.local || '—';
      qs('#hora').textContent = it.hora || '—';
      chips(qs('#tipos'), it.tipos||[]);
      chips(qs('#materiais'), it.materiais||[]);
      qs('#info').textContent = it.responsaveisInformados || '—';
      qs('#meio').textContent = it.meioComunicacao || '—';
      qs('#enc').textContent  = it.encaminhamento || '—';
      qs('#obs').textContent  = it.observacoes || '—';
    }catch(e){ alert(e.message||'Falha ao carregar'); }
  }

  (async function init(){
    await fetchAluno();
    await fetchAtendimento();
  })();
</script>
</body>
</html>
