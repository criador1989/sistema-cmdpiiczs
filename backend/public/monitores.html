<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-store" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alunos Monitores – Painel</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192x192.png">
<meta name="theme-color" content="#071626">

<style>
  :root{
    --bg-0:#071626;
    --bg-1:#081b33;
    --glass:#111f35;
    --glass-soft:rgba(15,34,64,.92);
    --stroke:rgba(255,255,255,.15);
    --txt:#e4eeff;
    --muted:#b4c7e7;
    --accent:#3b82f6;
    --ok:#22c55e;
    --warn:#fbbf24;
    --err:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter,system-ui,Segoe UI,Roboto,Arial;
    color:var(--txt);
    background:radial-gradient(circle at top,#10274a 0,#050a16 55%,#020617 100%);
    min-height:100vh;
  }
  .page{
    padding:20px;
    min-height:100vh;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }
  h1{
    margin:0;
    font-size:24px;
  }
  .top-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  button,
  .btn{
    border-radius:999px;
    border:1px solid var(--stroke);
    padding:10px 16px;
    background:linear-gradient(135deg,rgba(15,40,80,.9),rgba(11,28,60,.95));
    color:var(--txt);
    cursor:pointer;
    font-size:14px;
    display:inline-flex;
    gap:8px;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,.45);
    transition:.18s;
  }
  button:hover,
  .btn:hover{
    transform:translateY(-1px);
    background:linear-gradient(135deg,#1d3b72,#152a53);
  }
  main{
    display:grid;
    grid-template-columns: minmax(0,1.1fr) minmax(0,0.9fr);
    gap:18px;
  }
  @media(max-width:980px){
    main{grid-template-columns:1fr}
  }
  .card{
    background:radial-gradient(circle at top left,rgba(83,129,255,.14),transparent 55%),
               linear-gradient(180deg,rgba(9,21,46,.97),rgba(6,16,34,.98));
    border-radius:18px;
    border:1px solid var(--stroke);
    padding:14px 16px 16px;
    box-shadow:0 18px 40px rgba(0,0,0,.7);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle at top,rgba(148,163,253,.18),transparent 60%);
    opacity:.35;
    pointer-events:none;
  }
  .card-inner{position:relative; z-index:1;}

  h2{
    margin:0 0 8px;
    font-size:18px;
  }

  /* --- Coluna Monitores --- */
  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .filters input,
  .filters select{
    border-radius:999px;
    border:1px solid var(--stroke);
    background:rgba(4,15,32,.96);
    color:var(--txt);
    padding:8px 12px;
    font-size:13px;
    outline:none;
  }
  .filters input::placeholder{color:var(--muted);}
  .filters select{min-width:120px;}

  .quick-btns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:10px 0;
  }
  .pill{
    border-radius:999px;
    border:1px solid var(--stroke);
    padding:6px 10px;
    font-size:13px;
    display:inline-flex;
    gap:6px;
    align-items:center;
    background:rgba(7,18,40,.92);
  }
  .pill span.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    display:inline-block;
  }
  .pill.presenca span.dot{background:var(--ok);}
  .pill.ausencia span.dot{background:var(--err);}
  .pill.fj span.dot{background:var(--warn);}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  thead th{
    text-align:left;
    padding:8px 4px;
    border-bottom:1px solid rgba(148,163,184,.4);
    color:#dbeafe;
    font-weight:600;
  }
  tbody td{
    padding:8px 4px;
    border-bottom:1px dashed rgba(148,163,184,.25);
  }
  tbody tr:hover{
    background:rgba(15,23,42,.8);
  }
  .tag-status{
    border-radius:999px;
    padding:2px 8px;
    font-size:11px;
    border:1px solid var(--stroke);
  }
  .tag-status.ativo{
    background:rgba(34,197,94,.1);
    border-color:rgba(34,197,94,.55);
    color:#bbf7d0;
  }
  .tag-status.inativo{
    background:rgba(148,163,184,.05);
    color:#e5e7eb;
  }

  /* --- Agenda / Calendário --- */
  .calendar-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .cal-nav{
    display:flex;
    gap:6px;
  }
  .cal-nav button{
    border-radius:999px;
    width:32px;
    height:32px;
    padding:0;
    justify-content:center;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
    margin-top:10px;
  }
  .dow{
    text-align:center;
    font-size:11px;
    color:var(--muted);
  }
  .day{
    height:40px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.3);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:13px;
    background:rgba(8,25,54,.9);
    position:relative;
  }
  .day.out{opacity:.25;}
  .day.today{
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(59,130,246,.5);
  }
  .day.has-event::after{
    content:"";
    position:absolute;
    bottom:5px;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--accent);
  }
  .day.selected{
    background:linear-gradient(135deg,#1d4ed8,#1e293b);
    border-color:#60a5fa;
  }
  .next-list{
    margin-top:12px;
    font-size:13px;
  }
  .next-item{
    padding:6px 8px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.35);
    background:rgba(8,20,45,.95);
    margin-top:4px;
  }

  /* --- MODAL: Novo Monitor --- */
  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.88);            /* bem mais escuro */
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:90;
  }
  .modal-hidden{display:none;}
  .modal-panel{
    width:min(820px,95vw);
    max-height:90vh;
    background:linear-gradient(145deg,#050d1f,#07162b 40%,#020617 100%);
    border-radius:22px;
    border:1px solid rgba(148,163,184,.55);
    box-shadow:0 30px 80px rgba(0,0,0,.9);
    padding:16px 18px 18px;
    color:var(--txt);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .modal-title{
    font-size:18px;
    font-weight:600;
  }
  .modal-body{
    overflow:auto;
    padding-right:4px;
  }
  .modal-grid{
    display:grid;
    grid-template-columns:1.1fr 1.1fr;
    gap:10px;
  }
  @media(max-width:720px){
    .modal-grid{grid-template-columns:1fr}
  }
  .modal-field{
    background:rgba(3,12,32,.98);        /* fundo quase sólido */
    border-radius:14px;
    border:1px solid rgba(148,163,184,.65);
    padding:6px 10px 4px;
  }
  .modal-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:#9ca3af;
    margin-bottom:2px;
  }
  .modal-field input,
  .modal-field select,
  .modal-field textarea{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#f9fafb;                        /* texto bem claro */
    font-size:14px;
    padding:4px 0 6px;
  }
  .modal-field select option{
    background:#020617;
    color:#e5e7eb;
  }
  .modal-field input::placeholder,
  .modal-field textarea::placeholder{
    color:#9ca3af;
  }
  .modal-field:focus-within{
    border-color:#60a5fa;
    box-shadow:0 0 0 1px rgba(96,165,250,.7);
  }
  .modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:10px;
  }
  .btn-secondary{
    background:rgba(15,23,42,.9);
    border-color:rgba(148,163,184,.6);
  }

</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Alunos Monitores – <span style="font-weight:600;">Painel</span></h1>
    <div class="top-actions">
      <button onclick="location.href='painel.html'">⟵ Voltar ao Painel</button>
      <button onclick="abrirNovoMonitor()">＋ Novo Monitor</button>
      <button onclick="abrirNovaAtividade()">📅 Nova Atividade</button>
      <button onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
  </header>

  <main>
    <!-- COLUNA ESQUERDA -->
    <section class="card">
      <div class="card-inner">
        <h2>Monitores</h2>

        <div class="filters">
          <input id="f-busca" placeholder="Buscar por nome, matrícula, e-mail…" />
          <select id="f-ativo">
            <option value="">Ativo/Inativo</option>
            <option value="true">Somente ativos</option>
            <option value="false">Somente inativos</option>
          </select>
          <select id="f-turno">
            <option value="">Turno</option>
            <option value="manhã">Manhã</option>
            <option value="tarde">Tarde</option>
            <option value="noite">Noite</option>
            <option value="integral">Integral</option>
          </select>
        </div>

        <div class="quick-btns">
          <div class="pill presenca"><span class="dot"></span> Presença (hoje)</div>
          <div class="pill ausencia"><span class="dot"></span> Ausência (hoje)</div>
          <div class="pill fj"><span class="dot"></span> Falta Justificada (hoje)</div>
        </div>

        <div style="overflow:auto; max-height:55vh;">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Turno</th>
                <th>Status</th>
                <th>Score</th>
                <th style="text-align:right;">Ações</th>
              </tr>
            </thead>
            <tbody id="tb-monitores">
              <tr><td colspan="5" style="opacity:.7;">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- COLUNA DIREITA -->
    <section class="card">
      <div class="card-inner">
        <div class="calendar-head">
          <h2>Agenda de Atividades</h2>
          <div class="cal-nav">
            <button onclick="navMonth(-1)">‹</button>
            <button onclick="navMonth(+1)">›</button>
          </div>
        </div>
        <div id="cal-mes" style="font-size:14px; color:var(--muted); margin-bottom:4px;"></div>

        <div class="calendar-grid" id="calendar">
          <!-- preenchido via JS -->
        </div>

        <div class="next-list">
          <div style="font-weight:600;">Próximas</div>
          <div id="lista-proximas" style="margin-top:4px; color:var(--muted);">
            Carregando…
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- MODAL NOVO MONITOR -->
<div id="modal-monitor" class="modal-backdrop modal-hidden" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-monitor-titulo">
    <div class="modal-header">
      <div class="modal-title" id="modal-monitor-titulo">Novo Monitor</div>
      <button class="btn-secondary" onclick="fecharModalMonitor()">✕</button>
    </div>

    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-field">
          <div class="modal-label">Nome *</div>
          <input id="m-nome" placeholder="Nome completo" />
        </div>
        <div class="modal-field">
          <div class="modal-label">Telefone</div>
          <input id="m-telefone" placeholder="(xx) xxxxx-xxxx" />
        </div>

        <div class="modal-field">
          <div class="modal-label">Matrícula</div>
          <input id="m-matricula" placeholder="Opcional" />
        </div>
        <div class="modal-field">
          <div class="modal-label">E-mail</div>
          <input id="m-email" placeholder="email@exemplo.com" />
        </div>

        <div class="modal-field">
          <div class="modal-label">Turno</div>
          <select id="m-turno">
            <option value="manhã">manhã</option>
            <option value="tarde">tarde</option>
            <option value="noite">noite</option>
            <option value="integral">integral</option>
          </select>
        </div>
        <div class="modal-field">
          <div class="modal-label">Status</div>
          <select id="m-ativo">
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>
      </div>

      <div class="modal-field" style="margin-top:10px;">
        <div class="modal-label">Observação geral (opcional)</div>
        <textarea id="m-obs" rows="3" placeholder="Ex.: Função, responsabilidades, observações importantes…"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="fecharModalMonitor()">Cancelar</button>
      <button onclick="salvarNovoMonitor()">Salvar</button>
    </div>
  </div>
</div>

<script>
  const API_MONITORES = '/api/monitores';

  /* ===== LISTA DE MONITORES ===== */
  async function carregarMonitores(){
    const q = document.getElementById('f-busca').value.trim();
    const ativo = document.getElementById('f-ativo').value;
    const turno = document.getElementById('f-turno').value;

    const params = new URLSearchParams();
    if(q) params.append('q', q);
    if(ativo) params.append('ativo', ativo);
    if(turno) params.append('turno', turno);

    const url = `${API_MONITORES}?${params.toString()}`;
    const tb = document.getElementById('tb-monitores');
    tb.innerHTML = `<tr><td colspan="5" style="opacity:.7;">Carregando…</td></tr>`;

    try{
      const r = await fetch(url, { credentials:'include' });
      if(!r.ok){
        if(r.status === 403) {
          tb.innerHTML = `<tr><td colspan="5" style="opacity:.8;">Acesso restrito ao administrador.</td></tr>`;
          return;
        }
        throw new Error('Erro ao listar monitores');
      }
      const lista = await r.json();
      if(!Array.isArray(lista) || !lista.length){
        tb.innerHTML = `<tr><td colspan="5" style="opacity:.7;">Nenhum monitor encontrado.</td></tr>`;
        return;
      }
      tb.innerHTML = lista.map(m => {
        const status = m.ativo ? 'Ativo' : 'Inativo';
        const cls = m.ativo ? 'ativo' : 'inativo';
        const turno = m.turno || '—';
        const score = typeof m.score === 'number' ? m.score : 0;
        return `
          <tr>
            <td>${m.nome || '—'}</td>
            <td>${turno}</td>
            <td><span class="tag-status ${cls}">${status}</span></td>
            <td>${score}</td>
            <td style="text-align:right;">
              <button style="padding:4px 10px;font-size:12px;" onclick="abrirFicha('${m._id}')">Ficha</button>
            </td>
          </tr>`;
      }).join('');
    }catch(e){
      console.error(e);
      tb.innerHTML = `<tr><td colspan="5" style="opacity:.7;">Falha ao carregar monitores.</td></tr>`;
    }
  }

  function abrirFicha(id){
    if(!id) return;
    location.href = `/monitor-ficha.html?id=${encodeURIComponent(id)}`;
  }

  document.getElementById('f-busca').addEventListener('input', () => {
    clearTimeout(window._monTimer);
    window._monTimer = setTimeout(carregarMonitores, 400);
  });
  document.getElementById('f-ativo').addEventListener('change', carregarMonitores);
  document.getElementById('f-turno').addEventListener('change', carregarMonitores);

  /* ===== MODAL NOVO MONITOR ===== */
  function abrirNovoMonitor(){
    document.getElementById('m-nome').value = '';
    document.getElementById('m-telefone').value = '';
    document.getElementById('m-matricula').value = '';
    document.getElementById('m-email').value = '';
    document.getElementById('m-turno').value = 'manhã';
    document.getElementById('m-ativo').value = 'true';
    document.getElementById('m-obs').value = '';

    const modal = document.getElementById('modal-monitor');
    modal.classList.remove('modal-hidden');
    modal.setAttribute('aria-hidden','false');
  }
  function fecharModalMonitor(){
    const modal = document.getElementById('modal-monitor');
    modal.classList.add('modal-hidden');
    modal.setAttribute('aria-hidden','true');
  }

  async function salvarNovoMonitor(){
    const nome = document.getElementById('m-nome').value.trim();
    if(!nome){
      alert('Informe o nome do monitor.');
      return;
    }
    const payload = {
      nome,
      telefone: document.getElementById('m-telefone').value.trim(),
      matricula: document.getElementById('m-matricula').value.trim(),
      email: document.getElementById('m-email').value.trim(),
      turno: document.getElementById('m-turno').value,
      ativo: document.getElementById('m-ativo').value === 'true',
      observacaoGeral: document.getElementById('m-obs').value.trim(),
    };
    try{
      const r = await fetch(API_MONITORES, {
        method:'POST',
        credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      if(!r.ok){
        if(r.status === 403){
          alert('Apenas administradores podem cadastrar monitores.');
        }else{
          const j = await r.json().catch(()=>null);
          alert(j?.erro || 'Falha ao criar monitor.');
        }
        return;
      }
      fecharModalMonitor();
      await carregarMonitores();
    }catch(e){
      console.error(e);
      alert('Erro ao comunicar com o servidor.');
    }
  }

  // fechar modal clicando fora
  document.getElementById('modal-monitor').addEventListener('click',(ev)=>{
    if(ev.target.id === 'modal-monitor') fecharModalMonitor();
  });

  /* ===== AGENDA / CALENDÁRIO ===== */
  let calDate = new Date();

  function formatMesAno(d){
    return d.toLocaleDateString('pt-BR',{month:'long', year:'numeric'});
  }

  async function renderCalendar(){
    const cal = document.getElementById('calendar');
    const label = document.getElementById('cal-mes');
    cal.innerHTML = '';
    label.textContent = formatMesAno(calDate);

    const base = new Date(calDate.getFullYear(), calDate.getMonth(), 1);
    const startDow = base.getDay(); // 0-dom
    const first = new Date(base);
    first.setDate(first.getDate() - ((startDow + 6) % 7)); // começar em segunda

    const cells = [];
    for(let i=0;i<42;i++){
      const d = new Date(first);
      d.setDate(first.getDate()+i);
      cells.push(d);
    }

    // pega atividades para mês
    const de = new Date(calDate.getFullYear(),calDate.getMonth(),1).toISOString();
    const ate= new Date(calDate.getFullYear(),calDate.getMonth()+1,0,23,59,59,999).toISOString();
    let eventos = [];
    try{
      const url = `/api/monitores/atividades?de=${encodeURIComponent(de)}&ate=${encodeURIComponent(ate)}`;
      const r = await fetch(url, { credentials:'include' });
      if(r.ok) eventos = await r.json();
    }catch(e){ console.log(e); }

    const hasEventByDay = new Set(
      eventos.map(ev => {
        const d = new Date(ev.inicio);
        return d.toISOString().slice(0,10);
      })
    );

    const todayIso = new Date().toISOString().slice(0,10);

    const dow = ['D','S','T','Q','Q','S','S'];
    dow.forEach(ch => {
      const div = document.createElement('div');
      div.className = 'dow';
      div.textContent = ch;
      cal.appendChild(div);
    });

    cells.forEach(d => {
      const div = document.createElement('div');
      div.className = 'day';
      const iso = d.toISOString().slice(0,10);

      if(d.getMonth() !== calDate.getMonth()) div.classList.add('out');
      if(iso === todayIso) div.classList.add('today');
      if(hasEventByDay.has(iso)) div.classList.add('has-event');

      div.textContent = d.getDate();
      cal.appendChild(div);
    });

    renderProximas(eventos);
  }

  function navMonth(delta){
    calDate.setMonth(calDate.getMonth()+delta);
    renderCalendar();
  }

  function renderProximas(eventos){
    const box = document.getElementById('lista-proximas');
    if(!Array.isArray(eventos) || !eventos.length){
      box.textContent = 'Sem atividades futuras.';
      return;
    }
    const futuros = eventos
      .map(ev => ({...ev, inicioDate:new Date(ev.inicio)}))
      .filter(ev => ev.inicioDate >= new Date())
      .sort((a,b)=>a.inicioDate-b.inicioDate)
      .slice(0,5);

    if(!futuros.length){
      box.textContent = 'Sem atividades futuras.';
      return;
    }
    box.innerHTML = futuros.map(ev=>{
      const d = ev.inicioDate.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="next-item"><strong>${ev.titulo||'Atividade'}</strong><br><span style="color:var(--muted);">${d}</span></div>`;
    }).join('');
  }

  function abrirNovaAtividade(){
    alert('Criação de atividade rápida pode ser adicionada depois; por enquanto use a agenda/ferramenta que preferir.');
  }

  // boot
  (function init(){
    carregarMonitores();
    renderCalendar();
  })();
</script>
</body>
</html>
