<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ficha do Aluno – Acesso dos Pais</title>
  <meta name="theme-color" content="#d82327" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial;background:#f6f7fb;color:#222}
    .wrap{max-width:900px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e6e6e6;border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.08);padding:16px}
    h1{font-size:20px;margin:0 0 10px}
    .muted{color:#6b7280}
    .kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .kv div{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px}
    .list{display:flex;flex-direction:column;gap:10px;margin-top:12px;max-height:60vh;overflow:auto}
    .notif{border:1px solid #eee;border-left:6px solid #b71c1c;border-radius:10px;padding:10px;background:#fff}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #e5e7eb;border-radius:999px;background:#f3f4f6;font-size:.8rem}
    .err{background:#fee2e2;border:1px solid #fecaca;color:#7f1d1d;border-radius:10px;padding:10px;margin-bottom:12px}
    .ok{background:#ecfdf5;border:1px solid #d1fae5;color:#065f46;border-radius:10px;padding:10px;margin-bottom:12px}
    @media (max-width:700px){.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="alert"></div>
    <div class="card">
      <h1 id="alunoNome">Ficha do Aluno</h1>
      <div class="muted" id="alunoTurma">—</div>
      <div class="kv" style="margin-top:10px">
        <div><b>Turma</b><div id="kvTurma" class="muted">—</div></div>
        <div><b>Entrada</b><div id="kvEntrada" class="muted">—</div></div>
        <div><b>Comportamento</b><div id="kvNota" class="muted">—</div></div>
        <div><b>Classificação</b><div id="kvClass" class="muted">—</div></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2 style="margin:0 0 8px">Notificações</h2>
      <div id="notificacoes" class="list"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const A = (id)=>document.getElementById(id);
    const fmt = d=> d ? new Date(d).toLocaleDateString('pt-BR') : '—';
    function classif(n){
      const x=Number(n); if(!isFinite(x)) return '—';
      if(x>=9.01) return 'Excepcional';
      if(x>=8.01) return 'Ótimo';
      if(x>=7.00) return 'Bom';
      if(x>=5.00) return 'Regular';
      if(x>=3.00) return 'Insuficiente';
      return 'Incompatível';
    }

    async function carregar(){
      if(!token){ A('alert').innerHTML='<div class="err">Token ausente.</div>'; return; }
      try{
        const r = await fetch(`/api/public/alunos/${encodeURIComponent(token)}`, { cache:'no-store' });
        const j = await r.json();
        if(!r.ok){
          A('alert').innerHTML = `<div class="err">${j.error||'Erro ao carregar.'}</div>`;
          return;
        }
        A('alert').innerHTML = '<div class="ok">Visualização somente leitura.</div>';

        const a = j.aluno||{};
        A('alunoNome').textContent = a.nome||'Ficha do Aluno';
        A('alunoTurma').textContent = `Turma ${a.turma||'—'}`;
        A('kvTurma').textContent = a.turma||'—';
        A('kvEntrada').textContent = fmt(a.dataEntrada);
        A('kvNota').textContent = (typeof a.comportamento==='number') ? a.comportamento.toFixed(2) : '—';
        A('kvClass').textContent = classif(a.comportamento);

        const list = j.notificacoes||[];
        const el = A('notificacoes');
        el.innerHTML = list.length ? list.map(n=>`
          <div class="notif">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
              <span class="chip">${n.tipo||n.tipoMedida||'Medida'}</span>
              <span class="muted">${fmt(n.data)}</span>
            </div>
            <div style="margin-top:6px"><b>Motivo:</b> ${n.motivo||'—'}</div>
            <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px">
              <div><b>Valor</b>: ${typeof n.valorNumerico==='number'?n.valorNumerico.toFixed(2):'—'}</div>
              <div><b>Status</b>: ${n.status||'—'}</div>
            </div>
          </div>
        `).join('') : '<div class="muted">Nenhuma notificação.</div>';
      }catch(e){
        A('alert').innerHTML = '<div class="err">Falha de conexão.</div>';
      }
    }
    carregar();
  </script>
</body>
</html>
