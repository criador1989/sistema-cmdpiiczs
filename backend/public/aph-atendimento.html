<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APH - Atendimento</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192x192.png">
<meta name="theme-color" content="#0A1322">
<style>
/* =====================================================
   TEMA GLASS AZUL-CLARO + BOKEH FIXO
   ===================================================== */
:root{
  --txt:#eaf1ff;
  --muted:#b7c4d8;
  --line:rgba(255,255,255,.25);
  --glass:rgba(255,255,255,.10);
  --glass-strong:rgba(255,255,255,.16);
  --accent:#5daeff;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  color:var(--txt);
  font-family:Inter,"Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  background:
    radial-gradient(900px 480px at -10% -10%, rgba(255,255,255,.18), transparent 60%),
    radial-gradient(900px 480px at 120% -10%, rgba(255,255,255,.14), transparent 60%),
    radial-gradient(800px 380px at 50% 90%, rgba(255,255,255,.10), transparent 70%),
    linear-gradient(180deg,#3c5878 0%,#203247 80%,#17283b 100%);
  background-attachment: fixed;
  background-blend-mode: screen, screen, normal;
  -webkit-font-smoothing:antialiased;
}

/* Topbar ------------------------------------------------- */
.topbar{
  position:sticky;top:0;z-index:10;
  background:rgba(28,42,65,.45);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(16px) saturate(150%);
  -webkit-backdrop-filter:blur(16px) saturate(150%);
}
.topbar .in{max-width:1080px;margin:0 auto;padding:14px 16px;display:flex;gap:10px;align-items:center}
.h1{margin-right:auto;font-weight:800;font-size:1.2rem;color:#f7fbff}
.btn{
  appearance:none;border:1px solid rgba(255,255,255,.28);
  background:var(--glass);color:#f3f7ff;
  padding:9px 14px;border-radius:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none;
  transition:.22s filter,.22s transform;
}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn.primary{
  background:linear-gradient(135deg, rgba(80,140,230,.35), rgba(70,130,210,.28));
  border-color:rgba(255,255,255,.36);
  box-shadow:0 8px 28px rgba(100,160,240,.28);
}

/* Page ---------------------------------------------------- */
.page{max-width:1080px;margin:22px auto;padding:0 16px;animation:fadeIn .35s ease-out both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Seções -------------------------------------------------- */
.section{
  margin-top:16px;background:var(--glass);
  border:1px solid var(--line);border-radius:var(--radius);
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
  box-shadow:0 10px 40px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.1);
  padding:18px;
}
.legend{font-weight:800;color:#ffffff;margin-bottom:10px;letter-spacing:.3px}

/* Grades -------------------------------------------------- */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:980px){.grid-3{grid-template-columns:1fr 1fr}}
@media (max-width:680px){.grid-3,.grid-2{grid-template-columns:1fr}}

label{font-weight:700;font-size:.95rem}
.input,select,textarea{
  width:100%;background:rgba(255,255,255,.06);
  color:#f2f6ff;border:1px solid rgba(255,255,255,.22);
  border-radius:12px;padding:10px;backdrop-filter:blur(8px);
}
textarea{resize:vertical;min-height:90px}
select option{background-color:rgba(25,40,60,.95);color:#f3f7ff}

/* Badges / row -------------------------------------------- */
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.28);
  background:var(--glass);font-weight:700
}
.muted{color:var(--muted)}
.right{margin-left:auto}

/* Cards de escolha ---------------------------------------- */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:980px){.cards{grid-template-columns:1fr}}

.cardChoice{
  position:relative;display:flex;align-items:flex-start;gap:12px;
  padding:12px;border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.20);
  transition:.2s border-color,.2s background,.2s filter;
  cursor:pointer;
}
.cardChoice:hover{filter:brightness(1.06)}
.cardChoice:has(input:checked){
  background:var(--glass-strong);
  border-color:rgba(255,255,255,.38);
  box-shadow:0 8px 28px rgba(100,160,240,.18) inset;
}
.cardChoice input[type="checkbox"]{
  position:absolute;opacity:0;inset:0;cursor:pointer;
}
.check{
  width:20px;height:20px;border-radius:6px;
  border:2px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.03);
  margin-top:2px;flex:0 0 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.cardChoice:has(input:checked) .check{
  border-color:var(--accent);
  background:linear-gradient(180deg, rgba(120,200,255,.85), rgba(90,160,235,.85));
  box-shadow:0 0 0 3px rgba(93,174,255,.25);
}
.icon{width:28px;height:28px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);flex:0 0 28px}
.ctitle{font-weight:700;color:#f4f7ff}
.cdesc{color:var(--muted);font-size:.92rem;margin-top:2px}

/* Ações ---------------------------------------------------- */
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.small{font-size:.88rem;color:var(--muted)}
.switch{display:inline-flex;align-items:center;gap:8px;user-select:none;cursor:pointer}
.switch input{width:18px;height:18px;accent-color:var(--accent)}

/* Toast ---------------------------------------------------- */
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.30);
  color:#ffffff;padding:10px 14px;border-radius:12px;
  box-shadow:0 12px 35px rgba(0,0,0,.35);z-index:9999;display:none;
  backdrop-filter:blur(10px);
}
.toast.ok{border-color:#4bd7b1}
.toast.err{border-color:#d14d4d}

/* Print ---------------------------------------------------- */
@media print{
  .topbar,.btn{display:none!important}
  body{background:#fff;color:#000}
  .section{background:#fff;color:#000;border-color:#999}
}
</style>
</head>
<body>
  <div class="topbar">
    <div class="in">
      <div class="h1" id="title">APH - Atendimento</div>
      <button class="btn" id="btnVoltar">← Ficha do Aluno</button>
      <a class="btn" href="/painel.html">🏠 Painel</a>
      <div class="right"></div>
      <button class="btn" id="btnLimpar">Limpar</button>
      <button class="btn primary" id="btnSalvar">Salvar</button>
      <button class="btn primary" id="btnEditar" style="display:none">✏️ Editar</button>
    </div>
  </div>

  <main class="page">
    <!-- Identificação & Contexto -->
    <section class="section">
      <div class="legend">Identificação & Contexto</div>
      <div class="grid-3">
        <div>
          <label>Responsável pelo registro</label>
          <input id="inpResp" class="input" placeholder="Nome do monitor/professor/bombeiro">
        </div>
        <div>
          <label>Local do ocorrido</label>
          <select id="inpLocal" class="input">
            <option value="">Selecione...</option>
            <option>Sala</option><option>Pátio</option><option>Quadra</option>
            <option>Corredor</option><option>Refeitório</option><option>Banheiro</option>
            <option>Entrada/Saída</option><option>Área externa</option><option>Outro</option>
          </select>
        </div>
        <div>
          <label>Horário aproximado</label>
          <input id="inpHora" type="time" class="input">
        </div>
      </div>
      <div class="row" style="margin-top:8px">
        <span class="badge">Aluno: <b id="alunoNome" style="margin-left:6px">—</b></span>
        <span class="badge">Turma: <b id="alunoTurma" style="margin-left:6px">—</b></span>
        <span class="right small"><input id="inpData" type="date" class="input" style="width:auto"></span>
      </div>
    </section>

    <!-- Tipo de Ocorrência -->
    <section class="section">
      <div class="legend">Tipo de Ocorrência</div>
      <div id="tiposBox" class="cards"></div>
    </section>

    <!-- Materiais & Procedimentos -->
    <section class="section">
      <div class="legend">Materiais & Procedimentos</div>
      <div id="materiaisBox" class="cards"></div>
      <div style="margin-top:12px">
        <label>Observações</label>
        <textarea id="inpObs" class="input" placeholder="Breve descrição e evolução imediata..."></textarea>
      </div>
    </section>

    <!-- Encaminhamento -->
    <section class="section">
      <div class="legend">Encaminhamento</div>
      <div class="row" style="margin-bottom:10px">
        <label class="switch">
          <input type="checkbox" id="chkEncaminhamento">
          <span>Houve encaminhamento</span>
        </label>
        <span class="muted">Marque se o aluno foi encaminhado (posto de saúde, hospital, etc.).</span>
      </div>
      <div>
        <label>Para onde / como foi encaminhado</label>
        <textarea id="txtEncaminhamento" class="input" placeholder="Ex.: Responsáveis acionados; aluno conduzido ao UPA; ..."></textarea>
      </div>
    </section>

    <!-- Comunicação -->
    <section class="section">
      <div class="legend">Comunicação</div>
      <div class="grid-2">
        <div>
          <label>Responsáveis informados?</label>
          <select id="selRespInf" class="input">
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
          </select>
        </div>
        <div>
          <label>Meio</label>
          <select id="selMeio" class="input">
            <option value="">—</option>
            <option value="Email">E-mail</option>
            <option value="Telegram">Telegram</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Telefone">Telefone</option>
            <option value="Agenda">Agenda</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="btnLimpar2">Limpar</button>
        <button class="btn primary" id="btnSalvar2">Salvar</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

<script>
/* ===== helpers / dados ===== */
const $ = (s)=>document.querySelector(s);
const params = new URLSearchParams(location.search);
let alunoId = params.get('alunoId') || params.get('id') || '';   // pode vir vazio e ser preenchido após carregar o doc
const atendimentoId = params.get('id');                          // id do atendimento (quando VER/EDITAR)
const modeParam = (params.get('mode') || '').toLowerCase();
let mode = atendimentoId ? (modeParam || 'view') : 'new';        // new | view | edit

const TIPOS = [
  { t:'Arranhão / escoriação', i:'🩹', d:'Limpeza e curativo simples.' },
  { t:'Corte leve',            i:'✂️', d:'Antisséptico + gaze/atadura.' },
  { t:'Queimadura',            i:'🔥', d:'Resfriamento local.' },
  { t:'Torção',                i:'🧊', d:'Gelo + repouso.' },
  { t:'Luxação',               i:'🦴', d:'Imobilização provisória.' },
  { t:'Fratura suspeita',      i:'🩻', d:'Imobilizar e encaminhar.' },
  { t:'Sangramento nasal',     i:'🩸', d:'Compressão suave.' },
  { t:'Queda',                 i:'⬇️', d:'Inspeção; gelo se preciso.' },
  { t:'Convulsão / crise epiléptica', i:'⚡', d:'Proteger cabeça; lateralizar.' },
  { t:'Ansiedade / pânico',    i:'🫱', d:'Ambiente calmo; respiração guiada.' },
  { t:'Gripe/febre/tosse (máscara)', i:'😷', d:'Máscara oferecida.' },
  { t:'Outro',                 i:'📝', d:'Especificar nas observações.' }
];

const MATERIAIS = [
  { t:'Curativo simples',  i:'🩹', d:'Bandagem, micropore, etc.' },
  { t:'Gaze / Atadura',    i:'🧻', d:'Compressão / fixação.' },
  { t:'Antisséptico',      i:'🧴', d:'Clorexidina / iodo.' },
  { t:'Bolsa de gelo',     i:'🧊', d:'Com proteção têxtil.' },
  { t:'Imobilização provisória', i:'🦴', d:'Até avaliação.' },
  { t:'Compressa morna/fria', i:'🧯', d:'Conforme orientação.' },
  { t:'Higienização',      i:'🧼', d:'Limpeza inicial.' },
  { t:'Hidratação',        i:'💧', d:'Água oferecida.' },
  { t:'Máscara fornecida', i:'😷', d:'Sintomas respiratórios.' },
  { t:'Apoio emocional',   i:'💬', d:'Acolhimento.' },
  { t:'Encaminhado ao hospital/posto', i:'🏥', d:'Registrado abaixo.' },
  { t:'Contato responsável', i:'📞', d:'Ver comunicação.' }
];

function toast(msg, type='ok'){
  const el = $('#toast');
  el.className = `toast ${type==='error'?'err':'ok'}`;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.display='none'; }, 2600);
}

/* Montagem dos cards com checkbox visível */
function cardList(container, items){
  container.innerHTML = items.map((o,idx)=>`
    <label class="cardChoice" data-idx="${idx}">
      <input type="checkbox" value="${o.t}">
      <span class="check" aria-hidden="true"></span>
      <span class="icon">${o.i||'•'}</span>
      <div>
        <div class="ctitle">${o.t}</div>
        <div class="cdesc">${o.d||''}</div>
      </div>
    </label>
  `).join('');
}
function selected(container){ return Array.from(container.querySelectorAll('input:checked')).map(i=>i.value); }
function setSelected(container, values = []){
  const set = new Set(values);
  container.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.checked = set.has(cb.value);
  });
}

/* fetch com timeout */
async function api(path, opts = {}){
  const ctl = new AbortController();
  const id = setTimeout(()=>ctl.abort(), opts.timeoutMs ?? 12000);
  try{
    const r = await fetch(`/api${path.startsWith('/')?path:`/${path}`}`, {
      credentials:'include',
      method: opts.method || 'GET',
      headers: { 'Content-Type':'application/json' },
      body: opts.body,
      signal: ctl.signal
    });
    const ct = r.headers.get('content-type')||'';
    const data = ct.includes('application/json') ? await r.json().catch(()=> ({})) : {};
    if (r.status === 401) { alert('Sessão expirada. Faça login.'); location.href='/login.html'; return Promise.reject(new Error('401')); }
    if(!r.ok) throw new Error(data.message || data.error || `Erro ${r.status}`);
    return data;
  } finally { clearTimeout(id); }
}

/* ===== Modo (view/edit/new) ===== */
function applyMode(){
  const isView = (mode === 'view');
  const isNew  = (mode === 'new');
  const isEdit = (mode === 'edit');

  // título e botões
  $('#title').textContent =
    isNew  ? 'APH - Novo Atendimento' :
    isEdit ? 'APH - Editar Atendimento' :
             'APH - Visualização do Atendimento';

  // Mostrar/ocultar botões
  $('#btnSalvar').style.display  = (isNew || isEdit) ? '' : 'none';
  $('#btnSalvar2').style.display = (isNew || isEdit) ? '' : 'none';
  $('#btnLimpar').style.display  = isNew ? '' : 'none';
  $('#btnLimpar2').style.display = isNew ? '' : 'none';
  $('#btnEditar').style.display  = isView ? '' : 'none';

  // Travar/destravar campos
  const disable = isView;
  document.querySelectorAll('input, select, textarea').forEach(el=>{
    // exceto botão-voltar e afins (já não são inputs)
    if (el.id !== 'btnVoltar') el.disabled = disable && el.id !== 'inpData'; // inpData também trava abaixo
  });
  // garantir que o date também trave no modo view
  $('#inpData').disabled = disable;

  // aparência do encaminhamento
  toggleEncaminhamento();
}

/* ===== aluno ===== */
async function carregarAluno(){
  if(!alunoId) return;
  const { aluno } = await api(`/ficha/dados/${alunoId}`);
  $('#alunoNome').textContent = aluno?.nome || '—';
  $('#alunoTurma').textContent = aluno?.turma || '—';
}

/* ===== carregar atendimento (quando id) ===== */
async function carregarAtendimento(){
  if (!atendimentoId) return;

  const at = await api(`/aph/atendimentos/${atendimentoId}`);
  // Pode vir alunoId do documento; se não tínhamos na URL, fixa aqui
  if (!alunoId && at?.alunoId) alunoId = String(at.alunoId);

  // Preenche campos
  $('#inpResp').value  = at.responsavel || '';
  $('#inpLocal').value = at.local || '';
  $('#inpHora').value  = (at.hora || '').slice(0,5);

  // data -> YYYY-MM-DD
  const d = at.data ? new Date(at.data) : null;
  $('#inpData').value = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : '';

  // checkboxes
  setSelected($('#tiposBox'), at.tipos || []);
  setSelected($('#materiaisBox'), at.materiais || []);

  $('#inpObs').value     = at.observacoes || at.observacao || '';
  $('#selRespInf').value = (at.responsaveisInformados === 'Sim') ? 'Sim' : 'Não';
  $('#selMeio').value    = at.meioComunicacao || '';
  $('#chkEncaminhamento').checked = !!(at.houveEncaminhamento || at.encaminhamento);
  $('#txtEncaminhamento').value   = at.encaminhamento || '';

  toggleEncaminhamento();

  // Carrega identificações do aluno
  await carregarAluno().catch(()=>{});
}

/* ===== controles de formulário ===== */
function limpar(){
  $('#inpResp').value=''; $('#inpLocal').value='';
  const now=new Date();
  $('#inpHora').value=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  $('#inpData').value=now.toISOString().slice(0,10);
  $('#inpObs').value='';
  $('#selRespInf').value='Não'; $('#selMeio').value='';
  $('#chkEncaminhamento').checked=false; toggleEncaminhamento();
  document.querySelectorAll('.cards input[type="checkbox"]').forEach(cb=>cb.checked=false);
}
function toggleEncaminhamento(){
  const on = $('#chkEncaminhamento').checked;
  const txt = $('#txtEncaminhamento');
  txt.disabled = !on || (mode==='view');
  txt.style.opacity = on ? '1' : '.65';
}

let saving=false;
function setSavingState(on){
  saving=on;
  ['#btnSalvar','#btnSalvar2','#btnLimpar','#btnLimpar2','#btnVoltar','#btnEditar'].forEach(sel=>{
    const b=$(sel); if(b) b.disabled=on;
  });
  const b1=$('#btnSalvar'), b2=$('#btnSalvar2');
  if(on){ if(b1) b1.textContent=(mode==='edit'?'Atualizando...':'Salvando...'); if(b2) b2.textContent=b1.textContent; }
  else { if(b1) b1.textContent=(mode==='edit'?'Atualizar':'Salvar'); if(b2) b2.textContent=b1.textContent; }
}

function payloadFromUI(){
  return {
    alunoId,
    data: $('#inpData').value || new Date().toISOString().slice(0,10),
    hora: $('#inpHora').value || '',
    local: ($('#inpLocal').value || '').trim() || '—',
    responsavel: ($('#inpResp').value || '').trim(),
    tipos: selected($('#tiposBox')),
    materiais: selected($('#materiaisBox')),
    sinaisESintomas: '',
    procedimentos: '',
    observacoes: ($('#inpObs').value || '').trim(),
    responsaveisInformados: $('#selRespInf').value === 'Sim' ? 'Sim' : 'Não',
    meioComunicacao: $('#selMeio').value || '',
    houveEncaminhamento: $('#chkEncaminhamento').checked,
    encaminhamento: ($('#txtEncaminhamento').value || '').trim()
  };
}

async function salvar(){
  if(saving) return;
  try{
    if(!alunoId) { toast('ID do aluno ausente.', 'error'); return; }
    setSavingState(true);
    const body = JSON.stringify(payloadFromUI());

    if (mode === 'edit' && atendimentoId){
      // PUT (atualizar)
      const resp = await api(`/aph/atendimentos/${atendimentoId}`, { method:'PUT', body, timeoutMs:12000 });
      if (resp?.ok){
        toast('Atendimento atualizado.', 'ok');
        setTimeout(()=>{
          location.href = `/aph-atendimentos.html?alunoId=${encodeURIComponent(alunoId)}`;
        }, 700);
      } else {
        toast('Atualização sem confirmação.', 'error');
      }
      return;
    }

    // POST (novo)
    const resp = await api('/aph/atendimentos', { method:'POST', body, timeoutMs:12000 });
    if (resp?.ok) {
      toast('Atendimento salvo com sucesso!', 'ok');
      setTimeout(()=>{ location.href = `/aph-atendimentos.html?alunoId=${encodeURIComponent(alunoId)}`; }, 700);
    } else {
      toast('Salvo, mas sem confirmação de comunicação.', 'ok');
      setTimeout(()=>{ location.href = `/aph-atendimentos.html?alunoId=${encodeURIComponent(alunoId)}`; }, 900);
    }
  } catch(e){
    console.error(e);
    toast(e.name==='AbortError'?'Tempo esgotado. Verifique a conexão.':(e.message||'Erro ao salvar.'),'error');
  } finally { setSavingState(false); }
}

function voltar(){
  if(alunoId) location.href = `/ficha-aluno.html?id=${encodeURIComponent(alunoId)}`;
  else history.back();
}

function goEdit(){
  const qp = new URLSearchParams(location.search);
  qp.set('mode','edit');
  // garante que alunoId continue na URL
  if (alunoId) qp.set('alunoId', alunoId);
  location.search = `?${qp.toString()}`;
}

/* ===== boot ===== */
async function init(){
  cardList($('#tiposBox'), TIPOS);
  cardList($('#materiaisBox'), MATERIAIS);

  // default de data/hora quando novo
  if (mode === 'new'){
    const now=new Date();
    $('#inpData').value=now.toISOString().slice(0,10);
    $('#inpHora').value=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }

  // carregar doc se for view/edit
  if (atendimentoId){
    try { await carregarAtendimento(); }
    catch(e){ console.error(e); toast(e.message || 'Erro ao carregar atendimento.','error'); }
  } else {
    // novo → carrega aluno se já temos alunoId
    if (alunoId) await carregarAluno().catch(()=>{});
  }

  applyMode();

  // binds
  $('#btnSalvar').addEventListener('click', salvar);
  $('#btnSalvar2').addEventListener('click', salvar);
  $('#btnLimpar').addEventListener('click', limpar);
  $('#btnLimpar2').addEventListener('click', limpar);
  $('#btnVoltar').addEventListener('click', voltar);
  $('#btnEditar').addEventListener('click', goEdit);
  $('#chkEncaminhamento').addEventListener('change', toggleEncaminhamento);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
</body>
</html>
