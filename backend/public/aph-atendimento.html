<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APH - Novo Atendimento</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192x192.png">
<meta name="theme-color" content="#8B0000">
<style>
:root{
  --rubi1:#8B0000; --rubi2:#D82327; --gold:#E7C873;
  --bg:#0c0e11; --panel:#121418; --card:#171a1f; --line:#2a2f39;
  --txt:#EAECEF; --muted:#9aa3ad; --ok:#1aa46f; --warn:#e2b93b; --bad:#e55353;
  --radius:16px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; color:var(--txt); font-family:"Segoe UI", system-ui, -apple-system, Arial, sans-serif;
  background:
    radial-gradient(1100px 480px at -20% -10%, rgba(216,35,39,.22), transparent 60%),
    radial-gradient(1100px 480px at 120% -10%, rgba(139,0,0,.25), transparent 60%),
    linear-gradient(180deg, #0c0e11, #0a0c0f);
}
.topbar{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(90deg,#1b2027,#1b2027dd);
  border-bottom:1px solid #2a2f39; backdrop-filter:saturate(140%) blur(6px);
}
.topbar .in{max-width:1080px; margin:0 auto; padding:12px 16px; display:flex; gap:8px; align-items:center}
.h1{margin:0 auto 0 0; font-weight:800}
.btn{
  appearance:none; border:1px solid #303645; background:#1e2430; color:#fff;
  padding:10px 14px; border-radius:12px; font-weight:800; cursor:pointer; display:inline-flex; gap:8px; align-items:center;
}
.btn:hover{filter:brightness(1.06)}
.btn.rubi{background:linear-gradient(90deg,var(--rubi1),var(--rubi2)); border-color:#5e0a0a; box-shadow:0 12px 30px rgba(139,0,0,.28)}
.page{max-width:1080px; margin:18px auto 28px; padding:0 16px}

.section{
  background:linear-gradient(135deg,#151920 0%, #14181d 60%, #13171b 100%);
  border:1px solid #262b34; border-radius:var(--radius); box-shadow:0 18px 50px rgba(0,0,0,.35);
  padding:18px; margin-top:16px;
}
.legend{font-weight:900; color:#fff; margin-bottom:10px}
.grid-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media (max-width:980px){ .grid-3{grid-template-columns:1fr 1fr} }
@media (max-width:680px){ .grid-3,.grid-2{grid-template-columns:1fr} }

label{font-weight:700; font-size:.95rem}
.input, select, textarea{
  width:100%; background:#0f1217; color:#e9ecf1; border:1px solid #2a303a; border-radius:12px; padding:10px;
}
textarea{resize:vertical; min-height:90px}

.cards{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media (max-width:980px){ .cards{grid-template-columns:1fr} }

.cardChoice{
  background:#0f1216; border:1px solid #2a2f39; border-radius:14px; padding:12px;
  display:flex; gap:12px; align-items:flex-start; transition:.15s filter, .15s border-color, .15s background;
}
.cardChoice:hover{filter:brightness(1.06)}
.cardChoice.active{border-color:#4b5668; background:#11161d}
.icon{
  width:26px; height:26px; display:grid; place-items:center; border-radius:8px;
  background:#0b0e12; border:1px solid #2a2f39; font-size:15px;
}
.ctitle{font-weight:800; color:#f3f5f7}
.cdesc{color:var(--muted); font-size:.92rem; margin-top:2px}
.cardChoice input{margin-right:6px; accent-color:#d82327}

.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.right{margin-left:auto}
.actions{display:flex; gap:10px; justify-content:flex-end; margin-top:16px}
.small{font-size:.88rem; color:var(--muted)}
.badge{
  display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px;
  border:1px solid #2f3541; background:#141a22; font-weight:800
}

/* Encaminhamento */
.switch{
  display:inline-flex; align-items:center; gap:8px; user-select:none; cursor:pointer;
}
.switch input{width:18px; height:18px; accent-color:#d82327}
.muted{color:var(--muted)}
</style>
</head>
<body>
  <div class="topbar">
    <div class="in">
      <div class="h1">APH - Novo Atendimento</div>
      <button class="btn" id="btnVoltar">← Ficha do Aluno</button>
      <a class="btn" href="/painel.html">🏠 Painel</a>
      <div class="right"></div>
      <button class="btn" id="btnLimpar">Limpar</button>
      <button class="btn rubi" id="btnSalvar">Salvar</button>
    </div>
  </div>

  <main class="page">
    <!-- Identificação & Contexto -->
    <section class="section">
      <div class="legend">Identificação & Contexto</div>
      <div class="grid-3">
        <div>
          <label>Responsável pelo registro</label>
          <input id="inpResp" class="input" placeholder="Nome do monitor/professor/bombeiro">
        </div>
        <div>
          <label>Local do ocorrido</label>
          <select id="inpLocal" class="input">
            <option value="">Selecione...</option>
            <option>Sala</option><option>Pátio</option><option>Quadra</option>
            <option>Corredor</option><option>Refeitório</option><option>Banheiro</option>
            <option>Entrada/Saída</option><option>Área externa</option><option>Outro</option>
          </select>
        </div>
        <div>
          <label>Horário aproximado</label>
          <input id="inpHora" type="time" class="input">
        </div>
      </div>
      <div class="row" style="margin-top:8px">
        <span class="badge">Aluno: <b id="alunoNome" style="margin-left:6px">—</b></span>
        <span class="badge">Turma: <b id="alunoTurma" style="margin-left:6px">—</b></span>
        <span class="right small"><input id="inpData" type="date" class="input" style="width:auto"></span>
      </div>
    </section>

    <!-- Tipo de Ocorrência -->
    <section class="section">
      <div class="legend">Tipo de Ocorrência</div>
      <div id="tiposBox" class="cards"></div>
    </section>

    <!-- Materiais & Procedimentos -->
    <section class="section">
      <div class="legend">Materiais & Procedimentos</div>
      <div id="materiaisBox" class="cards"></div>
      <div style="margin-top:12px">
        <label>Observações</label>
        <textarea id="inpObs" class="input" placeholder="Breve descrição e evolução imediata..."></textarea>
      </div>
    </section>

    <!-- Encaminhamento -->
    <section class="section">
      <div class="legend">Encaminhamento</div>
      <div class="row" style="margin-bottom:10px">
        <label class="switch">
          <input type="checkbox" id="chkEncaminhamento">
          <span>Houve encaminhamento</span>
        </label>
        <span class="muted">Marque se o aluno foi encaminhado (ex.: posto de saúde, hospital, retorno para casa, etc.).</span>
      </div>
      <div>
        <label>Para onde / como foi encaminhado</label>
        <textarea id="txtEncaminhamento" class="input" placeholder="Ex.: Responsáveis acionados; aluno conduzido ao UPA; acompanhamento realizado..."></textarea>
      </div>
    </section>

    <!-- Comunicação -->
    <section class="section">
      <div class="legend">Comunicação</div>
      <div class="grid-2">
        <div>
          <label>Responsáveis informados?</label>
          <select id="selRespInf" class="input">
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
          </select>
        </div>
        <div>
          <label>Meio</label>
          <select id="selMeio" class="input">
            <option value="">—</option>
            <option value="Email">E-mail</option>
            <option value="Telegram">Telegram</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Telefone">Telefone</option>
            <option value="Agenda">Agenda</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="btnLimpar2">Limpar</button>
        <button class="btn rubi" id="btnSalvar2">Salvar</button>
      </div>
    </section>
  </main>

<script>
// ===== util / dados =====
const $ = (s)=>document.querySelector(s);
const params = new URLSearchParams(location.search);
const alunoId = params.get('alunoId') || params.get('id');

const TIPOS = [
  { t:'Arranhão / escoriação', i:'🩹', d:'Limpeza e curativo simples.' },
  { t:'Corte leve',            i:'✂️', d:'Antisséptico + gaze/atadura.' },
  { t:'Queimadura',            i:'🔥', d:'Resfriamento local.' },
  { t:'Torc̣ão',               i:'🧊', d:'Gelo + repouso.' },
  { t:'Luxação',               i:'🦴', d:'Imobilização provisória.' },
  { t:'Fratura suspeita',      i:'🩻', d:'Imobilizar e encaminhar.' },
  { t:'Sangramento nasal',     i:'🩸', d:'Compressão suave.' },
  { t:'Queda',                 i:'⬇️', d:'Inspeção; gelo se preciso.' },
  { t:'Convulsão / crise epiléptica', i:'⚡', d:'Proteger cabeça; lateralizar.' },
  { t:'Ansiedade / pânico',    i:'🫱', d:'Ambiente calmo; respiração guiada.' },
  { t:'Gripe/febre/tosse (máscara)', i:'😷', d:'Máscara oferecida.' },
  { t:'Outro',                 i:'📝', d:'Especificar nas observações.' }
];

const MATERIAIS = [
  { t:'Curativo simples',  i:'🩹', d:'Bandagem, micropore, etc.' },
  { t:'Gaze / Atadura',    i:'🧻', d:'Compressão / fixação.' },
  { t:'Antisséptico',      i:'🧴', d:'Clorexidina / iodo.' },
  { t:'Bolsa de gelo',     i:'🧊', d:'Com proteção têxtil.' },
  { t:'Imobilização provisória', i:'🦴', d:'Até avaliação.' },
  { t:'Compressa morna/fria', i:'🧯', d:'Conforme orientação.' },
  { t:'Higienização',      i:'🧼', d:'Limpeza inicial.' },
  { t:'Hidratação',        i:'💧', d:'Água oferecida.' },
  { t:'Máscara fornecida', i:'😷', d:'Sintomas respiratórios.' },
  { t:'Apoio emocional',   i:'💬', d:'Acolhimento.' },
  { t:'Encaminhado ao hospital/posto', i:'🏥', d:'Registrado abaixo.' },
  { t:'Contato responsável', i:'📞', d:'Ver comunicação.' }
];

function cardList(container, items){
  container.innerHTML = items.map((o,idx)=>`
    <label class="cardChoice" data-idx="${idx}">
      <input type="checkbox" value="${o.t}">
      <div class="icon">${o.i||'•'}</div>
      <div>
        <div class="ctitle">${o.t}</div>
        <div class="cdesc">${o.d||''}</div>
      </div>
    </label>
  `).join('');
  container.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      cb.closest('.cardChoice')?.classList.toggle('active', cb.checked);
    });
  });
}
function selected(container){ return Array.from(container.querySelectorAll('input:checked')).map(i=>i.value); }

async function api(path, opts={}){
  const r = await fetch(`/api${path.startsWith('/')?path:`/${path}`}`, {
    credentials:'include',
    method: opts.method || 'GET',
    headers: opts.headers || { 'Content-Type':'application/json' },
    body: opts.body
  });
  const ct = r.headers.get('content-type')||'';
  const data = ct.includes('application/json') ? await r.json().catch(()=> ({})) : {};
  if(!r.ok) throw new Error(data.message || data.error || `Erro ${r.status}`);
  return data;
}

async function carregarAluno(){
  if(!alunoId) return;
  const { aluno } = await api(`/ficha/dados/${alunoId}`);
  $('#alunoNome').textContent = aluno?.nome || '—';
  $('#alunoTurma').textContent = aluno?.turma || '—';
}

function limpar(){
  $('#inpResp').value = '';
  $('#inpLocal').value = '';
  const now = new Date();
  $('#inpHora').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  $('#inpData').value = now.toISOString().slice(0,10);
  $('#inpObs').value = '';
  $('#selRespInf').value = 'Não';
  $('#selMeio').value = '';
  $('#chkEncaminhamento').checked = false;
  $('#txtEncaminhamento').value = '';
  toggleEncaminhamento();
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.checked = false; cb.closest('.cardChoice')?.classList.remove('active');
  });
}

function toggleEncaminhamento(){
  const on = $('#chkEncaminhamento').checked;
  const txt = $('#txtEncaminhamento');
  txt.disabled = !on;
  txt.style.opacity = on ? '1' : '.65';
}

async function salvar(){
  if(!alunoId) return alert('ID do aluno ausente.');
  const payload = {
    alunoId,
    data: $('#inpData').value || new Date().toISOString().slice(0,10),
    hora: $('#inpHora').value || '',
    local: $('#inpLocal').value.trim() || '—',
    responsavel: $('#inpResp').value.trim(),
    tipos: selected($('#tiposBox')),
    materiais: selected($('#materiaisBox')),
    sinaisESintomas: '',                 // layout concentra em Observações
    procedimentos: '',                   // compatibilidade
    observacoes: $('#inpObs').value.trim(),
    responsaveisInformados: $('#selRespInf').value === 'Sim' ? 'Sim' : 'Não',
    meioComunicacao: $('#selMeio').value || '',
    // NOVO: Encaminhamento
    houveEncaminhamento: $('#chkEncaminhamento').checked,
    encaminhamento: $('#txtEncaminhamento').value.trim()
  };
  const r = await api('/aph/atendimentos', { method:'POST', body: JSON.stringify(payload) });
  alert('Atendimento salvo com sucesso!');
  location.href = `/aph-atendimentos.html?alunoId=${encodeURIComponent(alunoId)}`;
}

function voltar(){
  if(alunoId) location.href = `/ficha-aluno.html?id=${encodeURIComponent(alunoId)}`;
  else history.back();
}

function init(){
  if(!alunoId) alert('Atenção: alunoId não informado na URL.');
  cardList($('#tiposBox'), TIPOS);
  cardList($('#materiaisBox'), MATERIAIS);

  const now = new Date();
  $('#inpData').value = now.toISOString().slice(0,10);
  $('#inpHora').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  carregarAluno().catch(console.error);
  toggleEncaminhamento();

  // binds
  $('#btnSalvar').addEventListener('click', salvar);
  $('#btnSalvar2').addEventListener('click', salvar);
  $('#btnLimpar').addEventListener('click', limpar);
  $('#btnLimpar2').addEventListener('click', limpar);
  $('#btnVoltar').addEventListener('click', voltar);
  $('#chkEncaminhamento').addEventListener('change', toggleEncaminhamento);
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
</body>
</html>
