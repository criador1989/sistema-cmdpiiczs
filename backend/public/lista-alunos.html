<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Alunos</title>
  <meta name="theme-color" content="#941a1d" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #941a1d, #d82327);
      margin: 0;
      padding: 30px 20px;
    }

    #voltarPainel {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #6c757d;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      z-index: 10000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: background 0.2s;
      display: none;
    }
    #voltarPainel:hover { background-color: #5a6268; }

    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 1080px;
      margin: auto;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      animation: fadeInUp 0.9s ease-out;
    }

    h2, h3 { text-align: center; color: #941a1d; }

    .turma-btn {
      display: inline-block;
      margin: 5px;
      padding: 10px 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, transform 0.2s;
    }
    .turma-btn:hover,
    .turma-btn.ativa { background-color: #0056b3; transform: scale(1.03); }

    .aluno-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .aluno-grid.visivel { display: grid; }

    .aluno-card {
      background-color: #f8f9fa;
      border-radius: 10px;
      padding: 10px 10px 44px; /* espaço extra embaixo pro botão */
      text-align: center;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, opacity .2s ease;
    }
    .aluno-card:hover { transform: scale(1.03); }

    .aluno-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
      filter: blur(8px);
      transition: filter .25s ease;
    }
    .aluno-card img[data-loaded="true"] { filter: blur(0); }

    .aluno-card .nome {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
      text-decoration: underline;
    }

    .acoes-card {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
    }
    .excluir-btn {
      border: none;
      border-radius: 6px;
      padding: 6px 8px;
      background: #d9534f;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .excluir-btn:hover { filter: brightness(.92); }

    .acoes-inferiores {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .btn-notificar {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #941a1d;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn-notificar:hover { transform: translateY(-1px); filter: brightness(.95); }

    .legenda {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 2px solid #ccc;
    }
    .legenda h4 { color: #800000; margin-bottom: 10px; }
    .legenda p { margin: 4px 0; font-size: 14px; }

    #modalAluno {
      display: none;
      position: fixed;
      z-index: 9999;
      padding-top: 60px;
      left: 0; top: 0; width: 100%; height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.7);
    }
    #modalAluno .modal-conteudo {
      background-color: #fff;
      margin: auto;
      padding: 20px 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 450px;
      animation: fadeInUp 0.5s;
      text-align: center;
      position: relative;
    }
    #modalAluno img {
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; border: 3px solid #941a1d;
    }
    #modalAluno h3 { margin-top: 10px; color: #941a1d; }
    #modalAluno p { margin: 4px 0; font-size: 15px; }

    #modalAluno a {
      display: inline-block;
      margin: 8px 5px 0;
      padding: 8px 14px;
      background-color: #941a1d;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    #modalAluno a:hover { background-color: #6e1315; }

    #fecharModal {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 22px; font-weight: bold; color: #941a1d; cursor: pointer;
    }

    input[type="text"] {
      width: 100%; padding: 12px; margin-bottom: 20px;
      border-radius: 6px; border: 1px solid #ccc;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <a href="painel.html" id="voltarPainel">← Voltar ao Painel</a>

  <div class="container">
    <h2 id="tituloLista">Lista de Alunos</h2>
    <input type="text" id="filtroNome" placeholder="Buscar por nome" oninput="filtrarNome()" />
    <h3>Turno da Manhã</h3>
    <div id="botoesManha"></div>
    <div id="gruposManha"></div>
    <h3>Turno da Tarde</h3>
    <div id="botoesTarde"></div>
    <div id="gruposTarde"></div>
    <div class="legenda">
      <h4>Legenda de Cores:</h4>
      <p><span style="color:#0f5132; font-weight:bold;">■</span> Excepcional (9,01 a 10,00)</p>
      <p><span style="color:#198754; font-weight:bold;">■</span> Ótimo (8,01 a 9,00)</p>
      <p><span style="color:#ffc107; font-weight:bold;">■</span> Bom (7,00 a 8,00)</p>
      <p><span style="color:#fd7e14; font-weight:bold;">■</span> Regular (5,00 a 6,99)</p>
      <p><span style="color:#dc3545; font-weight:bold;">■</span> Insuficiente (3,00 a 4,99)</p>
      <p><span style="color:#212529; font-weight:bold;">■</span> Incompatível (0,00 a 2,99)</p>
    </div>
  </div>

  <div id="modalAluno">
    <div class="modal-conteudo">
      <span id="fecharModal">&times;</span>
      <img id="modalFoto" src="" alt="Foto do Aluno" loading="lazy" decoding="async">
      <h3 id="modalNome"></h3>
      <p id="modalTurma"></p>
      <p id="modalNota"></p>
      <a id="linkFicha" href="#" target="_blank" rel="noopener">Ver Ficha Completa</a>
      <a id="linkQRCode" href="#" target="_blank" rel="noopener">Ver QR Code</a>
    </div>
  </div>

  <script>
  // ---- contexto: cookie vs token de professor ----
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  if (!token) {
    document.getElementById("voltarPainel").style.display = "inline-block";
  } else {
    document.getElementById("tituloLista").innerText = "Lista de Alunos (Professor)";
  }

  const turmasManha = ["6ºA", "6ºB", "7ºA", "7ºB", "7ºC", "7ºD", "8ºA", "8ºB", "9ºA", "9ºB", "9ºC"];
  const turmasTarde = ["1ºA", "1ºB", "1ºC", "1ºD", "2ºA", "2ºB", "2ºC", "3ºA", "3ºB", "3ºC", "3ºD"];

  // cache por turma
  const cacheTurma = new Map();

  // blur-up: tira o blur ao carregar as imagens
  document.addEventListener('load', (e) => {
    if (e.target.tagName === 'IMG') e.target.setAttribute('data-loaded', 'true');
  }, true);

  function calcularCorNota(nota) {
    if (typeof nota !== 'number') return null; // deixa card com cor padrão quando não há nota
    if (nota >= 9.01) return '#0f5132';
    if (nota >= 8.01) return '#198754';
    if (nota >= 7.00) return '#ffc107';
    if (nota >= 5.00) return '#fd7e14';
    if (nota >= 3.00) return '#dc3545';
    return '#212529';
  }

  function criarBotoes(turmas, containerId, grupoId) {
    const container = document.getElementById(containerId);
    const grupoContainer = document.getElementById(grupoId);

    turmas.forEach(turma => {
      const btn = document.createElement('button');
      btn.textContent = turma;
      btn.className = 'turma-btn';
      btn.onclick = () => toggleTurma(turma, btn, grupoContainer);
      container.appendChild(btn);
    });
  }

  async function toggleTurma(turma, btn, grupoContainer) {
    const gridId = `grid-${turma}`;
    const existente = document.getElementById(gridId);
    if (existente) {
      existente.remove();
      btn.classList.remove('ativa');
      return;
    }
    document.querySelectorAll('.aluno-grid').forEach(g => g.remove());
    document.querySelectorAll('.turma-btn').forEach(b => b.classList.remove('ativa'));
    btn.classList.add('ativa');

    let alunos = cacheTurma.get(turma);
    if (!alunos) {
      // Lista rápida: semNota=1 retorna só o essencial (nome, turma, foto, _id)
      const url = token
        ? `/api/alunos/professor?semNota=1&turma=${encodeURIComponent(turma)}&token=${encodeURIComponent(token)}`
        : `/api/alunos?semNota=1&turma=${encodeURIComponent(turma)}`;
      const res = await fetch(url, token ? {} : { credentials: 'include' });
      alunos = await res.json();
      cacheTurma.set(turma, alunos);
    }

    const grid = document.createElement('div');
    grid.className = 'aluno-grid visivel';
    grid.id = gridId;

    alunos.forEach(aluno => {
      const card = document.createElement('div');
      card.className = 'aluno-card';
      card.dataset.id = aluno._id;

      const cor = calcularCorNota(aluno.comportamento);
      if (cor) card.style.background = cor; // só pinta se houver nota

      const botaoExcluir = !token ? `
        <div class="acoes-card">
          <button class="excluir-btn" title="Excluir aluno">🗑️</button>
        </div>` : '';

      card.innerHTML = `
        ${botaoExcluir}
        <img
          src="${aluno.fotoThumbUrl || `/api/imagens/thumb/${aluno._id}`}"
          alt="${aluno.nome}" loading="lazy" width="100" height="100"
        />
        <div class="nome">${aluno.nome}</div>
        <div class="acoes-inferiores">
          <button class="btn-notificar" data-aluno-id="${aluno._id}"
                  data-aluno-nome="${encodeURIComponent(aluno.nome)}">
            Notificar
          </button>
        </div>
      `;

      // abre modal
      card.onclick = () => abrirModal(aluno);

      // excluir (apenas quando autenticado por cookie)
      if (!token) {
        const excluirBtn = card.querySelector('.excluir-btn');
        excluirBtn?.addEventListener('click', (ev) => {
          ev.stopPropagation();
          excluirAluno(aluno._id, aluno.nome, card);
        });
      }

      // notificar
      const btnNotificar = card.querySelector('.btn-notificar');
      btnNotificar.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = btnNotificar.dataset.alunoId;
        const nome = btnNotificar.dataset.alunoNome || '';
        window.location.href = `/cadastrar-notificacao.html?aluno=${id}&nome=${nome}`;
      });

      grid.appendChild(card);
    });

    grupoContainer.appendChild(grid);
  }

  function normalizarFoto(foto, id) {
    if (!foto) return `/api/imagens/thumb/${id}`;
    if (/^https?:\/\//i.test(foto) || /^data:image\//i.test(foto)) return foto;
    if (foto.startsWith('/')) return foto;
    return '/' + foto.replace(/^\/+/, '');
  }

  async function abrirModal(aluno) {
    const finalFoto = normalizarFoto(aluno.foto, aluno._id) || aluno.fotoThumbUrl || `/api/imagens/thumb/${aluno._id}`;
    document.getElementById('modalFoto').src = finalFoto;
    document.getElementById('modalNome').innerText = aluno.nome;
    document.getElementById('modalTurma').innerText = `Turma: ${aluno.turma}`;
    document.getElementById('modalNota').innerText = `Nota de comportamento: calculando...`;
    document.getElementById('linkFicha').href = `/ficha-aluno.html?id=${aluno._id}`;
    document.getElementById('linkQRCode').href = `/qrcode-aluno.html?id=${aluno._id}`;
    document.getElementById('modalAluno').style.display = 'block';

    // busca nota sob demanda
    try {
      const urlNota = token
        ? `/api/alunos/professor/${aluno._id}/nota?token=${encodeURIComponent(token)}`
        : `/api/alunos/${aluno._id}/nota`;
      const r = await fetch(urlNota, token ? {} : { credentials: 'include' });
      if (r.ok) {
        const j = await r.json();
        const nota = typeof j.comportamento === 'number' ? j.comportamento.toFixed(2) : 'N/A';
        document.getElementById('modalNota').innerText = `Nota de comportamento: ${nota}`;
      } else {
        document.getElementById('modalNota').innerText = `Nota de comportamento: N/A`;
      }
    } catch {
      document.getElementById('modalNota').innerText = `Nota de comportamento: N/A`;
    }
  }

  document.getElementById('fecharModal').onclick = () => {
    document.getElementById('modalAluno').style.display = 'none';
  };
  window.onclick = function(event) {
    if (event.target === document.getElementById('modalAluno')) {
      document.getElementById('modalAluno').style.display = 'none';
    }
  };

  async function excluirAluno(id, nome, cardEl) {
    const ok = confirm(`Tem certeza que deseja excluir o aluno "${nome}"?\nEsta ação é permanente e removerá também as notificações/observações vinculadas.`);
    if (!ok) return;
    try {
      const resp = await fetch(`/api/alunos/${id}`, {
        method: 'DELETE',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' }
      });
      if (!resp.ok) {
        const erro = await resp.json().catch(() => ({}));
        throw new Error(erro?.message || `Falha ao excluir (HTTP ${resp.status})`);
      }
      if (cardEl) {
        cardEl.style.opacity = '0';
        setTimeout(() => cardEl.remove(), 200);
      }
      alert('Aluno excluído com sucesso.');
    } catch (e) {
      console.error(e);
      alert('Não foi possível excluir o aluno: ' + e.message);
    }
  }

  // cria os botões imediatamente
  criarBotoes(turmasManha, 'botoesManha', 'gruposManha');
  criarBotoes(turmasTarde, 'botoesTarde', 'gruposTarde');
  </script>
</body>
</html>
