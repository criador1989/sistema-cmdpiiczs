<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Usuários - Colégio Militar Dom Pedro II</title>
  <meta name="theme-color" content="#0A1322" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <style>
    :root{
      --navy:#0b0f19;
      --panel:#12151d;
      --line:#262a31;

      --txt:#eaecef;
      --muted:#9aa3ad;

      --accent1:#1d4ed8;
      --accent2:#38bdf8;

      --good:#21a67a;
      --bad:#e55353;

      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    /* ===== BODY NO MESMO ESTILO DO PAINEL (WALLPAPER) ===== */
    body{
      margin:0;
      font-family:"Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--txt);
      background:url("img/bg-painel-smart.png") center/cover no-repeat fixed;
      color-scheme:dark;
      padding:32px 16px;
      -webkit-font-smoothing:antialiased;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .container{
      width:100%;
      max-width:1100px;
      margin:0 auto;
      background:linear-gradient(180deg, rgba(15,18,25,.94), rgba(9,11,18,.9));
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--radius);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:0 18px 46px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.05);
      padding:24px 24px 26px;
      animation: rise .5s ease-out both;
    }

    h2{
      text-align:center;
      margin:0 0 14px;
      color:#fff;
    }

    .toolbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin:10px 0 14px;
    }

    .search{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .search input,
    .search select{
      padding:9px 11px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#0f1116;
      color:var(--txt);
      font-size:14px;
      min-width:180px;
    }

    .search input::placeholder{
      color:var(--muted);
    }

    .search input:focus,
    .search select:focus{
      outline:none;
      border-color:var(--accent2);
      box-shadow:0 0 0 3px rgba(56,189,248,.25);
    }

    .btn{
      padding:9px 14px;
      border:0;
      border-radius:999px;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
      transition:transform .08s ease, filter .08s ease, box-shadow .08s ease;
      white-space:nowrap;
    }

    .btn-prim{
      background:linear-gradient(180deg, var(--accent2), var(--accent1));
      color:#fff;
      box-shadow:0 8px 20px rgba(37,99,235,.45);
    }
    .btn-prim:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
      box-shadow:0 11px 26px rgba(37,99,235,.6);
    }

    .btn-warn{
      background:#b91c1c;
      color:#fff;
      box-shadow:0 6px 18px rgba(185,28,28,.45);
    }
    .btn-warn:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .btn-ghost{
      background:#151822;
      color:var(--accent2);
      border:1px solid var(--accent2);
      text-decoration:none;
      border-radius:999px;
      padding:10px 16px;
      display:inline-block;
    }
    .btn-ghost:hover{
      background:linear-gradient(180deg, var(--accent2), var(--accent1));
      color:#fff;
      transform:translateY(-1px);
    }

    .status{
      min-height:18px;
      font-size:14px;
      margin-top:4px;
    }
    .ok{ color:var(--good); }
    .err{ color:var(--bad); }

    .table-wrap{
      overflow:auto;
      max-height:60vh;
      margin-top:8px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(4,6,12,.7);
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td{
      padding:10px 12px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,.04);
    }

    th{
      background:rgba(10,12,20,.98);
      color:#e5ecff;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:rgba(31,41,55,.75);
    }

    .acoes{ white-space:nowrap; }

    .pill{
      padding:4px 9px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.55);
      background:rgba(15,23,42,.9);
      font-size:.83rem;
      color:var(--muted);
    }

    .empty{
      opacity:.8;
      padding:16px 0;
      text-align:center;
    }

    .pager{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      margin-top:12px;
    }

    .pager button{
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.6);
      background:#0f1116;
      color:var(--txt);
      cursor:pointer;
      font-size:13px;
    }
    .pager button:hover{
      border-color:var(--accent2);
      color:var(--accent2);
    }

    .pager .pill{
      padding:5px 11px;
      background:rgba(15,23,42,.9);
    }

    @keyframes rise{
      from{opacity:0; transform: translateY(12px);}
      to{opacity:1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Gerenciar Usuários</h2>

    <div class="toolbar">
      <div class="search">
        <input id="q" type="search" placeholder="Buscar por nome ou e-mail" />
        <select id="filtroTipo">
          <option value="">Todos os tipos</option>
          <option value="admin">Administrador</option>
          <option value="monitor">Monitor</option>
          <option value="professor">Professor</option>
        </select>
        <button class="btn btn-prim" id="btnBuscar">Buscar</button>
      </div>
      <a class="btn-ghost" href="painel.html">⬅ Voltar ao Painel</a>
    </div>

    <div class="status" id="status"></div>

    <div class="table-wrap">
      <table aria-label="Tabela de usuários">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Tipo</th>
            <th>Instituição</th>
            <th style="width:180px">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaUsuarios">
          <tr><td class="empty" colspan="5">Carregando…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pager" id="pager" hidden>
      <button id="prev">&lt; Anterior</button>
      <span id="pageInfo" class="pill">Página 1/1</span>
      <button id="next">Próxima &gt;</button>
    </div>
  </div>

  <script>
    // DEV: limpar SW/caches para não travar cookies em localhost
    if (['localhost','127.0.0.1'].includes(location.hostname)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(regs => regs.forEach(r => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }

    // Base (Vite 5173 -> API 5000; produção mesma origem)
    const BASE = (location.port === '5173') ? 'http://localhost:5000' : '';
    const API  = (p)=> `${BASE}${p.startsWith('/api') ? p : '/api' + (p.startsWith('/')?p:'/'+p)}`;
    const AUTH = (p)=> `${BASE}${p.startsWith('/auth')? p : '/auth' + (p.startsWith('/')?p:'/'+p)}`;

    const $ = (id) => document.getElementById(id);
    let pagina = 1, paginas = 1, limite = 20, termo = '', tipo = '';

    async function garantirAdmin(){
      try{
        // tenta /auth/usuario-logado e cai para /auth/me
        let r = await fetch(AUTH('/usuario-logado'), { credentials:'include', cache:'no-store' });
        if (!r.ok) r = await fetch(AUTH('/me'), { credentials:'include', cache:'no-store' });
        if(!r.ok) throw 0;
        const u = await r.json();
        if (u?.tipo !== 'admin') {
          alert('Acesso restrito a administradores.');
          location.href = '/painel.html';
        }
      }catch{
        location.href = '/login.html';
      }
    }

    function setStatus(msg, ok=false){
      const el = $('status');
      el.className = 'status ' + (ok ? 'ok' : (msg ? 'err' : ''));
      el.textContent = msg || '';
    }

    function linhaUsuario(u){
      const inst = typeof u.instituicao === 'object'
        ? (u.instituicao?.nome || u.instituicao?._id || '—')
        : (u.instituicao || '—');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.nome || '—'}</td>
        <td>${u.email || '—'}</td>
        <td><span class="pill">${u.tipo || '—'}</span></td>
        <td>${inst}</td>
        <td class="acoes">
          <button class="btn btn-prim" onclick="editarUsuario('${u._id}')">Editar</button>
          <button class="btn btn-warn" onclick="excluirUsuario('${u._id}')">Excluir</button>
        </td>
      `;
      return tr;
    }

    async function carregarUsuarios(){
      const tbody = $('tabelaUsuarios');
      tbody.innerHTML = `<tr><td class="empty" colspan="5">Carregando…</td></tr>`;
      try{
        const qs = new URLSearchParams();
        qs.set('pagina', String(pagina));
        qs.set('limite', String(limite));
        if (termo) qs.set('q', termo);
        if (tipo) qs.set('tipo', tipo);

        const r = await fetch(API(`/usuarios?${qs.toString()}`), { credentials:'include', cache:'no-store' });
        if(!r.ok){
          const j = await r.json().catch(()=>({}));
          setStatus(j?.mensagem || 'Erro ao buscar usuários.');
          tbody.innerHTML = `<tr><td class="empty" colspan="5">Falha ao carregar.</td></tr>`;
          return;
        }
        const data = await r.json();
        const itens = Array.isArray(data?.items) ? data.items : [];
        paginas = Number(data?.paginas || 1);
        pagina  = Math.min(Math.max(1, Number(data?.pagina || 1)), paginas);

        if (itens.length === 0){
          tbody.innerHTML = `<tr><td class="empty" colspan="5">Nenhum usuário encontrado.</td></tr>`;
        } else {
          tbody.innerHTML = '';
          itens.forEach(u => tbody.appendChild(linhaUsuario(u)));
        }

        // pager
        $('pager').hidden = paginas <= 1;
        $('pageInfo').textContent = `Página ${pagina}/${paginas}`;
      }catch(e){
        console.error(e);
        setStatus('Erro de conexão com o servidor.');
        tbody.innerHTML = `<tr><td class="empty" colspan="5">Erro de conexão.</td></tr>`;
      }
    }

    // Ações
    function editarUsuario(id){
      location.href = `editar-usuario.html?id=${id}`;
    }

    async function excluirUsuario(id){
      const conf = prompt("⚠️ Esta ação é irreversível.\nDigite CONFIRMAR para excluir este usuário:");
      if (conf !== 'CONFIRMAR') return alert('Exclusão cancelada.');
      try{
        const r = await fetch(API(`/usuarios/${id}`), { method:'DELETE', credentials:'include' });
        if(r.ok){
          setStatus('Usuário excluído com sucesso.', true);
          carregarUsuarios();
        }else{
          const j = await r.json().catch(()=>({}));
          setStatus(j?.mensagem || 'Erro ao excluir usuário.');
        }
      }catch(e){
        console.error(e);
        setStatus('Erro de conexão ao excluir usuário.');
      }
    }

    // Filtros e paginação
    $('btnBuscar').addEventListener('click', () => {
      termo = $('q').value.trim();
      tipo  = $('filtroTipo').value;
      pagina = 1;
      carregarUsuarios();
    });
    $('prev').addEventListener('click', () => { if(pagina>1){ pagina--; carregarUsuarios(); } });
    $('next').addEventListener('click', () => { if(pagina<paginas){ pagina++; carregarUsuarios(); } });

    // Boot
    (async function(){
      await garantirAdmin();
      await carregarUsuarios();
    })();
  </script>
  <script src="notify.js"></script>
</body>
</html>
