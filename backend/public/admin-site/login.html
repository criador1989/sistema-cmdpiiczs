<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login CMS | Site Institucional</title>
  <link rel="stylesheet" href="./admin-site.css">
</head>
<body class="login-body">

  <main class="login-card">
    <div class="login-seal">⚜</div>

    <h1>CMS do Site</h1>
    <p>Acesso administrativo do site institucional.</p>

    <form id="login-form">
      <label>Email ou login</label>
      <input id="login" type="text" required placeholder="Digite seu login">

      <label>Senha</label>
      <input id="senha" type="password" required placeholder="Digite sua senha">

      <button class="btn primary" type="submit">Entrar</button>
    </form>

    <small id="login-msg"></small>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('login-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.textContent = 'Entrando...';

      try {
        const login = document.getElementById('login').value.trim();
        const senha = document.getElementById('senha').value;

        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, email: login, senha })
        });

        const data = await res.json();

        const token =
          data.token ||
          data.accessToken ||
          data.jwt ||
          data?.usuario?.token;

        if (!res.ok || !token) {
          msg.textContent = data.mensagem || data.erro || 'Login inválido.';
          return;
        }

        const usuario = data.usuario || data.user || {};

        const perfil = String(
          usuario.tipo || usuario.perfil || usuario.role || ''
        ).toLowerCase();

        if (!perfil.includes('admin')) {
          msg.textContent = 'Acesso permitido apenas para administradores.';
          return;
        }

        localStorage.setItem('site_cms_token', token);
        localStorage.setItem('site_cms_usuario', JSON.stringify(usuario));

        window.location.href = '/admin-site/painel-site.html';
      } catch (err) {
        console.error(err);
        msg.textContent = 'Erro ao tentar entrar.';
      }
    });
  </script>

</body>
</html>
