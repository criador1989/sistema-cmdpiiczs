<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Notificação</title>
  <meta name="theme-color" content="#8B0000"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icons/icon-192x192.png"/>
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png"/>
  <style>
    :root{
      --rubi-1:#8B0000; --rubi-2:#B22222;
      --glass-bg: rgba(255,255,255,.07);
      --glass-border: rgba(255,255,255,.38);
      --glass-inner: rgba(255,255,255,.40);
      --glass-shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius: 22px; --text:#f2f4f8; --text-soft:#cfd6de; --line: rgba(255,255,255,.18);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;color:var(--text);background:#1e0506;min-height:100vh}
    body::before{content:"";position:fixed;inset:0;z-index:0;background:
      linear-gradient(45deg, rgba(255,120,120,.06) 25%, transparent 25%, transparent 75%, rgba(255,120,120,.06) 75%) 0 0/16px 16px,
      linear-gradient(45deg, rgba(0,0,0,.28) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.28) 75%) 8px 8px/16px 16px,
      linear-gradient(0deg, #2a0607, #3c0a0d);filter:saturate(125%)}
    body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:
      radial-gradient(1100px 600px at 50% -10%, rgba(255,90,90,.10), transparent 60%),
      radial-gradient(1200px 800px at 50% 120%, rgba(0,0,0,.55), transparent 65%),
      radial-gradient(900px 900px at -10% 50%, rgba(0,0,0,.45), transparent 60%),
      radial-gradient(900px 900px at 110% 50%, rgba(0,0,0,.45), transparent 60%)}

    .wrap{position:relative;z-index:1;width:min(980px,100%);margin:24px auto;padding:0 16px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;backdrop-filter:blur(8px);
      box-shadow:0 10px 28px rgba(0,0,0,.35);padding:22px}
    h2{margin:0 0 12px;text-align:center;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.25)}
    .toolbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:10px}
    .toolbar .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{appearance:none;border:1px solid var(--line);background:rgba(0,0,0,.18);color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}
    .btn.primary{background:var(--rubi-1);border-color:var(--rubi-1)}
    .btn:hover{filter:saturate(1.05)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .field{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}
    .field label{display:block;font-weight:700;color:var(--text-soft);font-size:.9rem;margin-bottom:6px}
    .field input,.field select,.field textarea{
      width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.12);color:#fff}
    .field textarea{min-height:84px}

    .alunoBox{display:flex;gap:12px;align-items:center}
    .alunoBox img{width:72px;height:72px;border-radius:12px;border:1px solid rgba(255,255,255,.18);object-fit:cover;background:#111}

    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.2);font-size:.85rem}

    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .muted{color:var(--text-soft)}
    .skeleton{height:14px;background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.16),rgba(255,255,255,.08));
      background-size:200% 100%;animation:sk 1.1s linear infinite;border-radius:8px}
    @keyframes sk{to{background-position:-200% 0}}

    /* Modal simples para trocar aluno */
    .modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.5);z-index:50}
    .modal .box{width:min(680px,92%);background:#1b0a0b;border:1px solid rgba(255,255,255,.18);border-radius:16px;box-shadow:var(--glass-shadow);padding:14px}
    .list-Alunos{max-height:360px;overflow:auto;margin-top:8px;border-top:1px dashed rgba(255,255,255,.18)}
    .itemAluno{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px dashed rgba(255,255,255,.12)}
    .itemAluno button{padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.18);color:#fff;cursor:pointer}

    .note{margin-top:8px;font-size:.9rem;color:#e5e5e5}
    .ok{color:#22c55e}.err{color:#ff8a8a}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div class="left">
          <button class="btn" onclick="location.href='notificacoes.html'">← Ver Notificações</button>
          <button id="btnPDF" class="btn">📄 PDF</button>
          <a id="btnVerNotificacao" class="btn" href="#" target="_blank" rel="noopener">🔎 Ver página da notificação</a>
        </div>
        <div class="chips">
          <span id="chipStatus" class="chip">Status: —</span>
          <span id="chipNumero" class="chip">Nº: —</span>
          <span id="chipData" class="chip">Data: —</span>
        </div>
      </div>

      <h2>Editar Notificação</h2>

      <!-- SKELETON inicial -->
      <div id="sk" class="skeleton" style="height:120px;border-radius:12px;margin-bottom:12px"></div>

      <form id="formEdicao" style="display:none">
        <!-- Aluno -->
        <div class="field">
          <label>Aluno</label>
          <div class="alunoBox">
            <img id="fotoAluno" alt="Foto do aluno" />
            <div style="flex:1">
              <div id="alunoNome" style="font-weight:800">—</div>
              <div id="alunoTurma" class="muted">—</div>
              <div class="muted" style="font-size:.9rem">ID: <span id="alunoId">—</span></div>
            </div>
            <button type="button" class="btn" id="btnTrocarAluno">Trocar aluno…</button>
          </div>
          <!-- manter compat com backend: campo escondido com _id -->
          <input type="hidden" id="aluno" name="aluno" />
        </div>

        <!-- Natureza / Status / Data -->
        <div class="grid" style="margin-top:10px">
          <div class="field">
            <label>Natureza</label>
            <select id="natureza" name="natureza">
              <option value="indisciplina">Indisciplina</option>
              <option value="elogio">Elogio</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="status" name="status">
              <option value="pendente">Pendente</option>
              <option value="deferido">Deferido</option>
              <option value="revisao_solicitada">Revisão solicitada</option>
              <option value="arquivado">Arquivado</option>
            </select>
          </div>
        </div>

        <div class="grid" style="margin-top:10px">
          <div class="field">
            <label>Data</label>
            <input type="date" id="data" name="data" required/>
          </div>
          <div class="field">
            <label>Tipo de Elogio (quando Natureza = Elogio)</label>
            <select id="tipoElogio" name="tipoElogio">
              <option value="">—</option>
              <option value="elogioVerbal">Elogio Verbal</option>
              <option value="boletimInternoIndividual">Boletim Interno Individual</option>
              <option value="boletimInternoColetivo">Boletim Interno Coletivo</option>
              <option value="mediaAlta">Média ≥ 8,5</option>
            </select>
          </div>
        </div>

        <!-- Medida / Motivo -->
        <div class="grid" style="margin-top:10px">
          <div class="field">
            <label>Tipo / Medida</label>
            <input type="text" id="tipoMedida" name="tipoMedida" placeholder="Ex.: Repreensão, A.E.C.D.E, A.I.A, Elogio"/>
          </div>
          <div class="field">
            <label>Motivo (Ato)</label>
            <input type="text" id="motivo" name="motivo" />
          </div>
        </div>

        <!-- Valor / Dias / Classificação -->
        <div class="grid-3" style="margin-top:10px">
          <div class="field">
            <label>Valor Numérico</label>
            <input type="number" step="0.01" id="valorNumerico" name="valorNumerico"/>
          </div>
          <div class="field" id="boxDias" style="display:none">
            <label>Dias (A.E.C.D.E / A.I.A)</label>
            <input type="number" min="1" id="quantidadeDias" name="quantidadeDias"/>
          </div>
          <div class="field">
            <label>Classificação (Regulamento)</label>
            <input type="text" id="classificacaoRegulamento" name="classificacaoRegulamento" placeholder="Leve / Médio / Grave / Gravíssimo"/>
          </div>
        </div>

        <!-- Artigo / Parágrafo / Inciso -->
        <div class="grid-3" style="margin-top:10px">
          <div class="field"><label>Artigo</label><input type="text" id="artigo" name="artigo"/></div>
          <div class="field"><label>Parágrafo</label><input type="text" id="paragrafo" name="paragrafo"/></div>
          <div class="field"><label>Inciso</label><input type="text" id="inciso" name="inciso"/></div>
        </div>

        <!-- Observação -->
        <div class="field" style="margin-top:10px">
          <label>Observação</label>
          <textarea id="observacao" name="observacao" rows="3"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn" onclick="location.href='notificacoes.html'">Cancelar</button>
          <button type="submit" class="btn primary">Salvar alterações</button>
        </div>

        <div id="mensagem" class="note"></div>
      </form>
    </div>
  </div>

  <!-- Modal troca aluno -->
  <div id="modalAlunos" class="modal" aria-hidden="true">
    <div class="box">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Trocar aluno</h3>
        <button class="btn" onclick="fecharModal()">✖</button>
      </div>
      <div class="field" style="margin-top:8px">
        <label>Pesquisar</label>
        <input id="buscaAluno" type="text" placeholder="Digite nome ou turma…"/>
      </div>
      <div class="list-Alunos" id="listaAlunos">
        <div class="skeleton" style="height:50px"></div>
        <div class="skeleton" style="height:50px;margin-top:6px"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== Helpers =====
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const API = (p)=> p.startsWith('http') ? p : (p.startsWith('/api') ? p : `/api${p.startsWith('/')?p:'/'+p}`);
    const fmtISO = (d)=> { if(!d) return ''; const x=new Date(d); const y=x.getFullYear(); const m=String(x.getMonth()+1).padStart(2,'0'); const dd=String(x.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };

    function showMsg(text, ok=true){
      const el = document.getElementById('mensagem');
      el.textContent = text;
      el.className = 'note ' + (ok ? 'ok' : 'err');
    }

    function setChips(n){
      document.getElementById('chipStatus').textContent = 'Status: ' + (n.status || '—');
      document.getElementById('chipNumero').textContent = 'Nº: ' + (n.numeroSequencial || '—');
      document.getElementById('chipData').textContent = 'Data: ' + (n.data ? new Date(n.data).toLocaleDateString('pt-BR') : '—');
    }

    function toggleCamposPorNatureza(){
      const nat = document.getElementById('natureza').value;
      const elogio = nat === 'elogio';
      document.getElementById('tipoElogio').disabled = !elogio;
      // se elogio e tipo vazio, sugere "Elogio"
      const t = document.getElementById('tipoMedida');
      if (elogio && !t.value) t.value = 'Elogio';
    }

    function toggleDiasPorMedida(){
      const med = (document.getElementById('tipoMedida').value||'').toUpperCase().trim();
      const precisa = (med === 'A.E.C.D.E' || med === 'A.I.A' || med === 'AECDE' || med === 'AIA');
      document.getElementById('boxDias').style.display = precisa ? '' : 'none';
    }

    // Fatores client-side iguais ao backend (só para ajudar o usuário)
    const MAPA_NEG = { 'ADVERTÊNCIA ESCRITA': -0.30, 'REPREENSÃO': -0.50, 'A.E.C.D.E': -0.70, 'A.E.C.D.E.': -0.70, 'AECDE': -0.70, 'A.I.A': -1.20, 'A.I.A.': -1.20, 'AIA': -1.20 };
    const MAPA_ELOG = { 'elogioVerbal': 0.15, 'boletimInternoIndividual': 0.60, 'boletimInternoColetivo': 0.20, 'mediaAlta': 0.40 };

    function ajustarValorAutomatico(){
      const nat = document.getElementById('natureza').value;
      const med = (document.getElementById('tipoMedida').value||'').toUpperCase().trim();
      const dias = Number(document.getElementById('quantidadeDias').value||1);

      const vInput = document.getElementById('valorNumerico');
      if (nat === 'elogio') {
        const tipoElogio = document.getElementById('tipoElogio').value;
        if (tipoElogio && (vInput.value === '' || vInput._auto)) {
          vInput.value = (MAPA_ELOG[tipoElogio] ?? 0).toFixed(2);
          vInput._auto = true;
        }
      } else {
        const base = (MAPA_NEG[med] ?? 0);
        const precisa = (med === 'A.E.C.D.E' || med === 'A.I.A' || med === 'AECDE' || med === 'AIA');
        if ((vInput.value === '' || vInput._auto) && (base !== 0)) {
          const mult = precisa ? Math.max(1, dias) : 1;
          vInput.value = (base * mult).toFixed(2);
          vInput._auto = true;
        }
      }
    }

    // ===== Carregar notificação (rápido) =====
    async function carregar(){
      if(!id){ showMsg('Parâmetro id ausente.', false); return; }
      try{
        const r = await fetch(API(`/notificacoes/${id}`), { credentials:'include', cache:'no-store' });
        if (!r.ok) throw new Error('Falha ao carregar dados');
        const n = await r.json();

        // Chips topo
        setChips(n);

        // Botões externos
        document.getElementById('btnPDF').onclick = async ()=>{
          try{
            const rp = await fetch(API(`/pdf/${n._id}`), { method:'POST', credentials:'include', cache:'no-store' });
            if(!rp.ok) throw new Error('Erro ao gerar PDF');
            const blob = await rp.blob(); const url = URL.createObjectURL(blob); window.open(url, '_blank');
          }catch{ showMsg('Erro ao gerar PDF.', false); }
        };
        document.getElementById('btnVerNotificacao').href = `notificacao.html?id=${n._id}`;

        // Preencher aluno (sem listar todos!)
        const a = n.aluno || {};
        document.getElementById('aluno').value = a._id || '';
        document.getElementById('alunoId').textContent = a._id || '—';
        document.getElementById('alunoNome').textContent = a.nome || '—';
        document.getElementById('alunoTurma').textContent = a.turma || '—';
        document.getElementById('fotoAluno').src = a._id ? `/api/imagens/thumb/${a._id}?w=320` : '/img/sem-foto.png';

        // Demais campos
        document.getElementById('natureza').value = n.natureza || 'indisciplina';
        document.getElementById('status').value = n.status || 'pendente';
        document.getElementById('data').value = fmtISO(n.data || n.createdAt);
        document.getElementById('tipoElogio').value = n.tipoElogio || '';
        document.getElementById('tipoMedida').value = n.tipoMedida || n.tipo || '';
        document.getElementById('motivo').value = n.motivo || '';
        document.getElementById('valorNumerico').value = (typeof n.valorNumerico==='number') ? n.valorNumerico.toFixed(2) : (n.valorNumerico||'');
        document.getElementById('quantidadeDias').value = n.quantidadeDias || '';
        document.getElementById('classificacaoRegulamento').value = n.classificacaoRegulamento || '';
        document.getElementById('artigo').value = n.artigo || '';
        document.getElementById('paragrafo').value = n.paragrafo || '';
        document.getElementById('inciso').value = n.inciso || '';
        document.getElementById('observacao').value = n.observacao || '';

        toggleCamposPorNatureza();
        toggleDiasPorMedida();

        // exibe form, esconde skeleton
        document.getElementById('sk').style.display = 'none';
        document.getElementById('formEdicao').style.display = 'block';
      }catch(e){
        console.error(e);
        showMsg('❌ Erro ao carregar notificação.', false);
      }
    }

    // ===== Salvar =====
    document.getElementById('formEdicao').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const dados = Object.fromEntries(new FormData(e.currentTarget).entries());

      // normalizações
      if (dados.valorNumerico === '') delete dados.valorNumerico;
      if (dados.quantidadeDias === '') delete dados.quantidadeDias;
      if (!dados.tipoElogio) delete dados.tipoElogio;

      try{
        const r = await fetch(API(`/notificacoes/${id}`), {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          credentials:'include',
          cache:'no-store',
          body: JSON.stringify(dados)
        });
        const j = await r.json().catch(()=> ({}));
        if (!r.ok) throw new Error(j.message || j.mensagem || 'Erro ao atualizar.');
        showMsg('✅ Notificação atualizada com sucesso!', true);
        // atualiza chips e campos-chave sem recarregar
        setTimeout(()=>location.href='notificacoes.html', 1000);
      }catch(err){
        showMsg('❌ ' + err.message, false);
      }
    });

    // ===== Regras UI =====
    document.getElementById('natureza').addEventListener('change', ()=>{
      toggleCamposPorNatureza();
      ajustarValorAutomatico();
    });
    document.getElementById('tipoElogio').addEventListener('change', ajustarValorAutomatico);
    document.getElementById('tipoMedida').addEventListener('input', ()=>{
      toggleDiasPorMedida();
      ajustarValorAutomatico();
    });
    document.getElementById('quantidadeDias').addEventListener('input', ajustarValorAutomatico);
    document.getElementById('valorNumerico').addEventListener('input', function(){ this._auto = false; });

    // ===== Modal troca aluno (sob demanda, mais rápido) =====
    const modal = document.getElementById('modalAlunos');
    function abrirModal(){ modal.style.display = 'grid'; carregarListaAlunos(''); }
    function fecharModal(){ modal.style.display = 'none'; }
    document.getElementById('btnTrocarAluno').addEventListener('click', abrirModal);
    window.fecharModal = fecharModal;

    const buscaAluno = document.getElementById('buscaAluno');
    const listaAlunos = document.getElementById('listaAlunos');
    const debounce = (fn,ms=300)=>{ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); } };

    async function carregarListaAlunos(q){
      // Tenta usar filtros do backend se disponíveis (?q=)
      const qs = q ? `?q=${encodeURIComponent(q)}` : '';
      listaAlunos.innerHTML = `<div class="skeleton" style="height:50px"></div><div class="skeleton" style="height:50px;margin-top:6px"></div>`;
      try{
        // Se sua rota /api/alunos aceitar paginação, adapte aqui (ex.: &limit=50)
        const r = await fetch(API(`/alunos${qs}`), { credentials:'include', cache:'no-store' });
        const arr = await r.json();
        const alunos = Array.isArray(arr) ? arr : (arr.data || arr.alunos || []);
        if (!alunos.length){ listaAlunos.innerHTML = `<div class="muted" style="padding:8px">Sem resultados</div>`; return; }

        const frag = document.createDocumentFragment();
        alunos.slice(0,80).forEach(a=>{
          const div = document.createElement('div');
          div.className = 'itemAluno';
          div.innerHTML = `
            <div>
              <div style="font-weight:700">${a.nome||'—'}</div>
              <div class="muted">${a.turma||'—'} • ${a._id||a.id}</div>
            </div>
            <button type="button">Selecionar</button>
          `;
          div.querySelector('button').onclick = ()=>{
            document.getElementById('aluno').value = a._id || a.id;
            document.getElementById('alunoId').textContent = a._id || a.id || '—';
            document.getElementById('alunoNome').textContent = a.nome || '—';
            document.getElementById('alunoTurma').textContent = a.turma || '—';
            document.getElementById('fotoAluno').src = a._id ? `/api/imagens/thumb/${a._id}?w=320` : '/img/sem-foto.png';
            fecharModal();
          };
          frag.appendChild(div);
        });
        listaAlunos.innerHTML = '';
        listaAlunos.appendChild(frag);
      }catch(e){
        console.warn(e);
        listaAlunos.innerHTML = `<div class="muted" style="padding:8px">Erro ao buscar alunos.</div>`;
      }
    }
    buscaAluno.addEventListener('input', debounce(()=>carregarListaAlunos(buscaAluno.value.trim()), 300));

    // ===== Boot =====
    carregar();

    // PWA
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));
    }
  </script>
</body>
</html>
