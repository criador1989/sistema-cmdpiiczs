<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axoriin Master | Associações</title>
  <style>
    :root{--navy:#06172f;--navy2:#0b3565;--blue:#1f6feb;--cyan:#47d7ff;--bg:#eef3f9;--surface:#fff;--text:#172033;--muted:#64748b;--line:#dbe3ec;--green:#168b61;--red:#d84c4c;--orange:#b66b0b;--shadow:0 15px 42px rgba(17,31,63,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    header{padding:24px 30px;color:#fff;background:radial-gradient(circle at 88% 10%,rgba(71,215,255,.2),transparent 26%),linear-gradient(135deg,var(--navy),var(--navy2));display:flex;justify-content:space-between;gap:20px;align-items:center}header span{color:#8edfff;font-size:.68rem;letter-spacing:.14em;font-weight:900}header h1{margin:6px 0 3px;font-size:2rem}header p{margin:0;color:rgba(255,255,255,.65)}header a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.2);border-radius:11px;padding:10px 14px;background:rgba(255,255,255,.07)}
    main{max-width:1320px;margin:auto;padding:25px}.toolbar{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-bottom:18px}.search{display:grid;gap:7px;min-width:min(420px,100%)}label span{color:var(--muted);font-size:.74rem;font-weight:800}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:11px;background:#fff;outline:none}input,select{height:44px;padding:0 11px}textarea{padding:11px;resize:vertical}.button{min-height:44px;padding:0 17px;border:1px solid transparent;border-radius:12px;font-weight:850}.primary{color:#fff;background:linear-gradient(135deg,var(--blue),#2f80ed);box-shadow:0 10px 22px rgba(31,111,235,.22)}.secondary{color:var(--text);background:#fff;border-color:var(--line)}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px}.card{padding:18px;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:var(--shadow)}.card-head{display:flex;justify-content:space-between;gap:12px}.card h2{margin:0;font-size:1.04rem}.card p{margin:6px 0 0;color:var(--muted);font-size:.78rem}.badge{display:inline-flex;height:max-content;padding:6px 9px;border-radius:999px;font-size:.68rem;font-weight:900}.ok{color:var(--green);background:#e8f8f1}.bad{color:var(--red);background:#fff0f0}.info{color:var(--blue);background:#eaf3ff}.stats{margin:15px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}.stats div{padding:11px;border-radius:11px;background:#f3f6fa}.stats span,.stats strong{display:block}.stats span{color:var(--muted);font-size:.66rem}.stats strong{margin-top:5px}.actions{display:flex;gap:7px;flex-wrap:wrap}.actions a,.actions button{flex:1;text-align:center;text-decoration:none;min-height:38px;padding:9px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-weight:800;font-size:.74rem}
    .modal{position:fixed;inset:0;padding:24px;z-index:20;display:grid;place-items:center;background:rgba(5,17,39,.68);backdrop-filter:blur(8px)}.modal-card{width:min(850px,100%);max-height:calc(100vh - 48px);overflow:auto;border-radius:22px;background:#fff;box-shadow:0 30px 80px rgba(5,17,39,.35)}.modal-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head small{color:var(--blue);font-weight:900;letter-spacing:.13em}.modal-head h2{margin:5px 0 0}.close{width:38px;height:38px;border:0;border-radius:10px;background:#f1f5f9;font-size:1.25rem}.form-grid{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-grid label{display:grid;gap:7px}.full{grid-column:1/-1}.modal-actions{padding:0 22px 22px;display:flex;justify-content:flex-end;gap:9px}.toast{position:fixed;right:22px;bottom:22px;z-index:40;max-width:420px;padding:14px 17px;border-radius:13px;color:#fff;background:var(--text);box-shadow:var(--shadow);opacity:0;transform:translateY(12px);transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:none}.toast.error{background:#a72f38}.empty{grid-column:1/-1;padding:50px;text-align:center;color:var(--muted)}
    @media(max-width:1050px){.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){header,.toolbar{align-items:stretch;flex-direction:column}.cards,.form-grid{grid-template-columns:1fr}.full{grid-column:auto}main{padding:16px}.search{min-width:0}}
  </style>
  <link rel="stylesheet" href="/axoriin-ajuda/ajuda-contextual.css">
</head>
<body>
  <header><div><span>AXORIIN MASTER</span><h1>Associações</h1><p>Crie e administre tenants independentes para associações.</p></div><a href="/master-instituicoes.html">← Instituições</a></header>
  <main>
    <div class="toolbar"><label class="search"><span>Pesquisar</span><input id="search" placeholder="Nome, sigla, slug ou CNPJ..." /></label><button id="newButton" class="button primary">+ Nova associação</button></div>
    <div id="cards" class="cards"></div>
  </main>
  <div id="modal" class="modal hidden">
    <form id="form" class="modal-card">
      <div class="modal-head"><div><small>NOVO TENANT</small><h2>Cadastrar associação</h2></div><button class="close" type="button" data-close>×</button></div>
      <div class="form-grid">
        <label class="full"><span>Nome oficial</span><input name="nome" required /></label>
        <label><span>Nome resumido</span><input name="nomeExibicao" /></label><label><span>Sigla</span><input name="sigla" /></label>
        <label><span>Slug</span><input name="slug" placeholder="ex.: apacmdpii-czs" /></label><label><span>CNPJ</span><input name="cnpj" /></label>
        <label><span>E-mail institucional</span><input name="email" type="email" /></label><label><span>Telefone</span><input name="telefone" /></label>
        <label class="full"><span>Endereço</span><input name="endereco" /></label><label><span>Município</span><input name="municipio" /></label><label><span>Estado</span><input name="estado" maxlength="2" value="AC" /></label><label class="full"><span>Instituição vinculada (opcional)</span><select id="matrixSelect" name="instituicaoMatriz"><option value="">Associação independente</option></select><small style="color:var(--muted)">Vincule à escola de origem sem compartilhar automaticamente dados escolares restritos.</small></label><label class="full" style="display:flex;grid-template-columns:auto 1fr;align-items:center;gap:10px"><input name="identidadeHerdadaDaMatriz" type="checkbox" value="true" style="width:18px;height:18px"><span>Herdar identidade institucional da escola vinculada quando aplicável</span></label>
        <label><span>Plano</span><select name="plano"><option>piloto</option><option>essencial</option><option>profissional</option><option>rede</option><option>personalizado</option></select></label><label><span>Período do mandato</span><input name="periodoMandato" placeholder="2026–2028" /></label>
        <div class="full" style="padding:12px 14px;border:1px solid #cfe2ff;border-radius:12px;background:#f3f8ff;color:#334155;font-size:.82rem;line-height:1.45">Se o e-mail já existir no Axoriin, a identidade e a senha atuais serão preservadas; será criado apenas o vínculo de presidente com a associação.</div><label class="full"><span>Nome do presidente / primeiro administrador</span><input name="adminNome" required /></label><label><span>E-mail de acesso</span><input name="adminEmail" type="email" required /></label><label><span>Senha temporária (somente para novo usuário)</span><input name="senhaTemporaria" /></label>
      </div>
      <div class="modal-actions"><button class="button secondary" type="button" data-close>Cancelar</button><button class="button primary">Criar ambiente</button></div>
    </form>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    'use strict';
    const state={items:[],matrizes:[]};let timer;
    const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
    const notify=(m,e=false)=>{const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');clearTimeout(timer);timer=setTimeout(()=>t.className='toast',3500)};
    async function api(path,opt={}){const r=await fetch('/api/master/associacoes'+path,{credentials:'include',...opt,headers:{'Content-Type':'application/json',...(opt.headers||{})}});const d=await r.json().catch(()=>({}));if(r.status===401||r.status===403){location.href='/master-login.html';throw new Error(d.mensagem||'Acesso expirado.')}if(!r.ok)throw new Error(d.mensagem||d.erro||'Falha na operação.');return d}
    function render(){const q=document.getElementById('search').value.trim().toLowerCase();const items=state.items.filter(i=>[i.nome,i.sigla,i.slug,i.cnpj].join(' ').toLowerCase().includes(q));document.getElementById('cards').innerHTML=items.length?items.map(i=>`<article class="card"><div class="card-head"><div><h2>${esc(i.sigla||i.nome)}</h2><p>${esc(i.nome)}<br><b>tenant:</b> ${esc(i.slug)}${i.instituicaoMatriz?`<br><b>vinculada a:</b> ${esc(i.instituicaoMatriz.sigla||i.instituicaoMatriz.nome)}`:''}</p></div><span class="badge ${i.ativo!==false?'ok':'bad'}">${i.ativo!==false?'Ativa':'Inativa'}</span></div><div class="stats"><div><span>Plano</span><strong>${esc(i.associacaoConfig?.plano||'piloto')}</strong></div><div><span>Usuários</span><strong>${i.totalUsuarios||0}</strong></div></div><div class="actions"><a href="/associacao.html?t=${encodeURIComponent(i.slug)}">Abrir módulo</a><a href="/login.html?t=${encodeURIComponent(i.slug)}">Tela de login</a><button data-toggle="${i._id}" data-active="${i.ativo!==false}">${i.ativo!==false?'Desativar':'Ativar'}</button></div></article>`).join(''):'<div class="empty">Nenhuma associação encontrada.</div>'}
    function renderMatrizes(){const select=document.getElementById('matrixSelect');select.innerHTML='<option value="">Associação independente</option>'+state.matrizes.map(i=>`<option value="${esc(i._id)}">${esc(i.sigla||i.nome)} — ${esc(i.nome)} (${esc(i.slug||'sem slug')})</option>`).join('')}
    async function load(){const [d,m]=await Promise.all([api('/'),api('/matrizes')]);state.items=d.associacoes||[];state.matrizes=m.instituicoes||[];renderMatrizes();render()}
    document.getElementById('search').addEventListener('input',render);document.getElementById('newButton').onclick=()=>document.getElementById('modal').classList.remove('hidden');document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>document.getElementById('modal').classList.add('hidden'));
    document.addEventListener('click',async e=>{const b=e.target.closest('[data-toggle]');if(!b)return;try{const d=await api('/'+b.dataset.toggle,{method:'PATCH',body:JSON.stringify({ativo:b.dataset.active!=='true'})});notify(d.mensagem);await load()}catch(err){notify(err.message,true)}});
    document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const body=Object.fromEntries(new FormData(e.currentTarget));try{const d=await api('/',{method:'POST',body:JSON.stringify(body)});document.getElementById('modal').classList.add('hidden');e.currentTarget.reset();await load();notify(d.senhaTemporaria ? `${d.mensagem} Senha temporária: ${d.senhaTemporaria}` : d.mensagem)}catch(err){notify(err.message,true)}});
    load().catch(err=>notify(err.message,true));
  </script>
  <script src="/axoriin-ajuda/conteudos-ajuda.js"></script>
  <script src="/axoriin-ajuda/ajuda-contextual.js"></script>
</body>
</html>
