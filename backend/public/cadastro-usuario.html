<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuário - Colégio Militar Dom Pedro II</title>
  <meta name="theme-color" content="#941a1d" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #941a1d, #d82327);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      width: 340px;
      text-align: center;
      animation: fadeIn .6s ease-in-out;
    }
    .logo { width: 100px; margin-bottom: 10px; }
    h2 { margin-bottom: 20px; color: #333; }
    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #d82327;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background-color: #941a1d; }
    .mensagem { font-size: 14px; margin-top: 10px; min-height: 18px; }
    .voltar { margin-top: 15px; display: block; font-size: 14px; color: #d82327; text-decoration: none; }
    .voltar:hover { text-decoration: underline; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-final.jpg" alt="Logo do Colégio" class="logo" />
    <h2>Cadastrar Usuário</h2>
    <form id="formCadastro">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="E-mail institucional" required />
      <input type="password" id="senha" placeholder="Senha (mín. 6 caracteres)" required />
      <!-- Campo apenas informativo (backend usa a instituição do admin logado) -->
      <input type="text" id="instituicao" placeholder="Instituição (ex: Colégio Militar D. Pedro II)" />
      <select id="tipo" required>
        <option value="">Selecione o tipo de usuário</option>
        <option value="admin">Administrador</option>
        <option value="monitor">Monitor</option>
        <option value="professor">Professor</option>
      </select>
      <button type="submit">Cadastrar</button>
      <div class="mensagem" id="mensagem"></div>
    </form>
    <a href="/login.html" class="voltar">⬅ Voltar para o login</a>
  </div>

  <script>
    // 🔧 limpeza em dev local
    if (['localhost', '127.0.0.1'].includes(location.hostname)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(regs => regs.forEach(r => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
      console.log('[DEV] caches limpos');
    }

    // ✅ API_BASE:
    // - Se estiver no Vite (:5173), a API está no :5000
    // - Caso contrário (Render/produção ou Express servindo HTML), mesma origem
    const API_BASE = (location.port === '5173') ? 'http://localhost:5000' : '';

    // 🔒 restrito a admin
    async function verificarPermissao() {
      try {
        const resp = await fetch(`${API_BASE}/auth/usuario-logado`, { credentials: 'include', cache: 'no-store' });
        if (!resp.ok) { location.href = '/login.html'; return; }
        const user = await resp.json();
        if (user.tipo !== 'admin') {
          alert('Apenas administradores podem acessar esta página.');
          location.href = '/painel.html';
        }
      } catch {
        location.href = '/login.html';
      }
    }
    verificarPermissao();

    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nomeVal = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const tipo = document.getElementById('tipo').value;
      const msg = document.getElementById('mensagem');
      msg.textContent = '';

      if (senha.length < 6) {
        msg.style.color = 'red';
        msg.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        return;
      }

      try {
        const r = await fetch(`${API_BASE}/auth/cadastrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          // 🔴 NÃO enviamos mais "instituicao" aqui.
          body: JSON.stringify({ nome: nomeVal, email, senha, tipo })
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok) {
          msg.style.color = 'green';
          msg.textContent = '✅ Usuário cadastrado com sucesso!';
          e.target.reset();
          setTimeout(() => (msg.textContent = ''), 5000);
        } else {
          msg.style.color = 'red';
          msg.textContent = data.mensagem || 'Erro ao cadastrar.';
        }
      } catch {
        msg.style.color = 'red';
        msg.textContent = 'Erro de conexão com o servidor.';
      }
    });
  </script>
</body>
</html>
