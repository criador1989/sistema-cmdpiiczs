<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuário - Colégio Militar Dom Pedro II</title>
  <meta name="theme-color" content="#941a1d" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    /* =========================
       VARIÁVEIS – TEMA GLASS
    ========================== */
    :root{
      --glass-bg: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.40);
      --glass-highlight: rgba(255,255,255,0.7);

      --glass-radius: 22px;
      --glass-blur: 18px;
      --glass-shadow:
        0 2px 6px rgba(0,0,0,0.15),
        0 8px 22px rgba(0,0,0,0.20);

      --text-main: #ffffff;
      --text-soft: rgba(255,255,255,0.78);

      --rubi-1:#941a1d;
      --rubi-2:#d82327;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100vh;
    }

    /* =========================
       FUNDO – MESMO DO PAINEL
    ========================== */
    body{
      font-family:"Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--text-main);
      background:url("img/bg-painel-smart.png") center/cover no-repeat fixed;
      color-scheme:dark;
      -webkit-font-smoothing:antialiased;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    /* =========================
       CARD PRINCIPAL GLASS
    ========================== */
    .container{
      background:rgba(10,10,12,0.88);
      border-radius:var(--glass-radius);
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:var(--glass-shadow);
      backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));
      padding:28px 24px 30px;
      width:100%;
      max-width:380px;
      text-align:center;
      position:relative;
      overflow:hidden;
      animation:fadeIn .6s ease-in-out;
    }

    .container::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 20%,
        transparent 45%
      );
      pointer-events:none;
    }

    .container > *{
      position:relative;
      z-index:1;
    }

    .logo{
      width:90px;
      margin-bottom:10px;
      filter:drop-shadow(0 10px 26px rgba(0,0,0,0.85));
    }

    h2{
      margin-bottom:18px;
      color:#fff;
      font-weight:800;
      font-size:1.35rem;
      text-shadow:0 10px 26px rgba(0,0,0,0.9);
    }

    /* =========================
       FORM / CAMPOS
    ========================== */
    form{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    input, select{
      width:100%;
      padding:11px 12px;
      margin:0;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.28);
      font-size:0.95rem;
      background:rgba(0,0,0,0.45);
      color:#ffffff;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    }

    input::placeholder{
      color:var(--text-soft);
    }

    input:focus, select:focus{
      border-color:rgba(255,255,255,0.80);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.36),
        0 10px 26px rgba(0,0,0,0.9);
    }

    /* =========================
       BOTÃO – RUBI GLASS
    ========================== */
    button{
      width:100%;
      padding:12px;
      margin-top:6px;
      background:linear-gradient(135deg,var(--rubi-1),var(--rubi-2));
      color:white;
      border:none;
      border-radius:999px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 10px 26px rgba(0,0,0,0.85);
      transition:
        background .18s ease,
        transform .18s ease,
        box-shadow .18s ease,
        filter .18s ease;
    }

    button:hover{
      filter:brightness(1.06);
      transform:translateY(-2px);
      box-shadow:0 14px 32px rgba(0,0,0,0.95);
    }

    button:active{
      transform:translateY(0);
      box-shadow:0 8px 22px rgba(0,0,0,0.85);
    }

    .mensagem{
      font-size:0.9rem;
      margin-top:10px;
      min-height:18px;
    }

    .voltar{
      margin-top:15px;
      display:block;
      font-size:0.9rem;
      color:#ffffff;
      text-decoration:none;
      opacity:.85;
    }

    .voltar:hover{
      text-decoration:underline;
      opacity:1;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    @media (max-width:480px){
      .container{
        padding:22px 18px 26px;
        border-radius:18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-final.jpg" alt="Logo do Colégio" class="logo" />
    <h2>Cadastrar Usuário</h2>
    <form id="formCadastro">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="E-mail institucional" required />
      <input type="password" id="senha" placeholder="Senha (mín. 6 caracteres)" required />
      <!-- Campo apenas informativo (backend usa a instituição do admin logado) -->
      <input type="text" id="instituicao" placeholder="Instituição (ex: Colégio Militar D. Pedro II)" />
      <select id="tipo" required>
        <option value="">Selecione o tipo de usuário</option>
        <option value="admin">Administrador</option>
        <option value="monitor">Monitor</option>
        <option value="professor">Professor</option>
      </select>
      <button type="submit">Cadastrar</button>
      <div class="mensagem" id="mensagem"></div>
    </form>
    <a href="/login.html" class="voltar">⬅ Voltar para o login</a>
  </div>

  <script>
    // 🔧 limpeza em dev local
    if (['localhost', '127.0.0.1'].includes(location.hostname)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(regs => regs.forEach(r => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
      console.log('[DEV] caches limpos');
    }

    // ✅ API_BASE:
    // - Se estiver no Vite (:5173), a API está no :5000
    // - Caso contrário (Render/produção ou Express servindo HTML), mesma origem
    const API_BASE = (location.port === '5173') ? 'http://localhost:5000' : '';

    // 🔒 restrito a admin
    async function verificarPermissao() {
      try {
        const resp = await fetch(`${API_BASE}/auth/usuario-logado`, { credentials: 'include', cache: 'no-store' });
        if (!resp.ok) { location.href = '/login.html'; return; }
        const user = await resp.json();
        if (user.tipo !== 'admin') {
          alert('Apenas administradores podem acessar esta página.');
          location.href = '/painel.html';
        }
      } catch {
        location.href = '/login.html';
      }
    }
    verificarPermissao();

    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nomeVal = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const tipo = document.getElementById('tipo').value;
      const msg = document.getElementById('mensagem');
      msg.textContent = '';

      if (senha.length < 6) {
        msg.style.color = 'red';
        msg.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        return;
      }

      try {
        const r = await fetch(`${API_BASE}/auth/cadastrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          // 🔴 NÃO enviamos mais "instituicao" aqui.
          body: JSON.stringify({ nome: nomeVal, email, senha, tipo })
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok) {
          msg.style.color = 'lightgreen';
          msg.textContent = '✅ Usuário cadastrado com sucesso!';
          e.target.reset();
          setTimeout(() => (msg.textContent = ''), 5000);
        } else {
          msg.style.color = 'red';
          msg.textContent = data.mensagem || 'Erro ao cadastrar.';
        }
      } catch {
        msg.style.color = 'red';
        msg.textContent = 'Erro de conexão com o servidor.';
      }
    });
  </script>
</body>
</html>
