<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧾 Logs do Sistema - CMDPII</title>
  <meta name="theme-color" content="#8B0000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <style>
    :root{
      --rubi-1:#8B0000; --rubi-2:#B22222;
      --glass-bg: rgba(255,255,255,.07);
      --glass-border: rgba(255,255,255,.25);
      --text:#f2f4f8; --text-soft:#cfd6de;
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:#1e0506;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    body::before{
      content:"";
      position:fixed;inset:0;z-index:0;
      background:
        linear-gradient(45deg, rgba(255,120,120,.06) 25%, transparent 25%, transparent 75%, rgba(255,120,120,.06) 75%) 0 0/16px 16px,
        linear-gradient(45deg, rgba(0,0,0,.28) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.28) 75%) 8px 8px/16px 16px,
        linear-gradient(0deg, #2a0607, #3c0a0d);
      filter:saturate(125%);
    }
    body::after{
      content:"";
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(1100px 600px at 50% -10%, rgba(255,90,90,.10), transparent 60%),
        radial-gradient(1200px 800px at 50% 120%, rgba(0,0,0,.55), transparent 65%);
    }
    h1{
      color:#fff;
      font-size:clamp(24px,3vw,36px);
      text-align:center;
      font-weight:800;
      margin:40px 0 16px;
      text-shadow:0 4px 10px rgba(0,0,0,.4);
      z-index:1;
    }
    .wrap{
      position:relative;z-index:1;
      width:min(1100px,90%);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--radius);
      backdrop-filter:blur(12px);
      box-shadow:0 10px 28px rgba(0,0,0,.45);
      padding:24px 28px 36px;
      margin-bottom:60px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
      gap:12px;
    }
    .btn{
      border:0;
      border-radius:10px;
      background:var(--rubi-2);
      color:#fff;
      padding:10px 18px;
      font-size:.95rem;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.35);
      transition:.2s;
    }
    .btn:hover{background:var(--rubi-1);transform:translateY(-1px);}
    input[type="search"]{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.1);
      color:#fff;
      min-width:260px;
    }
    input::placeholder{color:rgba(255,255,255,.6)}
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }
    th,td{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.1);
      font-size:.9rem;
    }
    th{
      background:var(--rubi-1);
      color:#fff;
      text-align:left;
      font-weight:600;
    }
    tr:nth-child(even){background:rgba(255,255,255,.04);}
    .pill{
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.25);
      border-radius:999px;
      padding:3px 10px;
      font-size:.8rem;
    }
    .muted{color:var(--text-soft);font-size:.8rem;}
    .empty{padding:16px;text-align:center;color:var(--text-soft);}
    #erro{color:#ff8a8a;text-align:center;margin:8px 0;}
    .paginacao{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:22px;
    }
    .paginacao button{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.2);
      border-radius:8px;
      padding:6px 10px;
      cursor:pointer;
    }
    .paginacao button:hover{background:rgba(255,255,255,.18);}
    .ativo{background:var(--rubi-2)!important;}
  </style>
</head>
<body>
  <h1>🧾 Logs de Auditoria do Sistema</h1>
  <div class="wrap">
    <div class="topbar">
      <button class="btn" onclick="window.location.href='painel.html'">⬅️ Voltar ao Painel</button>
      <div class="right">
        <input id="busca" type="search" placeholder="Filtrar por usuário, ação ou aluno…" />
        <button id="btnAtualizar" class="btn">🔄 Atualizar</button>
      </div>
    </div>
    <div id="erro"></div>
    <table>
      <thead>
        <tr>
          <th style="width:22%">Usuário</th>
          <th style="width:18%">Ação</th>
          <th style="width:28%">Aluno / Entidade</th>
          <th style="width:18%">ID da Entidade</th>
          <th style="width:14%">Data e Hora</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td class="empty" colspan="5">Carregando…</td></tr>
      </tbody>
    </table>
    <div class="paginacao" id="paginacao"></div>
  </div>

  <script>
    const API = (p)=> p.startsWith('http') ? p : (p.startsWith('/api') ? p : `/api${p.startsWith('/')?p:'/'+p}`);
    let paginaAtual = 1, totalPaginas = 1;

    async function getJSON(url){
      const r = await fetch(API(url), { credentials:'include', cache:'no-store' });
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }

    const tbody=document.getElementById('tbody');
    const erro=document.getElementById('erro');
    const busca=document.getElementById('busca');
    const paginacao=document.getElementById('paginacao');

    function fmtDt(v){ try{const d=new Date(v);return d.toLocaleString('pt-BR');}catch{return '—';} }
    function s(s){return (s??'').toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

    function renderRows(logs){
      if(!Array.isArray(logs)||!logs.length){
        tbody.innerHTML='<tr><td class="empty" colspan="5">Nenhum log encontrado.</td></tr>';
        return;
      }
      const q=(busca.value||'').toLowerCase();
      tbody.innerHTML=logs.filter(l=>{
        const all=(l.usuarioNome+l.acao+l.alunoNome+l.entidade+l.entidadeId).toLowerCase();
        return all.includes(q);
      }).map(l=>`
        <tr>
          <td>${s(l.usuarioNome||'—')}<div class="muted">${s(l.usuarioTipo||'')}</div></td>
          <td><span class="pill">${s(l.acao||'—')}</span></td>
          <td>${s(l.alunoNome||l.entidadeNome||'—')}<div class="muted">${s(l.entidade||'')}</div></td>
          <td class="muted">${s(l.entidadeId||'—')}</td>
          <td>${fmtDt(l.data||l.createdAt)}</td>
        </tr>`).join('');
    }

    function renderPagination(){
      paginacao.innerHTML='';
      if(totalPaginas<=1)return;
      for(let i=1;i<=totalPaginas;i++){
        const btn=document.createElement('button');
        btn.textContent=i;
        if(i===paginaAtual)btn.classList.add('ativo');
        btn.onclick=()=>{paginaAtual=i;carregarLogs();};
        paginacao.appendChild(btn);
      }
    }

    async function carregarLogs(){
      erro.textContent='';
      tbody.innerHTML='<tr><td class="empty" colspan="5">Carregando…</td></tr>';
      try{
        const res=await getJSON(`/api/logs?page=${paginaAtual}&limit=20`);
        const data=Array.isArray(res)?res:(res.data||[]);
        totalPaginas=Math.ceil((res.total||data.length)/20)||1;
        renderRows(data);
        renderPagination();
      }catch(e){
        erro.textContent='⚠️ Sessão expirada ou erro ao carregar.';
        tbody.innerHTML='<tr><td class="empty" colspan="5">Erro ao carregar logs.</td></tr>';
      }
    }

    document.getElementById('btnAtualizar').onclick=carregarLogs;
    busca.oninput=()=>carregarLogs();

    carregarLogs();
  </script>
</body>
</html>
