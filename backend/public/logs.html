<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs de Auditoria do Sistema</title>
  <meta name="theme-color" content="#8B0000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    :root {
      --rubi-1:#8B0000; --rubi-2:#B22222;
      --bg:#f9f9f9; --white:#fff; --text:#222; --sub:#555;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }
    h1 { margin: 8px 0 18px; color: var(--rubi-1); text-align: center; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }
    th { background: var(--rubi-1); color: #fff; position: sticky; top: 0; }
    tr:nth-child(even) { background: #fafafa; }
    .muted { color: var(--sub); font-size: 12px; }
    .pill {
      display: inline-block; padding: 2px 8px;
      border-radius: 999px; border: 1px solid #ddd;
      background: #f3f3f3; font-size: 12px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .topbar {
      display: flex; gap: 10px; align-items: center;
      justify-content: space-between; margin: 12px 0;
    }
    .btn {
      border: 0; border-radius: 8px; background: var(--rubi-2);
      color: #fff; padding: 10px 14px; cursor: pointer;
    }
    .btn:hover { background: var(--rubi-1); }
    .right { display: flex; gap: 8px; align-items: center; }
    input[type="search"] {
      padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px;
      min-width: 220px;
    }
    .empty { padding: 16px; text-align: center; color: #777; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📜 Logs de Auditoria do Sistema</h1>

    <div class="topbar">
      <a class="btn" href="painel.html">⬅️ Voltar ao Painel</a>
      <div class="right">
        <input id="busca" type="search" placeholder="Filtrar por usuário, ação, aluno…" />
        <button id="btnAtualizar" class="btn">Atualizar</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Ação</th>
          <th>Aluno / Entidade</th>
          <th>ID da Entidade</th>
          <th>Data e Hora</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty">Carregando…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const API = (p)=> p.startsWith('http') ? p : (p.startsWith('/api') ? p : `/api${p.startsWith('/')?p:'/'+p}`);

    async function getJSON(url){
      const r = await fetch(API(url), { credentials:'include', cache:'no-store' });
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }

    const tbody = document.getElementById('tbody');
    const busca = document.getElementById('busca');

    function fmtDt(v){
      try { return new Date(v).toLocaleString('pt-BR'); } catch { return '—'; }
    }
    function esc(s){ return (s??'').toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

    function renderRows(arr){
      if(!arr?.length){
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Nenhum log registrado.</td></tr>`;
        return;
      }

      const q = (busca.value||'').trim().toLowerCase();
      const rows = arr
        .filter(l=>{
          if(!q) return true;
          return [l.usuarioNome, l.usuarioTipo, l.acao, l.entidade, l.alunoNome, l.entidadeNome]
            .filter(Boolean)
            .some(f=>f.toLowerCase().includes(q));
        })
        .map(l=>{
          const usuario = esc(l.usuarioNome || l.usuario || '—');
          const tipo = esc(l.usuarioTipo || '');
          const acao = esc(l.acao);
          const alvo = esc(l.alunoNome || l.entidadeNome || l.entidade);
          const id = esc(l.entidadeId);
          const dt = fmtDt(l.createdAt);

          return `<tr>
            <td>${usuario}<div class="muted">${tipo}</div></td>
            <td><span class="pill">${acao}</span></td>
            <td>${alvo}</td>
            <td class="muted">${id}</td>
            <td>${dt}</td>
          </tr>`;
        }).join('');

      tbody.innerHTML = rows;
    }

    async function carregarLogs(){
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Carregando…</td></tr>`;
      try {
        const data = await getJSON('/api/logs?limit=200');
        const list = Array.isArray(data) ? data : data.data;
        renderRows(list);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Erro ao carregar logs.</td></tr>`;
        console.error(e);
      }
    }

    document.getElementById('btnAtualizar').addEventListener('click', carregarLogs);
    busca.addEventListener('input', carregarLogs);
    carregarLogs();
  </script>
</body>
</html>
