<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧾 Logs do Sistema - CMDPII</title>
  <meta name="theme-color" content="#0A1322" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <style>
    :root{
      --text:#e5f0ff;
      --text-soft:#9ca9c7;
      --accent:#38bdf8;
      --accent-soft:rgba(56,189,248,0.25);

      --card-bg:rgba(15,23,42,0.92);
      --card-border:rgba(148,163,184,0.5);

      --radius:20px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:28px 14px 60px;

      /* 🔵 FUNDO PADRÃO DO PAINEL */
      background:
        url("/bg-painel-smart.png") center/cover no-repeat fixed,
        linear-gradient(145deg, #020617cc, #0b1120cc);
      background-blend-mode:overlay;
      color-scheme:dark;
    }

    h1{
      color:#f9fafb;
      font-size:clamp(24px,3vw,34px);
      font-weight:800;
      margin-bottom:18px;
      text-shadow:0 4px 16px rgba(0,0,0,.7);
      letter-spacing:.06em;
      position:relative;
      z-index:3;
    }

    /* 🔵 CARD GLASS */
    .wrap{
      position:relative;
      z-index:3;
      width:min(1100px,92%);
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:var(--radius);
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.85),
        0 0 0 1px rgba(15,23,42,0.9);
      padding:22px 22px 30px;
      overflow:hidden;
    }

    /* brilho interno */
    .wrap::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        radial-gradient(circle at 0 0, var(--accent-soft), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(59,130,246,0.18), transparent 55%);
      opacity:0.9;
      pointer-events:none;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
      gap:10px 14px;
      position:relative;
      z-index:5;
    }

    /* BOTÕES */
    .btn{
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,#1d4ed8,#38bdf8);
      color:#fff;
      padding:10px 18px;
      font-size:.92rem;
      cursor:pointer;
      box-shadow:
        0 10px 24px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.8);
      transition:.18s;
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }
    .btn:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
      box-shadow:
        0 16px 34px rgba(15,23,42,1),
        0 0 0 1px rgba(56,189,248,0.7);
    }

    input[type="search"]{
      padding:10px 13px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.6);
      background:linear-gradient(180deg,rgba(15,23,42,0.96),rgba(15,23,42,0.98));
      color:#e5f0ff;
      min-width:260px;
      font-size:.9rem;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 8px 18px rgba(15,23,42,0.9);
    }
    input[type="search"]:focus{
      outline:none;
      border-color:#38bdf8;
      box-shadow:
        0 0 0 2px rgba(56,189,248,0.6),
        0 10px 24px rgba(15,23,42,1);
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:.9rem;
      margin-top:8px;
      position:relative;
      z-index:4;
    }

    th,td{
      padding:12px 14px;
      border-bottom:1px solid rgba(148,163,184,0.20);
    }

    th{
      background:rgba(15,23,42,0.92);
      color:#e5edff;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.04em;
      font-size:.8rem;
      position:sticky;
      top:0;
      z-index:6;
      border-bottom:1px solid rgba(56,189,248,0.6);
    }

    tbody tr:nth-child(even){
      background:rgba(15,23,42,0.78);
    }
    tbody tr:nth-child(odd){
      background:rgba(15,23,42,0.72);
    }
    tbody tr:hover{
      background:rgba(30,64,175,0.55);
    }

    .pill{
      background:rgba(56,189,248,0.18);
      border:1px solid rgba(148,216,255,0.8);
      border-radius:999px;
      padding:3px 10px;
      font-size:.78rem;
      display:inline-block;
      letter-spacing:.05em;
    }

    .muted{
      color:var(--text-soft);
      font-size:.78rem;
      margin-top:2px;
    }

    .empty{
      padding:16px;
      text-align:center;
      color:var(--text-soft);
    }

    #erro{
      color:#fecaca;
      font-size:.9rem;
      min-height:18px;
      margin-bottom:8px;
      text-align:center;
    }

    .paginacao{
      margin-top:20px;
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
      position:relative;
      z-index:4;
    }

    .paginacao button{
      background:rgba(15,23,42,0.92);
      color:#e5f0ff;
      border:1px solid rgba(148,163,184,0.6);
      border-radius:999px;
      padding:6px 10px;
      cursor:pointer;
      font-size:.85rem;
      box-shadow:0 6px 16px rgba(15,23,42,0.9);
    }

    .paginacao button.ativo{
      background:linear-gradient(135deg,#1d4ed8,#38bdf8);
      border-color:#bcdfff;
      color:#fff;
    }

    @media (max-width:600px){
      input[type="search"]{
        width:100%;
        min-width:0;
      }
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }
      .btn{
        width:100%;
        justify-content:center;
      }
    }

  </style>
</head>

<body>
  <h1>🧾 Logs de Auditoria do Sistema</h1>

  <div class="wrap">
    <div class="topbar">
      <button class="btn" onclick="window.location.href='painel.html'">⬅ Voltar ao Painel</button>

      <div class="right" style="display:flex; gap:10px; flex-wrap:wrap;">
        <input id="busca" type="search" placeholder="Filtrar por usuário, ação ou aluno…" />
        <button id="btnAtualizar" class="btn">🔄 Atualizar</button>
      </div>
    </div>

    <div id="erro"></div>

    <table>
      <thead>
        <tr>
          <th style="width:22%">Usuário</th>
          <th style="width:18%">Ação</th>
          <th style="width:28%">Aluno / Entidade</th>
          <th style="width:18%">ID da Entidade</th>
          <th style="width:14%">Data e Hora</th>
        </tr>
      </thead>

      <tbody id="tbody">
        <tr><td class="empty" colspan="5">Carregando…</td></tr>
      </tbody>
    </table>

    <div class="paginacao" id="paginacao"></div>
  </div>

  <!-- 🔵 JS ORIGINAL INALTERADO -->
  <script>
    const API = (p)=> p.startsWith('http') ? p : (p.startsWith('/api') ? p : `/api${p.startsWith('/')?p:'/'+p}`);
    let paginaAtual = 1, totalPaginas = 1;

    async function getJSON(url){
      const r = await fetch(API(url), { credentials:'include', cache:'no-store' });
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }

    const tbody=document.getElementById('tbody');
    const erro=document.getElementById('erro');
    const busca=document.getElementById('busca');
    const paginacao=document.getElementById('paginacao');

    function fmtDt(v){
      try{
        const d=new Date(v);
        return d.toLocaleString('pt-BR');
      }catch{return '—';}
    }

    function s(s){
      return (s??'').toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    }

    function renderRows(logs){
      if(!Array.isArray(logs)||!logs.length){
        tbody.innerHTML='<tr><td class="empty" colspan="5">Nenhum log encontrado.</td></tr>';
        return;
      }
      const q=(busca.value||'').toLowerCase();
      tbody.innerHTML=logs.filter(l=>{
        const all=(l.usuarioNome+l.acao+l.alunoNome+l.entidade+l.entidadeId).toLowerCase();
        return all.includes(q);
      }).map(l=>`
        <tr>
          <td>${s(l.usuarioNome||'—')}<div class="muted">${s(l.usuarioTipo||'')}</div></td>
          <td><span class="pill">${s(l.acao||'—')}</span></td>
          <td>${s(l.alunoNome||l.entidadeNome||'—')}<div class="muted">${s(l.entidade||'')}</div></td>
          <td class="muted">${s(l.entidadeId||'—')}</td>
          <td>${fmtDt(l.data||l.createdAt)}</td>
        </tr>`).join('');
    }

    function renderPagination(){
      paginacao.innerHTML='';
      if(totalPaginas<=1)return;
      for(let i=1;i<=totalPaginas;i++){
        const btn=document.createElement('button');
        btn.textContent=i;
        if(i===paginaAtual)btn.classList.add('ativo');
        btn.onclick=()=>{paginaAtual=i;carregarLogs();};
        paginacao.appendChild(btn);
      }
    }

    async function carregarLogs(){
      erro.textContent='';
      tbody.innerHTML='<tr><td class="empty" colspan="5">Carregando…</td></tr>';
      try{
        const res=await getJSON(`/logs?page=${paginaAtual}&limit=20`);
        const data=Array.isArray(res)?res:(res.data||[]);
        totalPaginas=Math.ceil((res.total||data.length)/20)||1;
        renderRows(data);
        renderPagination();
      }catch(e){
        erro.textContent='⚠️ Sessão expirada ou erro ao carregar.';
        tbody.innerHTML='<tr><td class="empty" colspan="5">Erro ao carregar logs.</td></tr>';
      }
    }

    document.getElementById('btnAtualizar').onclick=carregarLogs;
    busca.oninput=()=>carregarLogs();
    carregarLogs();
  </script>

  <script src="notify.js"></script>
</body>
</html>
