<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações Disciplinares</title>
  <meta name="theme-color" content="#8B0000" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  <style>
    :root{
      --rubi-1:#8B0000;
      --rubi-2:#B22222;
      --line:#ffffff2b;
      --text:#f2f4f8;
      --text-soft:#cfd6de;
      --bg:#1e0506;
      --glass:#ffffff10;
      --glass-2:#0000002c;
      --ok:#10a03c45;
      --warn:#ffb00030;
      --muted:#b4b4b430;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;
      color:var(--text);
      background:
        url("img/bg-painel-smart.png") center/cover fixed no-repeat,
        var(--bg);
      min-height:100vh;
    }

    .page{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:280px 1fr;
      gap:20px;
      padding:24px;
    }

    @media (max-width:1024px){
      .page{ grid-template-columns:1fr; }
    }

    @media (max-width:768px){
      .page{
        display:flex;
        flex-direction:column;
        padding:10px 8px 18px;
        gap:12px;
      }
    }

    .sidebar{
      display:flex;
      flex-direction:column;
      gap:10px;
      height:calc(100dvh - 48px);
      position:sticky;
      top:24px;
      border-radius:20px;
      background:var(--glass);
      border:1px solid #ffffff24;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px #0006;
    }

    .sb-head{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px;
      border-bottom:1px solid #ffffff24;
    }

    .brand{
      width:36px;
      height:36px;
      border-radius:12px;
      background:var(--rubi-1);
      box-shadow:inset 0 0 0 2px #ffffff44;
    }

    .sb-title{font-weight:700}

    .nav{
      padding:10px;
      display:grid;
      gap:6px;
    }

    .nav a{
      text-decoration:none;
      color:var(--text);
      font-size:.95rem;
      padding:10px 12px;
      border-radius:12px;
      display:flex;
      gap:10px;
      border:1px solid transparent;
    }

    .nav a:hover{
      background:#ffffff14;
      border-color:#ffffff2d;
    }

    .nav a.active{
      background:#ffffff22;
      border-color:#ffffff44;
      box-shadow:0 6px 20px #0005;
    }

    .sb-foot{
      margin-top:auto;
      padding:12px;
      border-top:1px solid #ffffff24;
    }

    .sb-logout{
      width:100%;
      border:0;
      background:var(--rubi-2);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .sb-logout:hover{
      background:var(--rubi-1);
    }

    @media (max-width:768px){
      .sidebar{
        position:static;
        top:auto;
        height:auto;
        border-radius:18px;
      }

      .sb-head{
        padding:12px 14px;
      }

      .brand{
        width:32px;
        height:32px;
        border-radius:10px;
      }

      .nav{
        display:flex;
        flex-wrap:nowrap;
        overflow-x:auto;
        padding:8px 8px 10px;
        gap:6px;
      }

      .nav::-webkit-scrollbar{
        height:4px;
      }

      .nav a{
        white-space:nowrap;
        font-size:.85rem;
        padding:8px 10px;
      }

      .sb-foot{
        padding:8px 12px 10px;
      }

      .sb-logout{
        font-size:.9rem;
        padding:8px 10px;
      }
    }

    .content .wrap{
      width:min(1220px,100%);
      margin:0 auto 84px;
    }

    @media (max-width:768px){
      .content .wrap{
        margin:0 auto 40px;
      }
    }

    .card{
      background:var(--glass);
      border:1px solid #ffffff24;
      border-radius:24px;
      backdrop-filter:blur(8px);
      box-shadow:0 10px 28px #0006;
      padding:26px 24px 30px;
    }

    @media (max-width:768px){
      .card{
        padding:18px 12px 22px;
        border-radius:18px;
      }
    }

    h2{
      margin:0 0 16px;
      text-align:center;
      color:#fff;
      text-shadow:0 2px 6px #0004;
      font-size:1.4rem;
    }

    @media (max-width:480px){
      h2{font-size:1.2rem;}
    }

    .mode-tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:6px 0 16px;
    }

    .mode-tab{
      border:1px solid var(--line);
      background:var(--glass-2);
      color:#fff;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:600;
      min-width:170px;
      text-align:center;
    }

    .mode-tab:hover{
      background:#00000040;
    }

    .mode-tab.active{
      background:var(--rubi-1);
      border-color:var(--rubi-1);
      box-shadow:0 10px 24px #0004;
    }

    .filters{
      display:grid;
      grid-template-columns:1fr 1fr 160px 160px 140px;
      gap:12px;
      margin:12px 0 8px;
    }

    .filters label{
      display:block;
      margin:0 0 6px;
      font-weight:700;
      color:var(--text-soft);
    }

    .filters input,
    .filters select{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--glass-2);
      color:#fff;
    }

    @media (max-width:900px){
      .filters{grid-template-columns:1fr 1fr 1fr}
    }

    @media (max-width:600px){
      .filters{grid-template-columns:1fr}
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:6px 0 12px;
      align-items:center;
    }

    .chip{
      padding:6px 10px;
      border:1px solid var(--line);
      background:var(--glass-2);
      color:#fff;
      border-radius:999px;
      cursor:pointer;
      font-size:.9rem;
    }

    .chip:hover{
      background:#00000040;
    }

    .actions-top{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-left:auto;
    }

    .btn{
      padding:8px 12px;
      border:1px solid var(--line);
      background:var(--glass-2);
      color:#fff;
      border-radius:10px;
      cursor:pointer;
    }

    .btn:hover{
      background:#00000040;
    }

    @media (max-width:600px){
      .chips{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions-top{
        width:100%;
        margin-left:0;
        margin-top:4px;
        justify-content:flex-start;
      }

      .actions-top .btn{
        width:100%;
        text-align:center;
      }
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin:8px 0 10px;
      flex-wrap:wrap;
    }

    .counter{
      color:var(--text-soft);
      font-size:.92rem;
    }

    .pager{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pager button{
      padding:6px 10px;
      border:1px solid var(--line);
      background:var(--glass-2);
      color:#fff;
      border-radius:10px;
      cursor:pointer;
    }

    .pager button[disabled]{
      opacity:.5;
      cursor:not-allowed;
    }

    .pager .current{
      background:var(--rubi-1);
      border-color:var(--rubi-1);
    }

    .columns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:12px;
    }

    .columns.single{
      grid-template-columns:1fr;
    }

    @media (max-width:1100px){
      .columns{grid-template-columns:1fr}
    }

    .col{
      border:1px dashed #ffffff25;
      border-radius:16px;
      padding:12px;
    }

    .col h3{
      margin:0 0 8px;
      font-size:1.05rem;
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
    }

    .col h3 .count{
      color:var(--text-soft);
      font-weight:500;
      font-size:.9rem;
    }

    .col .col-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .list{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .empty{
      opacity:.78;
      text-align:center;
      padding:18px;
      border:1px dashed #ffffff2c;
      border-radius:12px;
    }

    .n-card{
      border:1px solid #ffffff24;
      background:#ffffff10;
      border-radius:16px;
      box-shadow:0 14px 30px #0005;
      overflow:hidden;
    }

    .n-head{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
      padding:12px 14px;
      cursor:pointer;
    }

    @media (max-width:700px){
      .n-head{
        grid-template-columns:1fr;
        align-items:flex-start;
      }

      .n-head > div:last-child{
        justify-self:flex-start;
      }
    }

    .n-title{font-weight:700}

    .n-sub{
      color:var(--text-soft);
      font-size:.9rem;
    }

    .badge{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #ffffff38;
      background:#00000030;
      font-size:.8rem;
      display:inline-flex;
      align-items:center;
      gap:4px;
      margin:2px 2px 0 0;
    }

    .status-pendente{background:var(--warn)}
    .status-deferido{background:var(--ok)}
    .status-revisao_solicitada{background:#ffd20035}
    .status-arquivado{background:var(--muted)}

    .n-body{
      display:none;
      border-top:1px dashed #ffffff2c;
      padding:12px 14px;
    }

    .n-row{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }

    @media (max-width:800px){
      .n-row{grid-template-columns:1fr}
    }

    .n-kv{
      background:var(--glass-2);
      border:1px solid #ffffff24;
      border-radius:10px;
      padding:8px;
      font-size:.9rem;
    }

    .n-kv b{
      display:block;
      color:var(--text-soft);
      font-size:.85rem;
      margin-bottom:2px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .actions button,
    .actions a{
      margin:0;
      padding:8px 12px;
      font-size:14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
    }

    .pdf-btn{background:#007bff;color:#fff}
    .edit-btn{background:#ffc107;color:#000}
    .delete-btn{background:#dc3545;color:#fff}
    .reenviar-btn{background:#28a745;color:#fff}
    .comunicacao-btn{background:#0ea5e9;color:#fff}

    .entregue-wrap{
      display:inline-flex;
      gap:6px;
      align-items:center;
      margin-left:8px;
      font-size:.85rem;
    }

    .entregue-wrap input{
      accent-color:#10a03c;
      width:18px;
      height:18px;
      cursor:pointer;
    }

    .prazo-chip{
      margin-left:8px;
      font-size:.8rem;
      border-radius:999px;
      padding:4px 8px;
      border:1px solid #ffffff2c;
      background:#00000040;
      display:inline-flex;
      align-items:center;
      gap:4px;
      margin-top:4px;
    }

    .prazo-chip.atraso{
      border-color:#ff7878a3;
      background:#ff00002e;
    }

    .hint{
      color:var(--text-soft);
      font-size:.85rem;
      margin-top:6px;
    }

    .spinner{
      display:inline-block;
      width:22px;
      height:22px;
      border:3px solid #ffffff2f;
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .7s linear infinite;
      vertical-align:-5px;
      margin-right:8px;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .voltar-btn{
      margin-top:16px;
      border:1px solid var(--line);
      background:#0000002c;
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      width:100%;
      max-width:220px;
    }

    .voltar-btn:hover{
      background:#00000040;
    }

    @media (max-width:480px){
      .voltar-btn{
        max-width:100%;
        text-align:center;
      }
    }

    .hidden{
      display:none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar" aria-label="Navegação lateral">
      <div class="sb-head">
        <div class="brand"></div>
        <div>
          <div class="sb-title">CMDPII</div>
          <div style="font-size:.8rem;color:#cfd6de">Sistema Escolar</div>
        </div>
      </div>

      <nav class="nav">
        <a href="painel.html">🏠 Painel</a>
        <a href="lista-alunos.html">👥 Alunos</a>
        <a class="active" href="/notificacoes">🔔 Notificações</a>
        <a href="estatisticas.html">📉 Relatórios</a>
        <a href="mensagens.html">✉️ Mensagens</a>
        <a href="usuarios.html">⚙️ Administração</a>
        <a href="logs.html">🧾 Logs</a>
      </nav>

      <div class="sb-foot">
        <button class="sb-logout" onclick="logout()">🚪 Sair</button>
      </div>
    </aside>

    <main class="content">
      <div class="wrap">
        <section class="card">
          <h2>Notificações Disciplinares</h2>

          <div class="mode-tabs">
            <button class="mode-tab active" id="tabPrincipal" data-mode="principal">📋 Notificações Ativas</button>
            <button class="mode-tab" id="tabPendentes" data-mode="pendentes">⏳ Pendentes do Coordenador</button>
            <button class="mode-tab" id="tabArquivadas" data-mode="arquivadas">📁 Notificações Arquivadas</button>
            <button class="mode-tab" id="tabAntigas" data-mode="antigas">🗂️ Notificações Antigas</button>
          </div>

          <div class="filters">
            <div>
              <label for="filtroTurma">Filtrar por turma</label>
              <select id="filtroTurma">
                <option value="">Todas</option>
              </select>
            </div>

            <div>
              <label for="pesquisaNome">Pesquisar por nome</label>
              <input type="text" id="pesquisaNome" placeholder="Digite o nome do aluno..." />
            </div>

            <div>
              <label for="dataDe">Data (De)</label>
              <input type="date" id="dataDe" />
            </div>

            <div>
              <label for="dataAte">Data (Até)</label>
              <input type="date" id="dataAte" />
            </div>

            <div>
              <label for="porPaginaSel">Itens por página</label>
              <select id="porPaginaSel">
                <option selected>10</option>
                <option>20</option>
                <option>30</option>
                <option>50</option>
              </select>
            </div>
          </div>

          <div class="chips">
            <button class="chip" id="chipHoje">Hoje</button>
            <button class="chip" id="chip7">Últimos 7 dias</button>
            <button class="chip" id="chip30">Últimos 30 dias</button>
            <button class="chip" id="chipLimpar">Limpar período</button>

            <div class="actions-top">
              <button class="btn" id="btnAtualizar">🔄 Atualizar</button>
              <button class="btn" id="btnCsv">⬇️ Exportar CSV (filtro atual)</button>
            </div>
          </div>

          <div class="toolbar">
            <div class="counter" id="resumoResultados">—</div>
          </div>

          <div class="columns" id="blocoPrincipal">
            <div class="col">
              <h3>✅ Deferidas <span class="count" id="countDeferidas">—</span></h3>
              <div class="col-toolbar">
                <div class="counter" id="resumoDef">—</div>
                <div id="pagDef" class="pager"></div>
              </div>
              <div id="listaDeferidas" class="list"></div>
            </div>

            <div class="col">
              <h3>📌 Em andamento <span class="count" id="countPendentesPrincipal">—</span></h3>
              <div class="col-toolbar">
                <div class="counter" id="resumoPenPrincipal">—</div>
                <div id="pagPenPrincipal" class="pager"></div>
              </div>
              <div id="listaPendentesPrincipal" class="list"></div>
            </div>
          </div>          <div class="columns single hidden" id="blocoPendentes">
            <div class="col">
              <h3>⏳ Pendentes do Coordenador <span class="count" id="countPendentesModo">—</span></h3>
              <div class="col-toolbar">
                <div class="counter" id="resumoPendentesModo">—</div>
                <div id="pagPendentesModo" class="pager"></div>
              </div>
              <div id="listaPendentesModo" class="list"></div>
            </div>
          </div>

          <div class="columns single hidden" id="blocoArquivadas">
            <div class="col">
              <h3>📁 Arquivadas / Devolvidas <span class="count" id="countArquivadas">—</span></h3>
              <div class="col-toolbar">
                <div class="counter" id="resumoArquivadas">—</div>
                <div id="pagArquivadas" class="pager"></div>
              </div>
              <div id="listaArquivadas" class="list"></div>
            </div>
          </div>

          <div class="columns single hidden" id="blocoAntigas">
            <div class="col">
              <h3>🗂️ Notificações Antigas <span class="count" id="countAntigas">—</span></h3>
              <div class="col-toolbar">
                <div class="counter" id="resumoAntigas">—</div>
                <div id="pagAntigas" class="pager"></div>
              </div>
              <div id="listaAntigas" class="list"></div>
            </div>
          </div>

          <button class="voltar-btn" onclick="history.length>1?history.back():window.location.href='painel.html'">← Voltar</button>
        </section>
      </div>
    </main>
  </div>

  <script>
    const API = (p) => p.startsWith('http') ? p : (p.startsWith('/api') ? p : `/api${p.startsWith('/') ? p : '/' + p}`);

    async function logout() {
      try {
        await fetch(API('/auth/logout'), {
          method: 'POST',
          credentials: 'include',
          cache: 'no-store'
        });
      } catch {}
      location.href = './login.html';
    }

    function showError(msg) {
      let el = document.getElementById('errBanner');
      if (!el) {
        el = document.createElement('div');
        el.id = 'errBanner';
        el.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;padding:12px 14px;border-radius:10px;background:#5f1212;color:#fff;border:1px solid rgba(255,255,255,.25);box-shadow:0 10px 20px rgba(0,0,0,.4);z-index:9999;font:14px/1.3 system-ui';
        document.body.appendChild(el);
      }
      el.textContent = `Erro: ${msg}`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.remove(), 8000);
    }

    function showToast(msg) {
      let el = document.getElementById('okBanner');
      if (!el) {
        el = document.createElement('div');
        el.id = 'okBanner';
        el.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;padding:12px 14px;border-radius:10px;background:#0f5132;color:#d1e7dd;border:1px solid rgba(255,255,255,.25);box-shadow:0 10px 20px rgba(0,0,0,.4);z-index:9999;font:14px/1.3 system-ui';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.remove(), 4000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const filtroTurma = document.getElementById('filtroTurma');
      const pesquisaNome = document.getElementById('pesquisaNome');
      const porPaginaSel = document.getElementById('porPaginaSel');
      const resumoGeral = document.getElementById('resumoResultados');

      const dataDe = document.getElementById('dataDe');
      const dataAte = document.getElementById('dataAte');

      const chipHoje = document.getElementById('chipHoje');
      const chip7 = document.getElementById('chip7');
      const chip30 = document.getElementById('chip30');
      const chipLimpar = document.getElementById('chipLimpar');

      const btnCsv = document.getElementById('btnCsv');
      const btnAtualizar = document.getElementById('btnAtualizar');

      const tabPrincipal = document.getElementById('tabPrincipal');
      const tabPendentes = document.getElementById('tabPendentes');
      const tabArquivadas = document.getElementById('tabArquivadas');
      const tabAntigas = document.getElementById('tabAntigas');

      const blocoPrincipal = document.getElementById('blocoPrincipal');
      const blocoPendentes = document.getElementById('blocoPendentes');
      const blocoArquivadas = document.getElementById('blocoArquivadas');
      const blocoAntigas = document.getElementById('blocoAntigas');

      const listaDeferidas = document.getElementById('listaDeferidas');
      const listaPendentesPrincipal = document.getElementById('listaPendentesPrincipal');
      const listaPendentesModo = document.getElementById('listaPendentesModo');
      const listaArquivadas = document.getElementById('listaArquivadas');
      const listaAntigas = document.getElementById('listaAntigas');

      const countDeferidas = document.getElementById('countDeferidas');
      const countPendentesPrincipal = document.getElementById('countPendentesPrincipal');
      const countPendentesModo = document.getElementById('countPendentesModo');
      const countArquivadas = document.getElementById('countArquivadas');
      const countAntigas = document.getElementById('countAntigas');

      const resumoDef = document.getElementById('resumoDef');
      const resumoPenPrincipal = document.getElementById('resumoPenPrincipal');
      const resumoPendentesModo = document.getElementById('resumoPendentesModo');
      const resumoArquivadas = document.getElementById('resumoArquivadas');
      const resumoAntigas = document.getElementById('resumoAntigas');

      const pagDef = document.getElementById('pagDef');
      const pagPenPrincipal = document.getElementById('pagPenPrincipal');
      const pagPendentesModo = document.getElementById('pagPendentesModo');
      const pagArquivadas = document.getElementById('pagArquivadas');
      const pagAntigas = document.getElementById('pagAntigas');

      let modoAtual = 'principal';
      let porPagina = Number(porPaginaSel.value);

      let paginaDef = 1;
      let paginaPenPrincipal = 1;
      let paginaPendentesModo = 1;
      let paginaArquivadas = 1;
      let paginaAntigas = 1;

      let datasetAtual = [];
      let totalAtual = 0;

      let dsDef = [];
      let dsPenPrincipal = [];
      let dsPendentesModo = [];
      let dsArquivadas = [];
      let dsAntigas = [];

      const spinnerHTML = `<span class="spinner"></span>Carregando…`;

      const BASES = {
        'Advertência Escrita': -0.30,
        'Repreensão': -0.50,
        'A.E.C.D.E': -0.70,
        'A.I.A': -1.20
      };

      const REQUER_DIAS = new Set(['A.E.C.D.E', 'A.I.A']);

      const clampNota = (n) => (n > 10 ? 10 : n < 0 ? 0 : Number((+n).toFixed(2)));

      function classificarComportamento(nota) {
        const n = Number(nota || 0);
        if (n >= 9.5) return 'Excepcional';
        if (n >= 8.5) return 'Ótimo';
        if (n >= 7.0) return 'Bom';
        if (n >= 5.0) return 'Regular';
        if (n >= 3.0) return 'Insuficiente';
        return 'Incompatível';
      }

      function badgeNatureza(n) {
        const nat = String(n?.natureza || '').toLowerCase();
        if (nat === 'elogio') return `<span class="badge">🌟 Elogio</span>`;
        if (nat === 'indisciplina') return `<span class="badge">⚠️ Disciplinar</span>`;
        return `<span class="badge">—</span>`;
      }

      function derivarValorTotal(n) {
        if (typeof n.valorTotal === 'number') return n.valorTotal;
        const bruto = Number(n.valorNumerico ?? 0);
        if (Number.isFinite(bruto)) return bruto;

        const titulo = String(n.tipoMedida || n.tipo || '').trim();
        if (!REQUER_DIAS.has(titulo)) return 0;

        const dias = Math.max(1, parseInt(n.quantidadeDias || 1, 10) || 1);
        const base = BASES[titulo];
        return typeof base === 'number' ? Number((base * dias).toFixed(2)) : 0;
      }

      function faixaNotaPrevista(n) {
        const antesRaw = Number(n?.notaAnterior);
        const depoisRaw = Number(n?.notaAtual);

        const antes = Number.isFinite(antesRaw) ? antesRaw : null;
        const depois = Number.isFinite(depoisRaw) ? depoisRaw : null;

        if (antes !== null && depois !== null) {
          return { antes, depois, corrigido: false };
        }

        if (antes !== null && depois === null) {
          const valor = Number(n?.valorNumerico);
          if (Number.isFinite(valor)) {
            return { antes, depois: clampNota(antes + valor), corrigido: true };
          }
        }

        if (antes === null && depois !== null) {
          const valor = Number(n?.valorNumerico);
          if (Number.isFinite(valor)) {
            return { antes: clampNota(depois - valor), depois, corrigido: true };
          }
        }

        return { antes: null, depois: null, corrigido: true };
      }

      const fmtValor = (n) => (Number.isFinite(Number(n)) ? Number(n).toFixed(2) : '—');

      function parseDataRegistro(n) {
        const src = n.devolvidaEm || n.atualizadoEm || n.updatedAt || n.data || n.createdAt;
        return src ? new Date(src) : null;
      }

      function statusPill(status) {
        const s = String(status || '').toLowerCase();
        const map = {
          pendente: '⏳ Pendente',
          deferido: '✅ Deferido',
          revisao_solicitada: '🔁 Devolvida',
          arquivado: '📁 Arquivado'
        };
        const cls = `badge status-${s}`;
        return `<span class="${cls}">${map[s] || '—'}</span>`;
      }      function limparListasComLoading() {
        listaDeferidas.innerHTML = `<div class="empty">${spinnerHTML}</div>`;
        listaPendentesPrincipal.innerHTML = `<div class="empty">${spinnerHTML}</div>`;
        listaPendentesModo.innerHTML = `<div class="empty">${spinnerHTML}</div>`;
        listaArquivadas.innerHTML = `<div class="empty">${spinnerHTML}</div>`;
        listaAntigas.innerHTML = `<div class="empty">${spinnerHTML}</div>`;

        countDeferidas.textContent = '—';
        countPendentesPrincipal.textContent = '—';
        countPendentesModo.textContent = '—';
        countArquivadas.textContent = '—';
        countAntigas.textContent = '—';

        resumoDef.textContent = '—';
        resumoPenPrincipal.textContent = '—';
        resumoPendentesModo.textContent = '—';
        resumoArquivadas.textContent = '—';
        resumoAntigas.textContent = '—';
        resumoGeral.textContent = '—';
      }

      function atualizarAbasVisuais() {
        [tabPrincipal, tabPendentes, tabArquivadas, tabAntigas].forEach(btn => {
          btn.classList.toggle('active', btn.dataset.mode === modoAtual);
        });

        blocoPrincipal.classList.toggle('hidden', modoAtual !== 'principal');
        blocoPendentes.classList.toggle('hidden', modoAtual !== 'pendentes');
        blocoArquivadas.classList.toggle('hidden', modoAtual !== 'arquivadas');
        blocoAntigas.classList.toggle('hidden', modoAtual !== 'antigas');
      }

      function renderTurmas(data) {
        const turmas = new Set(
          (data || [])
            .map(n => n?.aluno?.turma)
            .filter(Boolean)
        );

        const atual = filtroTurma.value;
        filtroTurma.innerHTML = '<option value="">Todas</option>';

        Array.from(turmas).sort().forEach(turma => {
          const opt = document.createElement('option');
          opt.value = turma;
          opt.textContent = turma;
          if (turma === atual) opt.selected = true;
          filtroTurma.appendChild(opt);
        });
      }

      function headMarkup(n) {
        const nome = n.aluno?.nome || '—';
        const turma = n.aluno?.turma || '—';
        const medida = n.tipoMedida || n.tipo || '—';
        const dmod = parseDataRegistro(n);
        const dataTxt = dmod ? dmod.toLocaleString('pt-BR') : '—';

        const vTotal = derivarValorTotal(n);
        const faixa = faixaNotaPrevista(n);
        const classificacaoAtual = n.classificacaoAtual || classificarComportamento(faixa.depois);

        let entregueBox = '';
        if (String(n.status || '').toLowerCase() === 'deferido' && !n.devolvidoPeloAluno) {
          const checked = n.entregue ? 'checked' : '';
          const disabled = n.entregue ? 'disabled' : '';
          const prazo = n.prazoDevolucao ? new Date(n.prazoDevolucao) : null;
          const atrasado = prazo && Date.now() > prazo.getTime() && !n.devolvidoPeloAluno;
          const prazoTxt = prazo ? prazo.toLocaleString('pt-BR') : '';

          entregueBox = `
            <label class="entregue-wrap" onclick="event.stopPropagation()">
              <input type="checkbox" ${checked} ${disabled} data-id="${n._id}" class="chk-entregue" />
              <span>Entregue</span>
            </label>
            ${n.entregue ? `<span class="prazo-chip ${atrasado ? 'atraso' : ''}" title="${atrasado ? 'Prazo vencido' : ''}">
              Prazo: ${prazoTxt}
            </span>` : ''}
          `;
        }

        const devolv = n.devolvidoPeloAluno ? `<span class="badge" title="Assinada e devolvida">📥 Devolvida</span>` : '';

        return `
          <div>
            <div class="n-title">${nome}</div>
            <div class="n-sub">${turma} • ${medida} • ${dataTxt}</div>
          </div>
          <div>${statusPill(n.status)} ${badgeNatureza(n)}</div>
          <div>
            <span class="badge">Valor: ${fmtValor(vTotal)}</span>
            <span class="badge">Nota: ${fmtValor(faixa.antes)} → ${fmtValor(faixa.depois)}</span>
            <span class="badge">Faixa: ${classificacaoAtual}</span>
            ${devolv}
            ${entregueBox}
          </div>
        `;
      }

      function renderLista(arr, container) {
        container.innerHTML = '';

        if (!arr.length) {
          container.innerHTML = `<div class="empty">Nada por aqui…</div>`;
          return;
        }

        arr.forEach(n => {
          const wrap = document.createElement('div');
          wrap.className = 'n-card';

          const head = document.createElement('div');
          head.className = 'n-head';
          head.innerHTML = headMarkup(n);

          const body = document.createElement('div');
          body.className = 'n-body';
          body.innerHTML = `<div class="empty"><span class="spinner"></span>Carregando…</div>`;

          let loaded = false;

          head.addEventListener('click', async () => {
            const isOpen = body.style.display === 'block';
            if (isOpen) {
              body.style.display = 'none';
              return;
            }

            body.style.display = 'block';
            if (loaded) return;

            try {
              const r = await fetch(`/api/notificacoes/${n._id}`, {
                credentials: 'include',
                cache: 'no-store'
              });

              if (!r.ok) throw new Error('Falha ao carregar detalhes');

              const det = await r.json();

              const vTotal = (typeof det.valorTotal === 'number') ? det.valorTotal : derivarValorTotal(det);
              const faixa = faixaNotaPrevista(det);
              const classificacaoAnterior = det.classificacaoAnterior || classificarComportamento(faixa.antes);
              const classificacaoAtual = det.classificacaoAtual || classificarComportamento(faixa.depois);
              const med = String(det.tipoMedida || det.tipo || '').toUpperCase().replace(/\./g, '');
              const deferida = String(det.status || '').toLowerCase() === 'deferido';
              const showCom = deferida && (med === 'AIA' || med === 'AECDE');

              const prazoTxt = det.prazoDevolucao ? new Date(det.prazoDevolucao).toLocaleString('pt-BR') : '—';

              const entregueDetalhe = deferida ? `
                <div class="n-kv">
                  <b>Entrega ao aluno</b>
                  <div class="hint">
                    ${det.entregue ? `✔️ Entregue em ${new Date(det.entregueEm).toLocaleString('pt-BR')}` : 'Ainda não entregue'}
                  </div>
                  ${det.entregue ? `<div class="hint">Prazo para devolução: ${prazoTxt}</div>` : ''}
                </div>
              ` : '';

              const devolucaoActions = deferida ? `
                <div class="actions">
                  ${!det.entregue ? `<button class="comunicacao-btn" onclick="marcarEntregue('${det._id}', this)">Marcar ENTREGUE</button>` : ''}
                  ${det.entregue && !det.devolvidoPeloAluno ? `<button class="reenviar-btn" onclick="marcarDevolvida('${det._id}', this)">Marcar DEVOLVIDA</button>` : ''}
                </div>
              ` : '';

              body.innerHTML = `
                <div class="n-row">
                  <div class="n-kv"><b>Motivo</b>${det.motivo || '—'}</div>
                  <div class="n-kv"><b>Observação</b>${det.observacao || '—'}</div>
                  <div class="n-kv"><b>Natureza</b>${String(det.natureza || '').toLowerCase() === 'elogio' ? 'Elogio' : 'Notificação disciplinar'}</div>
                  <div class="n-kv"><b>Valor</b>${fmtValor(vTotal)}</div>
                  <div class="n-kv"><b>Nº Sequencial</b>${det.numeroSequencial || '—'}</div>
                  <div class="n-kv"><b>Artigo</b>${det.artigo || '—'}</div>
                  <div class="n-kv"><b>Inciso</b>${det.inciso || '—'}</div>
                  <div class="n-kv"><b>Nota (no dia)</b>${fmtValor(faixa.antes)} → ${fmtValor(faixa.depois)}</div>
                  <div class="n-kv"><b>Classificação</b>${classificacaoAnterior} → ${classificacaoAtual}</div>
                  ${entregueDetalhe}
                </div>

                <div class="actions">
                  <button class="pdf-btn" onclick="gerarPDF('${det._id}')">PDF</button>
                  ${modoAtual !== 'arquivadas' && modoAtual !== 'antigas' ? `<a class="edit-btn" href="editar-notificacao.html?id=${det._id}">Editar</a>` : ''}
                  <button class="delete-btn" onclick="excluirNotificacao('${det._id}')">Excluir</button>
                  ${det.status === 'revisao_solicitada' ? `<button class="reenviar-btn" onclick="reenviarNotificacao('${det._id}')">Reenviar</button>` : ''}
                  ${showCom ? `<button class="comunicacao-btn" onclick="abrirComunicacao('${det._id}')">Comunicação aos Pais</button>` : ''}
                </div>

                ${devolucaoActions}
              `;

              loaded = true;
            } catch (e) {
              console.error(e);
              body.innerHTML = `<div class="empty">Erro ao carregar detalhes.</div>`;
            }
          });

          wrap.appendChild(head);
          wrap.appendChild(body);
          container.appendChild(wrap);
        });

        container.querySelectorAll('.chk-entregue').forEach(chk => {
          chk.addEventListener('click', async (ev) => {
            ev.stopPropagation();
            const id = chk.dataset.id;
            if (!id) return;

            const prev = chk.checked;

            try {
              const r = await fetch(`/api/notificacoes/${id}/entregar`, {
                method: 'POST',
                credentials: 'include',
                cache: 'no-store'
              });

              const j = await r.json();

              if (!r.ok) {
                chk.checked = !prev;
                showError(j.error || 'Falha ao marcar ENTREGUE');
                return;
              }

              showToast('Notificação marcada como ENTREGUE.');
              await carregarModoAtual();
            } catch (e) {
              chk.checked = !prev;
              showError('Erro de rede ao marcar ENTREGUE.');
            }
          });
        });
      }

      function paginar(arr, page, perPage) {
        const total = arr.length;
        const totalPages = Math.max(1, Math.ceil(total / perPage));
        const start = (page - 1) * perPage;
        return { slice: arr.slice(start, start + perPage), total, totalPages };
      }

      function buildPager(el, current, totalPages, onGo) {
        el.innerHTML = '';

        const add = (lbl, goto, dis = false, cur = false) => {
          const b = document.createElement('button');
          b.textContent = lbl;
          if (cur) b.classList.add('current');
          b.disabled = dis;
          b.onclick = () => onGo(goto);
          el.appendChild(b);
        };

        add('«', 1, current === 1);
        add('‹', Math.max(1, current - 1), current === 1);

        const s = Math.max(1, current - 2);
        const e = Math.min(totalPages, s + 4);

        for (let i = s; i <= e; i++) {
          add(String(i), i, false, i === current);
        }

        add('›', Math.min(totalPages, current + 1), current === totalPages);
        add('»', totalPages, current === totalPages);
      }

      async function buscarModo(modo) {
        const baseParams = new URLSearchParams();
        baseParams.set('modo', modo);
        baseParams.set('limit', '200');

        if (filtroTurma.value) baseParams.set('turma', filtroTurma.value);
        if (pesquisaNome.value.trim()) baseParams.set('q', pesquisaNome.value.trim());
        if (dataDe.value) baseParams.set('from', dataDe.value);
        if (dataAte.value) baseParams.set('to', dataAte.value);

        let page = 1;
        let totalPages = 1;
        let total = 0;
        const acumulado = [];

        do {
          const params = new URLSearchParams(baseParams);
          params.set('page', String(page));

          const r = await fetch(`/api/notificacoes?${params.toString()}`, {
            credentials: 'include',
            cache: 'no-store'
          });

          if (r.status === 401) {
            location.href = './login.html';
            return { total: 0, data: [] };
          }

          if (!r.ok) {
            throw new Error('Falha ao buscar notificações.');
          }

          const j = await r.json();

          total = Number(j.total || 0);
          totalPages = Number(j.totalPages || 1);

          if (Array.isArray(j.data)) {
            acumulado.push(...j.data);
          }

          page++;
        } while (page <= totalPages && page <= 50);

        return {
          total,
          data: acumulado
        };
      }      function refreshPrincipal() {
        dsDef = datasetAtual.filter(n => String(n.status || '').toLowerCase() === 'deferido');
        dsPenPrincipal = datasetAtual.filter(n => String(n.status || '').toLowerCase() !== 'deferido');

        countDeferidas.textContent = `(${dsDef.length})`;
        countPendentesPrincipal.textContent = `(${dsPenPrincipal.length})`;

        const pDef = paginar(dsDef, paginaDef, porPagina);
        const pPen = paginar(dsPenPrincipal, paginaPenPrincipal, porPagina);

        renderLista(pDef.slice, listaDeferidas);
        renderLista(pPen.slice, listaPendentesPrincipal);

        resumoDef.textContent = `${pDef.total} item(ns)`;
        resumoPenPrincipal.textContent = `${pPen.total} item(ns)`;

        buildPager(pagDef, paginaDef, pDef.totalPages, (g) => {
          paginaDef = g;
          refreshPrincipal();
        });

        buildPager(pagPenPrincipal, paginaPenPrincipal, pPen.totalPages, (g) => {
          paginaPenPrincipal = g;
          refreshPrincipal();
        });

        resumoGeral.textContent = `${datasetAtual.length} resultado(s) carregados em notificações ativas`;
      }

      function refreshPendentes() {
        dsPendentesModo = datasetAtual.slice();
        countPendentesModo.textContent = `(${dsPendentesModo.length})`;

        const p = paginar(dsPendentesModo, paginaPendentesModo, porPagina);
        renderLista(p.slice, listaPendentesModo);

        resumoPendentesModo.textContent = `${p.total} item(ns)`;

        buildPager(pagPendentesModo, paginaPendentesModo, p.totalPages, (g) => {
          paginaPendentesModo = g;
          refreshPendentes();
        });

        resumoGeral.textContent = `${datasetAtual.length} resultado(s) carregados em pendentes do coordenador`;
      }

      function refreshArquivadas() {
        dsArquivadas = datasetAtual.slice();
        countArquivadas.textContent = `(${dsArquivadas.length})`;

        const p = paginar(dsArquivadas, paginaArquivadas, porPagina);
        renderLista(p.slice, listaArquivadas);

        resumoArquivadas.textContent = `${p.total} item(ns)`;

        buildPager(pagArquivadas, paginaArquivadas, p.totalPages, (g) => {
          paginaArquivadas = g;
          refreshArquivadas();
        });

        resumoGeral.textContent = `${datasetAtual.length} resultado(s) carregados em notificações arquivadas`;
      }

      function refreshAntigas() {
        dsAntigas = datasetAtual.slice();
        countAntigas.textContent = `(${dsAntigas.length})`;

        const p = paginar(dsAntigas, paginaAntigas, porPagina);
        renderLista(p.slice, listaAntigas);

        resumoAntigas.textContent = `${p.total} item(ns)`;

        buildPager(pagAntigas, paginaAntigas, p.totalPages, (g) => {
          paginaAntigas = g;
          refreshAntigas();
        });

        resumoGeral.textContent = `${datasetAtual.length} resultado(s) carregados em notificações antigas`;
      }

      async function carregarModoAtual() {
        limparListasComLoading();
        atualizarAbasVisuais();

        try {
          const { total, data } = await buscarModo(modoAtual);
          totalAtual = total;
          datasetAtual = data;

          renderTurmas(data);

          if (modoAtual === 'principal') {
            paginaDef = 1;
            paginaPenPrincipal = 1;
            refreshPrincipal();
          } else if (modoAtual === 'pendentes') {
            paginaPendentesModo = 1;
            refreshPendentes();
          } else if (modoAtual === 'arquivadas') {
            paginaArquivadas = 1;
            refreshArquivadas();
          } else {
            paginaAntigas = 1;
            refreshAntigas();
          }
        } catch (e) {
          console.error(e);
          showError('Falha ao carregar notificações.');

          listaDeferidas.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
          listaPendentesPrincipal.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
          listaPendentesModo.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
          listaArquivadas.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
          listaAntigas.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
        }
      }

      async function gerarPDF(id) {
        try {
          const r = await fetch(`/api/pdf/${id}`, {
            method: 'POST',
            credentials: 'include',
            cache: 'no-store'
          });

          if (!r.ok) throw new Error('Erro ao gerar documento');

          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;

          const disp = r.headers.get('content-disposition') || '';
          const m = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/i.exec(disp);
          const nome = m ? m[1].replace(/['"]/g, '') : `notificacao_${Date.now()}.docx`;

          a.download = nome.endsWith('.docx') ? nome : (nome + '.docx');
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch {
          showError('Erro ao gerar documento.');
        }
      }

      async function reenviarNotificacao(id) {
        try {
          const r = await fetch(`/api/notificacoes/${id}/reenviar`, {
            method: 'PUT',
            credentials: 'include',
            cache: 'no-store'
          });

          const j = await r.json();

          if (r.ok) {
            showToast('Notificação reenviada com sucesso.');
            await carregarModoAtual();
          } else {
            showError(j.message || 'Erro ao reenviar.');

          showError('Erro ao reenviar a notificação.');
        }
      }

          const r = await fetch(`/api/notificacoes/${id}`, {
            method: 'DELETE',
            credentials: 'include',
            cache: 'no-store'
          });

          if (r.ok) {

            await carregarModoAtual();

            showError('Erro ao excluir a notificação.');

            method: 'POST',

      async function marcarEntregue(id, btn) {
        try {
          if (btn) btn.disabled = true;

          const r = await fetch(`/api/notificacoes/${id}/entregar`, {
            method: 'POST',
            credentials: 'include',
            cache: 'no-store'
          });

          const j = await r.json();

          if (!r.ok) {
            showError(j.error || 'Falha ao marcar ENTREGUE');
            if (btn) btn.disabled = false;
            return;
          }

          showToast('Notificação marcada como ENTREGUE.');
          await carregarModoAtual();
        } catch (e) {
          showError('Erro de rede ao marcar ENTREGUE.');
          if (btn) btn.disabled = false;
        }
      }

      async function marcarDevolvida(id, btn) {
        try {
          if (btn) btn.disabled = true;

          const r = await fetch(`/api/notificacoes/${id}/devolver`, {
            method: 'POST',
            credentials: 'include',
            cache: 'no-store'
          });

          const j = await r.json();

          if (!r.ok) {
            showError(j.error || 'Falha ao marcar DEVOLVIDA');
            if (btn) btn.disabled = false;
            return;
          }

          showToast('Notificação marcada como DEVOLVIDA e arquivada.');
          await carregarModoAtual();
        } catch (e) {
          showError('Erro ao marcar DEVOLVIDA.');
          if (btn) btn.disabled = false;
        }
      }

      function fmtDate(d) {
        return d.toISOString().slice(0, 10);
      }

      const debounce = (fn, ms = 250) => {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), ms);
        };
      };

      [tabPrincipal, tabPendentes, tabArquivadas, tabAntigas].forEach(tab => {
        tab.addEventListener('click', async () => {
          const novoModo = tab.dataset.mode;
          if (novoModo === modoAtual) return;

          modoAtual = novoModo;
          await carregarModoAtual();
        });
      });

      pesquisaNome.addEventListener('input', debounce(async () => {
        await carregarModoAtual();
      }, 200));

      filtroTurma.addEventListener('change', async () => {
        await carregarModoAtual();
      });

      porPaginaSel.addEventListener('change', () => {
        porPagina = Number(porPaginaSel.value);

        if (modoAtual === 'principal') {
          paginaDef = 1;
          paginaPenPrincipal = 1;
          refreshPrincipal();
        } else if (modoAtual === 'pendentes') {
          paginaPendentesModo = 1;
          refreshPendentes();
        } else if (modoAtual === 'arquivadas') {
          paginaArquivadas = 1;
          refreshArquivadas();
        } else {
          paginaAntigas = 1;
          refreshAntigas();
        }
      });

      dataDe.addEventListener('change', async () => {
        await carregarModoAtual();
      });

      dataAte.addEventListener('change', async () => {
        await carregarModoAtual();
      });

      btnAtualizar.addEventListener('click', async () => {
        await carregarModoAtual();
      });

      chipHoje.addEventListener('click', async () => {
        const now = new Date();
        dataDe.value = fmtDate(now);
        dataAte.value = fmtDate(now);
        await carregarModoAtual();
      });

      chip7.addEventListener('click', async () => {
        const now = new Date();
        const de = new Date();
        de.setDate(now.getDate() - 6);
        dataDe.value = fmtDate(de);
        dataAte.value = fmtDate(now);
        await carregarModoAtual();
      });

      chip30.addEventListener('click', async () => {
        const now = new Date();
        const de = new Date();
        de.setDate(now.getDate() - 29);
        dataDe.value = fmtDate(de);
        dataAte.value = fmtDate(now);
        await carregarModoAtual();
      });

      chipLimpar.addEventListener('click', async () => {
        dataDe.value = '';
        dataAte.value = '';
        await carregarModoAtual();
      });

      btnCsv.addEventListener('click', () => {
        if (!datasetAtual.length) {
          showError('Nada para exportar.');
          return;
        }

        const head = [
          'Status',
          'Aluno',
          'Turma',
          'Tipo',
          'Data',
          'Valor',
          'NotaAntes',
          'NotaDepois',
          'Nº Sequencial',
          'Artigo',
          'Inciso',
          'Entregue',
          'PrazoDevolucao',
          'Devolvida'
        ];

        const rows = datasetAtual.map((n) => {
          const nome = n.aluno?.nome || '';
          const turma = n.aluno?.turma || '';
          const tipo = n.tipoMedida || n.tipo || '';
          const dmod = parseDataRegistro(n);
          const dataTxt = dmod ? dmod.toLocaleString('pt-BR') : '';
          const vTotal = derivarValorTotal(n);
          const faixa = faixaNotaPrevista(n);

          return [
            n.status || '',
            nome,
            turma,
            tipo,
            dataTxt,
            vTotal,
            faixa.antes ?? '',
            faixa.depois ?? '',
            n.numeroSequencial ?? '',
            n.artigo ?? '',
            n.inciso ?? '',
            n.entregue ? 'Sim' : 'Não',
            n.prazoDevolucao ? new Date(n.prazoDevolucao).toLocaleString('pt-BR') : '',
            n.devolvidoPeloAluno ? 'Sim' : 'Não'
          ];
        });

        const csv = [head, ...rows]
          .map(r => r.map(v => {
            const s = String(v ?? '');
            if (s.includes(';') || s.includes('"') || s.includes('\n')) {
              return `"${s.replace(/"/g, '""')}"`;
            }
            return s;
          }).join(';'))
          .join('\n');

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = `notificacoes_${modoAtual}_${new Date().toISOString().slice(0, 10)}.csv`;

        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      window.gerarPDF = gerarPDF;
      window.reenviarNotificacao = reenviarNotificacao;
      window.excluirNotificacao = excluirNotificacao;
      window.abrirComunicacao = abrirComunicacao;
      window.marcarEntregue = marcarEntregue;
      window.marcarDevolvida = marcarDevolvida;

      carregarModoAtual();
    });
  </script>
  <script src="notify.js"></script>
</body>
</html>
