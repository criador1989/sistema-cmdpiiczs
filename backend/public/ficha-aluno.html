<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ficha do Aluno - CMDPII</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#d82327" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    :root{
      --p1:#941a1d; --p2:#d82327; --txt:#1b1b1b; --muted:#6f6f6f;
      --card:#ffffff; --line:#ebebeb; --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--txt); font-family:'Segoe UI',system-ui,-apple-system,Arial;
      background:linear-gradient(120deg,var(--p1),var(--p2));
    }

    .topbar{
      position:sticky; top:0; z-index:10;
      width:100%; background:linear-gradient(90deg,rgba(255,255,255,.94),rgba(255,255,255,.92));
      backdrop-filter:saturate(160%) blur(6px);
      border-bottom:1px solid #e9e9e9;
    }
    .topbar .inner{
      max-width:1180px; margin:0 auto; padding:14px 18px;
      display:flex; align-items:center; gap:10px;
    }
    .brand{font-weight:800; color:#222; letter-spacing:.4px}
    .spacer{flex:1}
    .btn{
      appearance:none; border:none; cursor:pointer; font-weight:700;
      padding:10px 14px; border-radius:12px; color:#fff;
      background:linear-gradient(90deg,var(--p1),var(--p2));
      box-shadow:0 8px 22px rgba(148,26,29,.28); transition:.2s transform,.2s filter;
      text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    }
    .btn:hover{ transform:translateY(-1px); filter:saturate(1.05) }
    .btn.ghost{ background:#fff; color:var(--p1); border:1px solid #e0e0e0; box-shadow:none }

    .page{
      max-width:1180px; margin:22px auto; padding:0 18px;
      animation:fadeIn .35s ease-out both;
    }
    @keyframes fadeIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}

    .hero{
      background:linear-gradient(180deg,#fff,#f9f9f9);
      border-radius:var(--radius); padding:18px; box-shadow:0 18px 50px rgba(0,0,0,.18);
      border:1px solid #efefef;
    }
    .head{
      display:flex; gap:16px; align-items:center; padding-bottom:14px; border-bottom:1px dashed var(--line);
    }
    .avatar{
      width:88px; height:88px; border-radius:14px; overflow:hidden; flex:0 0 88px;
      background:#f3f3f3; border:1px solid #e8e8e8; display:flex; align-items:center; justify-content:center; color:#9a9a9a; font-weight:800;
    }
    .avatar img{width:100%; height:100%; object-fit:cover}
    .badges{display:flex; gap:8px; flex-wrap:wrap}
    .badge{ font-size:.78rem; color:#444; background:#f3f3f3; border:1px solid #ececec; padding:4px 10px; border-radius:999px }

    .kvs{
      display:grid; gap:12px; margin-top:14px;
      grid-template-columns:repeat(4,minmax(0,1fr));
    }
    @media (max-width:1000px){ .kvs{grid-template-columns:repeat(2,minmax(0,1fr))} }
    .kv{background:#fcfcfc; border:1px solid var(--line); border-radius:10px; padding:10px}
    .kv b{display:block; color:#777; font-size:.85rem}
    .kv .big{font-weight:800; font-size:26px; color:var(--p1)}
    .kv .pill{
      display:inline-block;margin-top:4px;padding:2px 10px;border-radius:999px;border:1px solid #e3e3e3;
      font-weight:700;font-size:.78rem;background:#fff;color:#333
    }

    .columns{
      display:grid; gap:18px; margin-top:18px;
      grid-template-columns: 1fr 1fr;
      align-items:start;
    }
    @media (max-width:900px){ .columns{grid-template-columns:1fr} }

    .card{
      background:var(--card); border-radius:14px; padding:16px;
      border:1px solid var(--line); box-shadow:0 10px 28px rgba(0,0,0,.08);
    }
    .title{margin:0 0 10px; color:#222; font-size:18px}

    .list{
      display:flex; flex-direction:column; gap:12px;
      max-height:520px; overflow:auto; padding-right:4px;
      scroll-behavior:smooth;
    }
    .empty{border:1px dashed var(--line); border-radius:12px; padding:14px; background:#fafafa; color:#777; text-align:center}
    .muted{color:var(--muted)}

    .obs,.notif{
      border:1px solid var(--line); border-radius:12px; background:#fff; padding:12px;
      box-shadow:0 6px 16px rgba(0,0,0,.06); posição:relative;
    }
    .obs{border-left:6px solid var(--p1)}
    .notif{border-left:6px solid #b71c1c}
    .row{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .chip{display:inline-block; padding:2px 8px; border:1px solid var(--line); border-radius:999px; background:#f4f4f4; font-size:.78rem}
    .actions{display:flex; gap:8px; flex-wrap:wrap}
    .iconbtn{
      appearance:none; border:1px solid var(--line); background:#fff; border-radius:10px;
      padding:8px 10px; cursor:pointer; font-weight:600; text-decoration:none; color:#333;
    }
    .iconbtn:hover{filter:brightness(.96)}

    .editor{display:flex; gap:8px; align-items:center; margin-top:8px}
    .editor textarea{flex:1; resize:vertical; min-height:86px; border:1px solid #d7d7d7; border-radius:10px; padding:10px}

    .edit-card{
      background:#fff;border:1px solid #e6e6e6;border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.15);
      padding:16px;margin-top:14px;display:none
    }
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-1{display:grid;grid-template-columns:1fr;gap:10px}
    .edit-card label{font-weight:600;font-size:.9rem}
    .edit-card input,.edit-card textarea{
      width:100%;padding:10px;border:1px solid #cfcfcf;border-radius:10px
    }
    .edit-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}

    @media print{
      body{ background:#fff }
      .topbar{ display:none !important }
      .page{ width:100%; margin:0; padding:0 12mm }
      .columns{ grid-template-columns:1fr 1fr; gap:12px }
      .list{ max-height:none; overflow:visible }
      .obs,.notif{ break-inside:avoid }
      .hero,.card{ box-shadow:none; border:1px solid #ccc }
      a.btn, button.btn, .iconbtn{ display:none !important }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <div class="brand">Ficha do Aluno</div>
      <div class="spacer"></div>
      <button class="btn ghost" onclick="location.href='painel.html'">← Voltar ao Painel</button>
      <button class="btn" id="btnImprimir">Imprimir</button>
      <a id="btnPDF" class="btn" href="#" target="_blank" rel="noopener">Exportar PDF</a>
    </div>
  </div>

  <main class="page">
    <section class="hero">
      <div class="head">
        <div class="avatar" id="fotoBox">Sem foto</div>
        <div style="flex:1">
          <h2 style="margin:0 0 4px" id="alunoNome">—</h2>
          <div class="badges">
            <span class="badge" id="badgeTurma">Turma —</span>
            <span class="badge" id="badgeCodigo">Código —</span>
            <span class="badge" id="badgeId">ID —</span>
          </div>
        </div>
        <button class="btn" id="btnTrocarFoto">Trocar foto</button>
        <button class="btn ghost" id="btnEditar">Editar</button>
        <input type="file" id="inputFoto" accept="image/*" capture="environment" style="display:none;">
      </div>

      <div class="edit-card" id="editorAluno">
        <div class="grid-2">
          <div>
            <label>Nome</label>
            <input id="edNome" type="text" />
          </div>
          <div>
            <label>Turma</label>
            <input id="edTurma" type="text" />
          </div>
          <div>
            <label>Data de Entrada</label>
            <input id="edEntrada" type="date" />
          </div>
          <div>
            <label>Data de Nascimento</label>
            <input id="edNasc" type="date" />
          </div>
          <div>
            <label>Nome do Pai</label>
            <input id="edPai" type="text" />
          </div>
          <div>
            <label>Nome da Mãe</label>
            <input id="edMae" type="text" />
          </div>
          <div>
            <label>Telefone</label>
            <input id="edTel" type="text" />
          </div>
          <div>
            <label>Endereço</label>
            <input id="edEnd" type="text" />
          </div>
          <div>
            <label>Código de Acesso</label>
            <input id="edCodigo" type="text" />
          </div>
          <div>
            <label>Foto (URL, /uploads/..., ou base64)</label>
            <input id="edFoto" type="text" placeholder="ex: alunos/123.jpg ou https://..." />
          </div>
        </div>

        <div class="edit-actions">
          <button class="btn ghost" id="btnCancelarEd">Cancelar</button>
          <button class="btn" id="btnSalvarEd">Salvar alterações</button>
        </div>
      </div>

      <div class="kvs">
        <div class="kv"><b>Turma</b><span id="kvTurma">—</span></div>
        <div class="kv"><b>Data de Entrada</b><span id="kvEntrada">—</span></div>
        <div class="kv"><b>Código de Acesso</b><span id="kvCodigo">—</span></div>
        <div class="kv">
          <b>Nota de Comportamento</b>
          <span class="big" id="kvNota">—</span>
          <span class="pill" id="kvClassificacao" title="Classificação da nota">—</span>
        </div>
      </div>
    </section>

    <section class="columns">
      <div class="card">
        <h3 class="title">Observações</h3>
        <div id="observacoes" class="list"></div>

        <div class="editor">
          <textarea id="textoObservacao" placeholder="Digite uma nova observação..."></textarea>
          <button class="btn" id="btnSalvar">Salvar</button>
        </div>
      </div>

      <div class="card">
        <h3 class="title">Notificações Disciplinares</h3>
        <div id="notificacoes" class="list"></div>
      </div>
    </section>
  </main>

  <script>
    const qs = (s)=>document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const alunoId = params.get('id');

    const fmtData = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
    const fmtDataHora = d => d ? new Date(d).toLocaleString('pt-BR') : '—';
    const fmtValor = v => (typeof v === 'number' ? v.toFixed(2) : (v ?? '—'));

    let alunoAtual = null;

    const toISO = (d)=>{
      if(!d) return '';
      const x = new Date(d);
      const yyyy = x.getFullYear();
      const mm = String(x.getMonth()+1).padStart(2,'0');
      const dd = String(x.getDate()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}`;
    };

    function isExternalOrDataUrl(url='') {
      return /^https?:\/\//i.test(url) || /^data:image\//i.test(url);
    }

    // Se for URL do Cloudinary, aplica transformação para 256x256, crop face, formatos/qualidade automáticos
    function cloudinaryThumb(url, w=256, h=256){
      try{
        if(!url || !/res\.cloudinary\.com/i.test(url)) return url;
        return url.replace(/\/image\/upload\/(v\d+\/)?/, (m)=> m + `q_auto,f_auto,c_fill,g_face,w_${w},h_${h}/`);
      }catch{ return url; }
    }

    // Normaliza qualquer caminho local para /uploads/...
    function toUploadsUrl(pathOrUrl, w=256, h=256){
      if (!pathOrUrl) return '';
      if (isExternalOrDataUrl(pathOrUrl)) {
        return cloudinaryThumb(pathOrUrl, w, h);
      }
      let s = String(pathOrUrl).trim().replace(/^\/+/, '');
      s = s.replace(/\\/g, '/');
      const low = s.toLowerCase();
      if (low.startsWith('uploads/')) return '/' + s;          // "uploads/alunos/.."
      if (low.startsWith('alunos/'))   return '/uploads/' + s; // "alunos/.." -> "/uploads/alunos/.."
      return '/uploads/' + s;                                   // outro relativo -> assume dentro de /uploads
    }

    function classificarNota(nota){
      const n = Number(nota);
      if (isNaN(n)) return {texto:'—', cor:'#999'};
      if (n >= 9.01) return {texto:'Excepcional', cor:'#0f5132'};
      if (n >= 8.01) return {texto:'Ótimo', cor:'#198754'};
      if (n >= 7.00) return {texto:'Bom', cor:'#b08900'};
      if (n >= 5.00) return {texto:'Regular', cor:'#b95a0a'};
      if (n >= 3.00) return {texto:'Insuficiente', cor:'#b02a37'};
      return {texto:'Incompatível', cor:'#212529'};
    }

    async function carregarFicha(){
      if(!alunoId){ alert('ID do aluno não informado.'); return; }
      const r = await fetch(`/api/ficha/dados/${alunoId}`, { credentials:'include' });
      if(!r.ok){ alert('Falha ao carregar ficha.'); return; }
      const { aluno, notificacoes=[], observacoes=[] } = await r.json();
      alunoAtual = aluno;

      // Cabeçalho
      qs('#alunoNome').textContent = aluno?.nome ?? '—';
      qs('#badgeTurma').textContent = `Turma ${aluno?.turma ?? '—'}`;
      qs('#badgeCodigo').textContent = `Código ${aluno?.codigoAcesso ?? '—'}`;
      qs('#badgeId').textContent = `ID ${aluno?._id ?? '—'}`;
      qs('#btnPDF').href = `/api/ficha/${aluno?._id}`;

      qs('#kvTurma').textContent = aluno?.turma ?? '—';
      qs('#kvEntrada').textContent = aluno?.dataEntrada ? fmtData(aluno.dataEntrada) : '—';
      qs('#kvCodigo').textContent = aluno?.codigoAcesso ?? '—';

      const nota = (typeof aluno?.comportamento === 'number') ? aluno.comportamento : null;
      qs('#kvNota').textContent = (nota !== null) ? nota.toFixed(2) : 'N/A';
      const cls = classificarNota(nota ?? NaN);
      const pill = qs('#kvClassificacao');
      pill.textContent = cls.texto;
      pill.style.color = cls.cor;
      pill.style.borderColor = '#e3e3e3';
      pill.style.background = '#fff';

      // Foto — usa fotoUrl se existir; senão, foto relativa; senão, thumb
      const fotoBox = qs('#fotoBox');
      const raw = aluno?.fotoUrl || aluno?.foto || '';
      const finalUrl = raw ? toUploadsUrl(raw, 256, 256) : `/api/imagens/thumb/${aluno?._id}`;

      fotoBox.innerHTML = finalUrl
        ? `<img src="${finalUrl}" alt="Foto do aluno" loading="lazy" decoding="async" width="88" height="88" style="object-fit:cover">`
        : 'Sem foto';

      // Observações
      const obsEl = qs('#observacoes');
      obsEl.innerHTML = '';
      if(!observacoes.length){
        obsEl.innerHTML = `<div class="empty">Nenhuma observação registrada.</div>`;
      }else{
        obsEl.innerHTML = observacoes.map(o=>`
          <div class="obs">
            <div class="row">
              <div class="muted">${fmtDataHora(o.createdAt || o.criadoEm)} — ${o.autor || 'Autor não informado'}</div>
              <div class="actions">
                <button class="iconbtn" title="Editar" onclick="editarObs('${o._id}', this)">✏️</button>
                <button class="iconbtn" title="Excluir" onclick="excluirObs('${o._id}')">🗑️</button>
              </div>
            </div>
            <div style="margin-top:6px" class="texto">${(o.texto||'').replace(/\n/g,'<br>')}</div>
          </div>
        `).join('');
      }

      // Notificações
      const notiEl = qs('#notificacoes');
      notiEl.innerHTML = '';
      if(!notificacoes.length){
        notiEl.innerHTML = `<div class="empty">Nenhuma notificação encontrada.</div>`;
      }else{
        notiEl.innerHTML = notificacoes.map(n=>{
          const tipo = n.tipo || n.tipoMedida || 'Medida';
          const motivo = n.motivo || '—';
          const artigo = n.artigo || '—';
          const inciso = n.inciso || '—';
          const classificacao = n.classificacaoRegulamento || '—';
          const valor = fmtValor(n.valorNumerico);
          const obsN = n.observacoes ? `<div class="muted" style="margin-top:8px">${n.observacoes}</div>` : '';
          const idN = n._id || '';
          return `
            <div class="notif">
              <div class="row">
                <div><span class="chip">${tipo}</span></div>
                <div class="muted">${fmtData(n.data || n.createdAt)}</div>
              </div>
              <div style="margin-top:6px"><b>Motivo:</b> ${motivo}</div>
              <div style="display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:8px">
                <div><b>Valor</b>: ${valor}</div>
                <div><b>Classificação</b>: ${classificacao}</div>
                <div><b>Artigo</b>: ${artigo}</div>
                <div><b>Inciso</b>: ${inciso}</div>
              </div>
              ${obsN}
              <div class="actions" style="margin-top:10px">
                <a class="iconbtn" href="/notificacao.html?id=${idN}" title="Abrir notificação">Abrir</a>
                <a class="iconbtn" href="/api/pdf/${idN}" target="_blank" rel="noopener" title="Gerar PDF da notificação">PDF</a>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    // Observações: salvar/editar/excluir
    async function salvarObservacao(){
      const texto = qs('#textoObservacao').value.trim();
      if(!texto) return alert('Digite algo.');
      const r = await fetch(`/api/observacoes/${alunoId}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body:JSON.stringify({ texto })
      });
      if(r.ok){ qs('#textoObservacao').value=''; carregarFicha(); }
      else{ const j = await r.json().catch(()=>({})); alert(j.mensagem || 'Erro ao salvar.'); }
    }

    async function excluirObs(obsId){
      if(!confirm('Deseja excluir esta observação?')) return;
      const r = await fetch(`/api/observacoes/${obsId}`,{ method:'DELETE', credentials:'include' });
      if(r.ok) carregarFicha(); else alert('Erro ao excluir observação.');
    }

    function editarObs(obsId, btn){
      const card = btn.closest('.obs');
      const textoAtual = card.querySelector('.texto').textContent;
      card.innerHTML = `
        <div class="editor">
          <textarea id="editArea">${textoAtual}</textarea>
          <button class="btn" id="saveEd">Salvar</button>
          <button class="btn ghost" id="cancelEd">Cancelar</button>
        </div>
      `;
      card.querySelector('#saveEd').onclick = async ()=>{
        const novoTexto = card.querySelector('#editArea').value.trim();
        if(!novoTexto) return alert('Texto inválido.');
        const r = await fetch(`/api/observacoes/${obsId}`,{
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          credentials:'include',
          body:JSON.stringify({ texto: novoTexto })
        });
        if(r.ok) carregarFicha(); else alert('Erro ao atualizar.');
      };
      card.querySelector('#cancelEd').onclick = ()=>carregarFicha();
    }

    // Editor do Aluno
    function abrirEditor(){
      if(!alunoAtual) return;
      qs('#editorAluno').style.display = 'block';
      qs('#edNome').value   = alunoAtual.nome || '';
      qs('#edTurma').value  = alunoAtual.turma || '';
      qs('#edEntrada').value= toISO(alunoAtual.dataEntrada);
      qs('#edNasc').value   = toISO(alunoAtual.nascimento);
      qs('#edPai').value    = alunoAtual.nomePai || '';
      qs('#edMae').value    = alunoAtual.nomeMae || '';
      qs('#edTel').value    = alunoAtual.telefone || '';
      qs('#edEnd').value    = alunoAtual.endereco || '';
      qs('#edCodigo').value = alunoAtual.codigoAcesso || '';
      qs('#edFoto').value   = alunoAtual.foto || '';
    }
    function fecharEditor(){
      qs('#editorAluno').style.display = 'none';
    }
    async function salvarEdicao(){
      if(!alunoAtual) return;
      const payload = {
        nome:         qs('#edNome').value.trim(),
        turma:        qs('#edTurma').value.trim(),
        dataEntrada:  qs('#edEntrada').value || null,
        nascimento:   qs('#edNasc').value || null,
        nomePai:      qs('#edPai').value.trim(),
        nomeMae:      qs('#edMae').value.trim(),
        telefone:     qs('#edTel').value.trim(),
        endereco:     qs('#edEnd').value.trim(),
        codigoAcesso: qs('#edCodigo').value.trim(),
        foto:         qs('#edFoto').value.trim()
      };

      const r = await fetch(`/api/alunos/${alunoAtual._id}`,{
        method:'PUT',
        headers:{ 'Content-Type':'application/json' },
        credentials:'include',
        body: JSON.stringify(payload)
      });
      const j = await r.json().catch(()=>({}));
      if(!r.ok){
        alert(j.message || j.mensagem || 'Erro ao salvar alterações.');
        return;
      }
      fecharEditor();
      await carregarFicha();
    }

    // ===== Upload de foto na ficha =====
    const btnTrocarFoto = document.getElementById('btnTrocarFoto');
    const inputFoto = document.getElementById('inputFoto');

    btnTrocarFoto.addEventListener('click', () => inputFoto.click());

    inputFoto.addEventListener('change', async () => {
      const file = inputFoto.files?.[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        alert('Envie uma imagem válida.');
        inputFoto.value = '';
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('Imagem muito grande. Máximo 5MB.');
        inputFoto.value = '';
        return;
      }

      // Preview local
      const previewURL = URL.createObjectURL(file);
      const fotoBox = qs('#fotoBox');
      fotoBox.innerHTML = `<img src="${previewURL}" alt="Foto do aluno" width="88" height="88" style="object-fit:cover;">`;

      try {
        const fd = new FormData();
        fd.append('foto', file);

        const resp = await fetch(`/api/alunos/${alunoId}/foto`, {
          method: 'PUT',
          body: fd,
          credentials: 'include'
        });

        if (!resp.ok) {
          alert('Falha ao enviar a foto.');
          URL.revokeObjectURL(previewURL);
          return carregarFicha(); // volta para foto anterior
        }

        const data = await resp.json();
        if (data?.foto) {
          URL.revokeObjectURL(previewURL);
          fotoBox.innerHTML = `<img src="${data.foto}" alt="Foto do aluno" width="88" height="88" style="object-fit:cover;">`;
          // mantém o estado local coerente para quando voltar à página
          if (alunoAtual) {
            alunoAtual.fotoUrl = data.foto; // absoluta (/uploads/...)
            alunoAtual.foto = data.foto.replace(/^\/+/, '').replace(/^uploads\//i, ''); // relativa (alunos/...)
          }
          alert('Foto atualizada com sucesso!');
        } else {
          throw new Error('Retorno sem URL da foto.');
        }
      } catch (e) {
        console.error(e);
        alert('Erro ao atualizar a foto.');
        URL.revokeObjectURL(previewURL);
        carregarFicha();
      } finally {
        inputFoto.value = '';
      }
    });

    // Ações
    qs('#btnSalvar').addEventListener('click', salvarObservacao);
    qs('#btnImprimir').addEventListener('click', ()=>window.print());
    document.getElementById('btnEditar').addEventListener('click', abrirEditor);
    document.getElementById('btnCancelarEd').addEventListener('click', fecharEditor);
    document.getElementById('btnSalvarEd').addEventListener('click', salvarEdicao);

    carregarFicha();
  </script>
</body>
</html>
