<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensagens • Sistema Escolar</title>
  <link rel="icon" href="/icons/icon-192x192.png"/>
  <meta name="theme-color" content="#0A1322"/>

  <style>
    :root{
      --txt:#e5f0ff;
      --txt-soft:#9ca9c7;
      --accent:#38bdf8;
      --accent-soft:rgba(56,189,248,0.28);

      --card-bg:rgba(15,23,42,0.94);
      --card-border:rgba(148,163,184,0.55);

      --chip-bg:rgba(15,23,42,0.9);
      --chip-border:rgba(148,163,184,0.6);

      --bubble-mine:#fef3f3;
      --bubble-mine-border:rgba(248,113,113,0.6);
      --bubble-theirs:rgba(15,23,42,0.9);
      --bubble-theirs-border:rgba(148,163,184,0.45);

      --btn-rubi-1:#d82327;
      --btn-rubi-2:#8B0000;

      --stroke:rgba(148,163,184,0.45);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:auto}

    body{
      margin:0;
      font:15px/1.45 "Segoe UI",system-ui,-apple-system,Arial,sans-serif;
      color:var(--txt);
      min-height:100vh;
      padding:18px 0 40px;
      color-scheme:dark;

      /* 🔵 Fundo igual ao painel principal */
      background:
        url("/bg-painel-smart.png") center/cover no-repeat fixed,
        linear-gradient(145deg,#020617cc,#0b1120cc);
      background-blend-mode:overlay;
    }

    a.voltar{
      position:relative;
      z-index:3;
      display:inline-block;
      margin:0 24px 10px;
      color:#f9fafb;
      text-decoration:none;
      font-weight:800;
      text-shadow:0 3px 10px rgba(0,0,0,.8);
    }

    .wrap{
      position:relative;
      z-index:3;
      max-width:1200px;
      margin:0 auto;
      padding:0 16px;
    }

    /* HEADER / CARD GLASS */
    .header{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;

      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:18px;
      padding:14px 16px;
      backdrop-filter:blur(18px) saturate(150%);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      overflow:hidden;
    }

    .header h1{
      margin:0;
      font-size:20px;
      letter-spacing:.3px;
      text-shadow:0 3px 10px rgba(0,0,0,.7);
    }

    .bell{
      display:inline-flex;
      align-items:center;
      gap:8px;
      position:relative;
      cursor:pointer;
      font-size:18px;
    }

    .badge{
      display:inline-flex;
      min-width:22px;
      height:22px;
      padding:0 7px;
      border-radius:999px;
      background:#f97373;
      color:#fff;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:12px;
      position:absolute;
      right:-8px;
      top:-8px;
      box-shadow:0 10px 24px rgba(0,0,0,.8);
      border:1px solid rgba(248,250,252,0.9);
    }
    .badge[hidden]{display:none !important}
    .blink{animation:blink 1.2s linear infinite}
    @keyframes blink{50%{filter:saturate(140%) brightness(1.25)}}

    .shell{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
      margin-top:16px;
    }
    @media (max-width:980px){
      .shell{grid-template-columns:1fr}
    }

    /* Painéis principais */
    .panel{
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:var(--radius);
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      overflow:hidden;
    }

    /* resumo */
    .resumo{
      margin-top:10px;
      background:rgba(15,23,42,0.9);
      border:1px dashed rgba(148,163,184,0.7);
      border-radius:14px;
      padding:10px 12px;
      color:#e5f0ff;
      font-size:.95rem;
      display:none;
      box-shadow:0 10px 26px rgba(0,0,0,.75);
    }

    /* lista de usuários */
    .left{padding:14px}

    .search{
      display:flex;
      gap:8px;
      margin-bottom:10px;
    }

    .search select{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(15,23,42,0.96),rgba(15,23,42,0.98));
      color:var(--txt);
      font-size:.9rem;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 8px 18px rgba(0,0,0,0.75);
      appearance:none;
    }
    .search select:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:
        0 0 0 2px rgba(56,189,248,0.6),
        0 10px 26px rgba(0,0,0,0.9);
    }

    .users{
      max-height:70vh;
      overflow:auto;
      border-top:1px dashed rgba(148,163,184,0.5);
      margin-top:6px;
    }

    .user-item{
      padding:10px 12px;
      border-bottom:1px dashed rgba(148,163,184,0.45);
      cursor:pointer;
      display:grid;
      grid-template-columns:36px 1fr auto;
      gap:10px;
      align-items:center;
      background:rgba(15,23,42,0.7);
      transition:.16s background, .16s transform;
    }
    .user-item:hover{
      background:rgba(30,64,175,0.6);
      transform:translateY(-1px);
    }
    .user-item.active{
      background:rgba(37,99,235,0.9);
      color:#e5f0ff;
      border-left:3px solid var(--accent);
    }

    .avatar{
      width:28px;
      height:28px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 0,#4f9cff,#0b1f3b);
      color:#f9fafb;
      font-weight:800;
      display:grid;
      place-items:center;
      box-shadow:0 6px 18px rgba(15,23,42,0.9);
      border:1px solid rgba(191,219,254,0.8);
      font-size:.9rem;
    }

    .name{font-weight:700}
    .preview{
      font-size:12px;
      color:var(--txt-soft);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .time{
      font-size:12px;
      opacity:.8;
      color:var(--txt-soft);
      text-align:right;
      margin-bottom:2px;
    }

    .unread{
      min-width:18px;
      height:18px;
      padding:0 5px;
      background:#f97373;
      color:#fff;
      border-radius:999px;
      border:1px solid rgba(248,250,252,0.9);
      font:11px/18px system-ui;
      text-align:center;
      box-shadow:0 8px 18px rgba(0,0,0,0.85);
    }
    .unread[hidden]{display:none}

    /* chat */
    .right{
      display:flex;
      flex-direction:column;
      min-height:70vh;
    }

    .chat-head{
      padding:12px 16px;
      border-bottom:1px solid var(--stroke);
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(15,23,42,0.92);
    }

    .chat-title{
      font-weight:800;
    }

    .thread{
      flex:1;
      overflow:auto;
      padding:16px;
      background:linear-gradient(180deg,rgba(15,23,42,0.98),rgba(15,23,42,0.96));
    }

    .bubble{
      max-width:72%;
      padding:10px 12px;
      border-radius:14px;
      margin:6px 0;
      line-height:1.35;
      box-shadow:0 10px 22px rgba(0,0,0,0.65);
      word-wrap:break-word;
      font-size:.93rem;
    }

    .mine{
      background:var(--bubble-mine);
      border:1px solid var(--bubble-mine-border);
      margin-left:auto;
      color:#2b0a0a;
    }

    .theirs{
      background:var(--bubble-theirs);
      border:1px solid var(--bubble-theirs-border);
      margin-right:auto;
      color:var(--txt);
    }

    .meta{
      font-size:12px;
      color:var(--txt-soft);
      margin-top:4px;
    }

    .bubble a{
      color:#bfdbfe;
      word-break:break-all;
    }

    .composer{
      display:flex;
      gap:10px;
      align-items:flex-end;
      padding:12px;
      border-top:1px solid var(--stroke);
      background:rgba(15,23,42,0.96);
    }

    .composer textarea{
      flex:1;
      min-height:48px;
      max-height:180px;
      resize:vertical;
      border:1px solid var(--stroke);
      border-radius:12px;
      padding:12px;
      background:linear-gradient(180deg,rgba(15,23,42,0.98),rgba(15,23,42,1));
      color:var(--txt);
      font:inherit;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 8px 18px rgba(0,0,0,0.85);
    }
    .composer textarea::placeholder{
      color:var(--txt-soft);
    }
    .composer textarea:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:
        0 0 0 2px rgba(56,189,248,0.7),
        0 10px 26px rgba(0,0,0,0.95);
    }

    .btn{
      background:linear-gradient(135deg,var(--btn-rubi-1),var(--btn-rubi-2));
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      box-shadow:
        0 14px 30px rgba(216,35,39,.55),
        inset 0 1px 0 rgba(255,255,255,.12);
      white-space:nowrap;
      font-size:.95rem;
    }
    .btn:hover{
      filter:brightness(1.06);
      transform:translateY(-1px);
      box-shadow:
        0 18px 40px rgba(216,35,39,.65),
        inset 0 1px 0 rgba(255,255,255,.14);
    }

    .file-label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px dashed var(--stroke);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      background:rgba(15,23,42,0.9);
      color:var(--txt-soft);
      font-size:.88rem;
      box-shadow:0 8px 18px rgba(0,0,0,0.7);
    }

    .file-name{
      font-size:12px;
      color:var(--txt-soft);
      max-width:240px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .empty{opacity:.8}

    /* toasts rubi (persistentes) */
    .alerts{
      position:fixed;
      top:16px;
      right:16px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .toast{
      background:linear-gradient(180deg, rgba(15,23,42,0.98), rgba(15,23,42,0.96));
      color:#f9fafb;
      border:1px solid rgba(148,163,184,0.7);
      backdrop-filter:blur(14px) saturate(160%);
      padding:10px 12px;
      border-radius:12px;
      max-width:380px;
      box-shadow:0 16px 40px rgba(0,0,0,0.95);
      cursor:pointer;
      font:14px/1.35 system-ui, "Segoe UI", Arial, sans-serif;
      position:relative;
    }
    .toast strong{display:block}
    .toast small{display:block;color:var(--txt-soft);margin-top:4px}
    .toast .close{
      position:absolute;
      right:8px;
      top:6px;
      border:0;
      background:transparent;
      color:#e5f0ff;
      opacity:.8;
      cursor:pointer;
      font-size:16px;
    }

    @media (max-width:640px){
      .composer{
        flex-direction:column;
        align-items:stretch;
      }
      .btn{
        align-self:flex-end;
      }
      .file-name{
        max-width:160px;
      }
    }
  </style>
</head>
<body>
  <a class="voltar" href="painel.html">← Voltar ao Painel</a>

  <div class="wrap">
    <div class="header panel">
      <h1>📬 Mensagens</h1>
      <div id="btnBell" class="bell" aria-label="Abrir mensagens não lidas" title="Abrir mais recente não lida">
        🔔 <span id="badge" class="badge" hidden>0</span>
      </div>
    </div>

    <div id="resumo" class="resumo"></div>

    <div class="shell">
      <!-- Usuários -->
      <aside class="panel left" aria-label="Selecionar usuário">
        <div class="search">
          <select id="selectUsuarios" title="Usuários">
            <option value="">Selecione um usuário…</option>
          </select>
        </div>
        <div id="listaUsuarios" class="users"></div>
      </aside>

      <!-- Chat -->
      <section class="panel right" aria-live="polite">
        <div class="chat-head">
          <div class="avatar" id="avatar">?</div>
          <div class="chat-title" id="tituloConversa">Nenhum usuário selecionado</div>
        </div>
        <div id="thread" class="thread">
          <p class="empty" style="padding:12px 16px">Escolha um usuário para ver a conversa.</p>
        </div>
        <div class="composer">
          <label class="file-label">
            📎 Anexo
            <input type="file" id="inputArquivo" style="display:none"/>
            <span id="fileName" class="file-name"></span>
          </label>
          <textarea id="campoMensagem" placeholder="Escreva sua mensagem… (Ctrl/⌘ + Enter para enviar)"></textarea>
          <button id="btnEnviar" class="btn">Enviar</button>
        </div>
      </section>
    </div>
  </div>

  <!-- container de toasts -->
  <div id="alerts" class="alerts" aria-live="polite" aria-atomic="true"></div>

  <!-- Beep curto embutido (toca após alguma interação do usuário) -->
  <audio id="beep" preload="auto">
    <source type="audio/wav" src="data:audio/wav;base64,UklGRl4AAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAACABAAZGF0YQgAAACAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICAf39/f4CAgICA"/>
  </audio>

  <script>
    // ======= estado =======
    let usuarioAtualId = null;          // destinatário selecionado
    let meuIdCache = null;              // id do logado
    let cacheUltimosIds = [];           // ids da conversa aberta
    let ultimaInteracao = false;        // libera áudio
    const notificadas = new Set();      // toasts já exibidas
    const userMeta = new Map();         // userId -> { _id, nome, tipo, preview, ts, unread }
    let lastSnapshotIds = [];           // ids do snapshot atual de /novas (para detectar somente as realmente novas)

    const selUsuarios = document.getElementById('selectUsuarios');
    const listaUsuarios = document.getElementById('listaUsuarios');
    const threadEl = document.getElementById('thread');
    const tituloEl = document.getElementById('tituloConversa');
    const avatarEl = document.getElementById('avatar');
    const beep = document.getElementById('beep');
    const badge = document.getElementById('badge');
    const resumo = document.getElementById('resumo');
    const btnBell = document.getElementById('btnBell');

    // ======= utils =======
    function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
    function fmtData(s){ try{ const d=new Date(s); return isNaN(d)?'':d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch{ return '' } }
    function inicial(nome){ return (nome||'?').trim().charAt(0).toUpperCase() || '?' }
    function setFileName(){ const f=document.getElementById('inputArquivo').files[0]; document.getElementById('fileName').textContent = f?f.name:''; }
    function playBeep(){ if(!ultimaInteracao) return; try{ beep.currentTime=0; beep.play().catch(()=>{}); }catch{} }

    async function fetchJSON(url, opt={}){
      const r = await fetch(url, { credentials:'include', cache:'no-store', ...opt });
      const ct = r.headers.get('content-type')||'';
      const body = ct.includes('application/json') ? await r.json().catch(()=> ({})) : await r.text().catch(()=> '');
      if(!r.ok){ const msg = typeof body==='string'? body : JSON.stringify(body); throw new Error(`${r.status} ${r.statusText} @ ${url} → ${msg}`); }
      return body;
    }
    async function meuId(){
      if(meuIdCache) return meuIdCache;
      try{ const j=await fetchJSON('/api/usuario'); meuIdCache=j.id || j._id; return meuIdCache; }catch{ return null; }
    }

    // ======= toasts (persistentes) =======
    function showToast({id, titulo, texto, onClick}) {
      if (id && notificadas.has(id)) return;
      if (id) notificadas.add(id);
      const box = document.getElementById('alerts');
      const elx = document.createElement('div');
      elx.className = 'toast';
      elx.innerHTML = `<button class="close" title="Fechar">✖</button><strong>${titulo}</strong><small>${texto||'Mensagem'}</small>`;
      elx.addEventListener('click', (e)=>{ if(e.target.classList.contains('close')) { elx.remove(); return; } onClick?.(); elx.remove(); });
      box.appendChild(elx);
    }
    function abrirConversaCom(userId) {
      if (selUsuarios && selUsuarios.querySelector(`option[value="${userId}"]`)) {
        selUsuarios.value = userId;
      }
      trocarUsuario();
    }

    // ======= lista de usuários (com preview + badge) =======
    function renderUserList(){
      // ordena: com não lidas primeiro, depois por ts desc, depois por nome
      const arr = Array.from(userMeta.values()).sort((a,b)=>{
        const ua=(a.unread||0)>0, ub=(b.unread||0)>0;
        if(ua!==ub) return ua?-1:1;
        const ta=a.ts?new Date(a.ts).getTime():0, tb=b.ts?new Date(b.ts).getTime():0;
        if(tb!==ta) return tb-ta;
        return (a.nome||'').localeCompare(b.nome||'');
      });

      listaUsuarios.innerHTML='';
      arr.forEach(u=>{
        const row = el('div','user-item'); row.dataset.id=u._id;
        const av = el('div','avatar'); av.textContent = inicial(u.nome);
        const txt = el('div');
        const name = el('div','name'); name.textContent = u.nome;
        const pv = el('div','preview'); pv.textContent = u.preview || '';
        txt.append(name,pv);
        const right = el('div');
        const tm = el('div','time'); tm.textContent = u.ts ? fmtData(u.ts) : '';
        const un = el('div','unread'); if(!u.unread) un.setAttribute('hidden',''); else un.textContent = u.unread;
        right.append(tm, un);

        row.append(av, txt, right);
        row.onclick = ()=>{ selUsuarios.value = u._id; trocarUsuario(); };
        if(String(usuarioAtualId)===String(u._id)) row.classList.add('active');

        listaUsuarios.appendChild(row);
      });
    }

    // ======= interface de conversa =======
    function renderThread(msgs, myId){
      threadEl.innerHTML = '';
      if(!Array.isArray(msgs) || msgs.length===0){
        threadEl.innerHTML = '<p class="empty" style="padding:12px 16px">Sem mensagens nesta conversa.</p>'; return;
      }
      msgs.forEach(m=>{
        const mine = String(m.remetente?._id||m.remetente) === String(myId);
        const b = el('div', `bubble ${mine?'mine':'theirs'}`);
        const texto = (m.conteudo||'').replace(/\n/g,'<br/>');
        if(texto) b.innerHTML = texto;
        if(m.anexoUrl){
          if(texto) b.innerHTML += '<br/>';
          const a = el('a'); a.href = m.anexoUrl; a.target='_blank'; a.rel='noopener';
          a.textContent = m.anexoNome || 'Arquivo'; b.appendChild(a);
        }
        const meta = el('div','meta');
        meta.textContent = `${m.remetente?.nome || '—'} • ${new Date(m.data||m.createdAt).toLocaleString('pt-BR')}`;
        b.appendChild(meta);
        threadEl.appendChild(b);
      });
      threadEl.scrollTop = threadEl.scrollHeight;
    }

    // ======= dados =======
    async function carregarUsuarios(){
      const users = await fetchJSON('/api/mensagens/usuarios');
      // semente com meta vazia
      users.forEach(u=>{
        if(!userMeta.has(u._id)) userMeta.set(u._id, { _id:u._id, nome:u.nome, tipo:u.tipo, preview:'', ts:null, unread:0 });
      });
      // desenha select
      selUsuarios.innerHTML = '<option value="">Selecione um usuário…</option>';
      users.forEach(u=>{
        const opt = el('option'); opt.value=u._id; opt.textContent = `${u.nome} (${u.tipo})`; selUsuarios.appendChild(opt);
      });
      renderUserList();
    }

    async function trocarUsuario(){
      const id = selUsuarios.value;
      usuarioAtualId = id || null;
      document.querySelectorAll('.user-item').forEach(n => n.classList.toggle('active', n.dataset.id===usuarioAtualId));
      if(usuarioAtualId){
        const meta = userMeta.get(usuarioAtualId);
        const nome = meta?.nome || 'Conversa';
        tituloEl.textContent = nome;
        avatarEl.textContent = inicial(nome);
        cacheUltimosIds = [];
        // marcar como lidas
        try { await fetchJSON(`/api/mensagens/marcar-lidas?idUsuario=${encodeURIComponent(usuarioAtualId)}`); } catch {}
        if(meta){ meta.unread = 0; renderUserList(); atualizarResumoEBadge(); }
        await carregarConversa();
      }else{
        tituloEl.textContent = 'Nenhum usuário selecionado';
        avatarEl.textContent = '?';
        threadEl.innerHTML = '<p class="empty" style="padding:12px 16px">Escolha um usuário para ver a conversa.</p>';
      }
    }

    async function carregarConversa(){
      if(!usuarioAtualId) return;
      const msgs = await fetchJSON(`/api/mensagens/conversa/${usuarioAtualId}`);
      const ids = msgs.map(m => String(m._id));
      const temNovas = cacheUltimosIds.length && ids.length > cacheUltimosIds.length;
      cacheUltimosIds = ids;

      // atualiza preview/ts com última da conversa
      const last = msgs[msgs.length-1];
      const meta = userMeta.get(usuarioAtualId);
      if (last && meta) { meta.preview = (last.conteudo||'📎 Anexo'); meta.ts = last.data||last.createdAt||new Date().toISOString(); renderUserList(); }

      renderThread(msgs, await meuId());
      if(temNovas){ playBeep(); }
    }

    async function enviar(){
      if(!usuarioAtualId){ alert('Selecione um usuário.'); return; }
      const texto = (document.getElementById('campoMensagem').value||'').trim();
      const file = document.getElementById('inputArquivo').files[0];
      if(!texto && !file){ alert('Digite uma mensagem ou anexe um arquivo.'); return; }

      let opt = {};
      if(file){
        const fd = new FormData();
        fd.append('destinatario', usuarioAtualId);
        if(texto) fd.append('conteudo', texto);
        fd.append('anexo', file);
        opt = { method:'POST', body: fd };
      }else{
        opt = {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ destinatario: usuarioAtualId, conteudo: texto })
        };
      }

      await fetchJSON('/api/mensagens', opt);
      document.getElementById('campoMensagem').value='';
      document.getElementById('inputArquivo').value='';
      document.getElementById('fileName').textContent='';
      await carregarConversa();
    }

    // ======= novas mensagens / ordenação / toasts / resumo =======
    function atualizarResumoEBadge(){
      const total = Array.from(userMeta.values()).reduce((s,u)=>s+(u.unread||0),0);
      if(total>0){
        badge.hidden=false; badge.textContent=String(total); badge.classList.add('blink');
        const pessoas = Array.from(userMeta.values()).filter(u=>u.unread>0).length;
        resumo.style.display='block';
        resumo.textContent = `Você tem ${total} nova(s) mensagem(ns) de ${pessoas} pessoa(s).`;
      }else{
        badge.hidden=true; badge.classList.remove('blink');
        resumo.style.display='none'; resumo.textContent='';
      }
    }

    async function checarNovas(){
      try{
        const arr = await fetchJSON('/api/mensagens/novas'); // snapshot de todas não-lidas
        if(!Array.isArray(arr)) return;

        // --- calcular unread por remetente a partir do SNAPSHOT (sem somar repetidamente) ---
        const bySender = new Map(); // uid -> {count, lastMsg}
        arr.forEach(m=>{
          const uid = String(m.remetente?._id || m.remetente);
          const cur = bySender.get(uid) || { count:0, lastMsg:null };
          cur.count++;
          if(!cur.lastMsg || new Date(m.data||m.createdAt) > new Date(cur.lastMsg.data||cur.lastMsg.createdAt)) cur.lastMsg = m;
          bySender.set(uid, cur);
        });

        // aplica meta por remetente (count e preview/ts atualizados)
        bySender.forEach((info, uid)=>{
          const nome = info.lastMsg?.remetente?.nome || 'Usuário';
          if(!userMeta.has(uid)) userMeta.set(uid, { _id:uid, nome, tipo:'', preview:'', ts:null, unread:0 });
          const meta = userMeta.get(uid);
          meta.unread = info.count;
          meta.preview = (info.lastMsg?.conteudo && info.lastMsg.conteudo.trim()) ? info.lastMsg.conteudo.trim() : '📎 Anexo';
          meta.ts = info.lastMsg?.data || info.lastMsg?.createdAt || meta.ts || new Date().toISOString();
        });

        // zera unread de quem não está em arr (ficaram lidas)
        userMeta.forEach((meta, uid)=>{
          if(!bySender.has(uid)) meta.unread = 0;
        });

        // --- toasts apenas para as mensagens realmente novas desde o último tick ---
        const currentIds = arr.map(m => String(m._id));
        const isFirst = lastSnapshotIds.length === 0;
        const newOnes = isFirst ? arr : arr.filter(m => !lastSnapshotIds.includes(String(m._id)));
        lastSnapshotIds = currentIds;

        newOnes.forEach(m=>{
          const uid = String(m.remetente?._id || m.remetente);
          const nome = m.remetente?.nome || 'Usuário';
          showToast({
            id: m._id,
            titulo: `${nome} enviou uma mensagem`,
            texto: (m.conteudo && m.conteudo.trim()) ? m.conteudo.trim() : '📎 Anexo',
            onClick: () => abrirConversaCom(uid)
          });
        });
        if(newOnes.length>0) playBeep();

        // se conversa aberta e chegou algo desse usuário, atualiza thread e zera unread dele
        if(usuarioAtualId && arr.some(m => String(m.remetente?._id||m.remetente) === String(usuarioAtualId))){
          await carregarConversa();
          const meta = userMeta.get(usuarioAtualId);
          if(meta){ meta.unread = 0; }
          try { await fetchJSON(`/api/mensagens/marcar-lidas?idUsuario=${encodeURIComponent(usuarioAtualId)}`); } catch {}
        }

        renderUserList();
        atualizarResumoEBadge();
      }catch{ /* silencioso */ }
    }

    // ======= eventos =======
    document.body.addEventListener('click', ()=>{ ultimaInteracao = true; }, { once:true });
    selUsuarios.addEventListener('change', trocarUsuario);
    document.getElementById('inputArquivo').addEventListener('change', setFileName);
    document.getElementById('btnEnviar').addEventListener('click', enviar);
    document.getElementById('campoMensagem').addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && (e.ctrlKey || e.metaKey)){ enviar(); }
    });
    btnBell.addEventListener('click', ()=>{
      // abre o primeiro com não lidas; se não houver, abre o mais recente
      const arr = Array.from(userMeta.values()).sort((a,b)=>{
        const ua=(a.unread||0)>0, ub=(b.unread||0)>0;
        if(ua!==ub) return ua?-1:1;
        const ta=a.ts?new Date(a.ts).getTime():0, tb=b.ts?new Date(b.ts).getTime():0;
        return tb-ta;
      });
      if(arr.length){ abrirConversaCom(arr[0]._id); }
    });

    // ======= boot =======
    (async()=>{
      await carregarUsuarios();

      // abriu a partir de um toast/sino global?
      const alvo = sessionStorage.getItem('abrirConversaCom');
      if(alvo && selUsuarios.querySelector(`option[value="${alvo}"]`)){
        selUsuarios.value = alvo; await trocarUsuario();
        sessionStorage.removeItem('abrirConversaCom');
      }

      // checagem inicial para já popular badge/preview/resumo
      await checarNovas();

      setInterval(checarNovas, 5000);                // ordena + toasts + resumo
      setInterval(()=>{ carregarConversa().catch(()=>{}); }, 5000); // conversa aberta
    })();
  </script>
  <!-- Notificações globais com prévia (opção 2) -->
  <script src="notify.js"></script>

</body>
