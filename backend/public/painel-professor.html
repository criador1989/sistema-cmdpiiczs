<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel do Professor - CMDPII</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <meta name="theme-color" content="#941a1d" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #941a1d;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
    }

    #busca {
      margin: 1rem auto;
      display: block;
      padding: 0.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #listaAlunos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1rem;
      gap: 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      width: 160px;
      text-align: center;
      padding: 1rem;
      transition: transform 0.2s ease;
      animation: fadeInUp 0.4s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    .card h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }

    @keyframes fadeInUp {
      from {
        transform: translateY(15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <header>Painel do Professor</header>
  <input type="text" id="busca" placeholder="🔍 Buscar aluno por nome..." />
  <div id="listaAlunos"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const lista = document.getElementById('listaAlunos');
    const campoBusca = document.getElementById('busca');

    async function carregarAlunos() {
      try {
        const resposta = await fetch(`/api/usuarios/acesso/${token}`);
        const dados = await resposta.json();

        if (!dados.professor) {
          lista.innerHTML = '<p style="color:red;">Token inválido ou professor não encontrado.</p>';
          return;
        }

        const alunos = dados.alunos || [];
        exibirAlunos(alunos);

        campoBusca.addEventListener('input', () => {
          const termo = campoBusca.value.toLowerCase();
          const filtrados = alunos.filter(a => a.nome.toLowerCase().includes(termo));
          exibirAlunos(filtrados);
        });
      } catch (erro) {
        console.error('Erro ao carregar alunos:', erro);
        lista.innerHTML = '<p style="color:red;">Erro ao carregar dados.</p>';
      }
    }

    function exibirAlunos(alunos) {
      lista.innerHTML = '';
      alunos.forEach(aluno => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <img src="${aluno.foto || '/icons/icon-192x192.png'}" alt="Foto do aluno">
          <h3>${aluno.nome}</h3>
        `;
        div.onclick = () => {
          window.location.href = `/ficha-aluno-professor.html?id=${aluno._id}&token=${token}`;
        };
        lista.appendChild(div);
      });
    }

    carregarAlunos();
  </script>
</body>
</html>
