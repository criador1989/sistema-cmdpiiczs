<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel do Professor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <meta name="theme-color" content="#941a1d" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,0.08);
      --border:rgba(255,255,255,0.18);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.75);
      --brand:#941a1d;
      --shadow:0 16px 40px rgba(0,0,0,0.55);
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(148,26,29,0.35), transparent 55%),
        radial-gradient(circle at 80% 100%, rgba(56,189,248,0.18), transparent 60%),
        linear-gradient(145deg, #020617, #0b1220);
      color-scheme:dark;
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(720px, 94vw);
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .title{
      font-weight:900;
      letter-spacing:.04em;
      font-size:1.15rem;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .badge{
      font-size:.78rem;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(0,0,0,0.25);
      color:var(--muted);
      white-space:nowrap;
    }
    .msg{
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.5;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(0,0,0,0.35);
      color:#fff;
      padding:11px 14px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 26px rgba(0,0,0,0.45);
      transition:transform .15s ease, border-color .15s ease, filter .15s ease;
    }
    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(56,189,248,0.70);
      filter:brightness(1.06);
    }
    .btn.primary{
      background:linear-gradient(90deg, #941a1d, #b22222);
      border-color:rgba(255,255,255,0.18);
    }
    .hint{
      margin-top:12px;
      font-size:.92rem;
      color:rgba(255,255,255,0.78);
      border-top:1px dashed rgba(255,255,255,0.18);
      padding-top:12px;
    }
    .owl{
      display:inline-block;
      width:40px;height:40px;
      border-radius:12px;
      background:rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.18);
      display:grid;
      place-items:center;
      box-shadow:0 10px 22px rgba(0,0,0,0.45);
    }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <div class="title">
        <span class="owl">🦉</span>
        Painel do Professor
      </div>
      <span class="badge" id="statusPill">Verificando…</span>
    </header>

    <p class="msg" id="statusTxt">Aguarde, estou checando sua sessão…</p>

    <!-- ✅ Agora este painel "permanece" e só segue se clicar -->
    <div class="actions" id="actions" style="display:none;">
      <button class="btn primary" id="btnProsseguir" style="display:none;">Prosseguir</button>
      <button class="btn" id="btnIrLogin" style="display:none;">Ir para o login</button>
    </div>

    <div class="hint">
      <b>Dica:</b> Professor acessa a <b>ficha do aluno</b> e a <b>chamada</b> pelo painel principal.
      Tudo fica registrado nos <b>logs</b>.
    </div>
  </div>

  <script>
    const statusPill = document.getElementById('statusPill');
    const statusTxt  = document.getElementById('statusTxt');
    const actions    = document.getElementById('actions');
    const btnProsseguir = document.getElementById('btnProsseguir');
    const btnIrLogin    = document.getElementById('btnIrLogin');

    function setStatus(pill, text){
      statusPill.textContent = pill;
      statusTxt.textContent = text;
    }

    function showActions(){
      actions.style.display = 'flex';
    }

    function showProsseguir(){
      btnProsseguir.style.display = 'inline-flex';
      btnIrLogin.style.display = 'none';
    }

    function showLoginButtons(){
      btnProsseguir.style.display = 'none';
      btnIrLogin.style.display = 'inline-flex';
    }

    async function checkSession(){
      try{
        const r = await fetch('/api/alunos/contagem', {
          method: 'GET',
          credentials: 'include',
          cache: 'no-store',
          headers: { 'Accept':'application/json' }
        });

        if (r.ok) return true;
        if (r.status === 401 || r.status === 403) return false;

        // 404/500 etc -> indefinido (não expulsa)
        return null;
      }catch(e){
        return null;
      }
    }

    async function init(){
      setStatus('Verificando…', 'Aguarde, estou checando sua sessão…');

      const ok = await checkSession();
      showActions();

      // ✅ Logado: permanece aqui e libera "Prosseguir" (não redireciona automático)
      if (ok === true){
        setStatus('Sessão OK', 'Sessão confirmada. Clique em “Prosseguir” para ir ao painel principal.');
        showProsseguir();
        btnProsseguir.textContent = 'Prosseguir';
        btnProsseguir.onclick = () => window.location.href = '/painel.html';
        return;
      }

      // ❌ Não logado: permanece aqui e mostra "Ir para o login"
      if (ok === false){
        setStatus('Sessão ausente', 'Você não está logado. Clique em “Ir para o login”.');
        showLoginButtons();
        btnIrLogin.onclick = () => window.location.href = '/login.html?next=%2Fpainel-professor.html';
        return;
      }

      // ⚠️ Indefinido: permanece aqui e libera os dois (prosseguir + login)
      setStatus('Aviso', 'Não consegui confirmar sua sessão agora. Você pode prosseguir ou fazer login novamente.');
      btnProsseguir.style.display = 'inline-flex';
      btnIrLogin.style.display = 'inline-flex';
      btnProsseguir.textContent = 'Prosseguir';
      btnProsseguir.onclick = () => window.location.href = '/painel.html';
      btnIrLogin.onclick = () => window.location.href = '/login.html?next=%2Fpainel-professor.html';
    }

    init();
  </script>
</body>
</html>
