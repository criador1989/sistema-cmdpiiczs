<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Notificação</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8B0000" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" href="/icons/icon-192x192.png" />

  <script>
    // Em DEV, evita SW/cache antigo
    if (['localhost','127.0.0.1'].includes(location.hostname)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(rs => rs.forEach(r => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('✅ SW registrado:', reg.scope))
          .catch(err => console.warn('❌ SW falhou:', err));
      });
    }
  </script>

  <style>
    :root{
      --rubi1:#8B0000; --rubi2:#D82327; --gold:#E7C873;
      --bg:#0b0b0b; --panel:#121417; --card:#171a1e; --line:#262a31;
      --txt:#eaecef; --muted:#9aa3ad; --good:#21a67a; --warn:#e2b93b; --bad:#e55353;
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}

    /* ===== BODY NO MESMO ESTILO DO PAINEL (WALLPAPER) ===== */
    body{
      margin:0;
      font-family:"Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--txt);
      background:url("img/bg-painel-smart.png") center/cover no-repeat fixed;
      color-scheme:dark;
      padding:32px 16px;
      -webkit-font-smoothing:antialiased;
    }

    .container{
      max-width:860px; margin:0 auto;
      background:linear-gradient(180deg, rgba(15,17,20,.92), rgba(11,13,17,.88));
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--radius);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 46px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.05);
      padding:28px;
      animation: rise .6s ease-out both;
    }
    h2{
      margin:0 0 14px; font-weight:700; letter-spacing:.2px;
      color:#fff; text-align:center;
    }
    .sub{ text-align:center; color:var(--muted); margin-bottom:18px; }

    label{
      display:block; margin:14px 0 6px;
      color:#dcdfe4; font-weight:600; font-size:14px
    }
    select,input,textarea{
      width:100%; padding:12px 12px; border-radius:12px; border:1px solid var(--line);
      background:#0f1114; color:#e9ecf1; outline:none; font-size:15px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    select:focus,input:focus,textarea:focus{
      border-color:#b94d4f; box-shadow:0 0 0 3px rgba(216,35,39,.25)
    }
    textarea{min-height:90px; resize:vertical}

    .row{display:grid; grid-template-columns:1fr 1fr; gap:14px}
    .row-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px}

    .pill{
      display:inline-block; padding:8px 12px; border-radius:999px;
      background:#0f1114; border:1px solid var(--line); margin-bottom:10px;
      font-weight:600; color:#e9ecf1;
    }

    .btns{display:flex; gap:12px; margin-top:22px; flex-wrap:wrap}
    .btn{
      appearance:none; border:0; border-radius:12px; padding:12px 18px; cursor:pointer; font-weight:700;
      background:linear-gradient(180deg, var(--rubi2), var(--rubi1)); color:#fff;
      box-shadow:0 6px 18px rgba(216,35,39,.35);
      transition: transform .08s ease, filter .08s ease;
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active{ transform: translateY(0); filter: brightness(.98); }
    .btn.muted{ background:#3b4048; box-shadow:none }
    .msg{ margin-top:14px; text-align:center; font-weight:700 }
    .ok{ color:var(--good) } .err{ color:var(--bad) }

    #valorNumerico{ font-weight:800; letter-spacing:.3px; background:#101317 }
    #valorNumerico.positivo{ background:#0f1a14; border-color:#1b7a55 }
    #valorNumerico.negativo{ background:#1a0f10; border-color:#7a1b1b }

    .hidden{ display:none !important; }

    @keyframes rise{
      from{opacity:0; transform: translateY(12px);}
      to{opacity:1; transform: translateY(0);}
    }
  </style>
  <link rel="stylesheet" href="/axoriin-ajuda/ajuda-contextual.css">
</head>
<body>
  <main class="container">
    <h2>Cadastro de Notificação Disciplinar</h2>
    <div class="sub">Registre indisciplina ou elogio; valores são calculados automaticamente.</div>

    <form id="formNotificacao" novalidate>
      <div id="alunoSelecionado" class="pill" style="display:none;"></div>

      <label for="pesquisaAluno">Pesquisar aluno</label>
      <input type="text" id="pesquisaAluno" placeholder="Digite o nome do aluno..." />

      <label for="aluno">Aluno</label>
      <select id="aluno" name="aluno" required></select>

      <div class="row">
        <div>
          <label for="tipoRegistro">Tipo de Registro</label>
          <select id="tipoRegistro" name="tipoRegistro" required>
            <option value="indisciplina" selected>Indisciplina</option>
            <option value="elogio">Elogio</option>
          </select>
        </div>
        <div>
          <label for="data">Data</label>
          <input type="date" id="data" name="data" required />
        </div>
      </div>

      <!-- ====== Grupo INDISCIPLINA ====== -->
      <div id="grupoIndisciplina">
        <div class="row">
          <div>
            <label for="tipo">Gravidade do Ato</label>
            <select id="tipo" name="tipo">
              <option value="">Selecione</option>
              <option value="Leve">Leve</option>
              <option value="Médio">Médio</option>
              <option value="Grave">Grave</option>
              <option value="Gravíssimo">Gravíssimo</option>
            </select>
          </div>

          <div>
            <label for="tipoMedida">Tipo de Medida</label>
            <select id="tipoMedida" name="tipoMedida">
              <option value="">Selecione</option>
              <option value="Advertência Escrita">Advertência Escrita</option>
              <option value="Repreensão">Repreensão</option>
              <option value="A.E.C.D.E">A.E.C.D.E</option>
              <option value="A.I.A">A.I.A</option>
            </select>
          </div>
        </div>

        <label for="motivo">Motivo (Ato de indisciplina)</label>
        <select id="motivo" name="motivo">
          <option value="">Selecione uma gravidade</option>
        </select>

        <div id="detalhesMotivo" class="hidden" style="margin-top:10px; padding:12px; border:1px solid var(--line); border-radius:12px; background:#0f1114">
          <div class="row-3">
            <p><strong>Artigo:</strong> <span id="artigoTexto">—</span></p>
            <p><strong>Inciso:</strong> <span id="incisoTexto">—</span></p>
            <p><strong>Classificação:</strong> <span id="classificacaoTexto">—</span></p>
          </div>
        </div>

        <input type="hidden" name="artigo" id="artigo">
        <input type="hidden" name="inciso" id="inciso">
        <input type="hidden" name="classificacaoRegulamento" id="classificacaoRegulamento">

        <div class="row">
          <div>
            <label for="quantidadeDias" id="lblDias" class="hidden">Quantidade de Dias (se aplicável)</label>
            <input type="number" id="quantidadeDias" name="quantidadeDias" min="1" class="hidden" />
          </div>
          <div>
            <label for="valorNumerico">Valor Numérico</label>
            <input type="text" step="0.01" id="valorNumerico" name="valorNumerico" readonly />
          </div>
        </div>
      </div>

      <!-- ====== Grupo ELOGIO ====== -->
      <div id="grupoElogio" class="hidden">
        <label for="tipoElogio">Tipo de Elogio</label>
        <select id="tipoElogio" name="tipoElogio">
          <option value="">Selecione</option>
          <option value="elogioVerbal">Elogio verbal (+0,15)</option>
          <option value="boletimInternoIndividual">Boletim Interno Individual (+0,60)</option>
          <option value="boletimInternoColetivo">Boletim Interno Coletivo (+0,20)</option>
          <option value="mediaAlta">Média ≥ 8,5 (+0,40)</option>
        </select>
      </div>

      <label for="observacao">Observação</label>
      <textarea id="observacao" name="observacao"></textarea>

      <div class="btns">
        <button type="submit" class="btn">Cadastrar</button>
        <button type="button" class="btn muted" onclick="window.location.href='painel.html'">← Voltar ao Painel</button>
      </div>

      <p id="mensagem" class="msg"></p>
    </form>
  </main>

  <script>
    // ===== Datas de calendário sem erro de fuso =====
    function axIsDateOnly(value) {
      return /^\d{4}-\d{2}-\d{2}$/.test(String(value || '').trim());
    }

    function axDateOnlyFromAny(value) {
      if (!value) return '';
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        const y = value.getFullYear();
        const m = String(value.getMonth() + 1).padStart(2, '0');
        const d = String(value.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      const s = String(value || '').trim();
      if (!s) return '';
      if (axIsDateOnly(s)) return s;

      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;

      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return '';
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function axDateOnlyHoje() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dia = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dia}`;
    }

    function axDateOnlyParaBR(value) {
      const iso = axDateOnlyFromAny(value);
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }
  </script>
  <script>
    const BASE = (location.port === '5173') ? 'http://localhost:5000' : '';
    const API  = (p)=> `${BASE}${p.startsWith('/api') ? p : '/api' + (p.startsWith('/')?p:'/'+p)}`;
    const AUTH = (p)=> `${BASE}${p.startsWith('/auth')? p : '/auth' + (p.startsWith('/')?p:'/'+p)}`;

    async function getJSON(url, { method='GET', body=null, headers={}, timeoutMs=12000 } = {}) {
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort('timeout'), timeoutMs);
      try {
        const r = await fetch(url, { method, body, headers, credentials:'include', cache:'no-store', signal: ctrl.signal });
        const ct = r.headers.get('content-type') || '';
        const data = ct.includes('application/json') ? await r.json() : {};
        return { ok: r.ok, status: r.status, data };
      } finally { clearTimeout(t); }
    }

    // utils
    function toNum(v, fallback = 0){
      const n = Number((v+'').replace(',', '.'));
      return Number.isFinite(n) ? n : fallback;
    }
    function round2(n){ return Number(toNum(n).toFixed(2)); }

    const medidasNegativas = {
      'Advertência Escrita': -0.30,
      'Repreensão': -0.50,
      'A.E.C.D.E': -0.70,
      'A.I.A': -1.20
    };
    const elogiosMapa = {
      elogioVerbal: 0.15,
      boletimInternoIndividual: 0.60,
      boletimInternoColetivo: 0.20,
      mediaAlta: 0.40
    };

    let motivosPorTipo = {};
    let listaCompletaMotivos = [];

    const qs = new URLSearchParams(location.search);
    const alunoQS = qs.get('aluno');
    const nomeQS  = qs.get('nome');

    async function verificarAutenticado() {
      try {
        let r = await fetch(AUTH('/usuario-logado'), { credentials:'include', cache:'no-store' });
        if (!r.ok) r = await fetch(AUTH('/me'), { credentials:'include', cache:'no-store' });
        if (!r.ok) throw 0;
      } catch {
        window.location.href = '/login.html';
      }
    }

    async function carregarMotivos() {
      try {
        const { ok, status, data } = await getJSON(API('/motivos'));
        if (status === 401) { window.location.href = '/login.html'; return; }
        if (!ok) throw 0;

        const motivos = Array.isArray(data) ? data : [];
        listaCompletaMotivos = motivos;

        motivosPorTipo = motivos.reduce((acc, item) => {
          if (!acc[item.classificacao]) acc[item.classificacao] = [];
          acc[item.classificacao].push(item.motivo);
          return acc;
        }, {});
      } catch (err) {
        console.error('Erro ao carregar motivos');
      }
    }

    async function carregarAlunos() {
      const select     = document.getElementById('aluno');
      const pesquisa   = document.getElementById('pesquisaAluno');
      const seloAluno  = document.getElementById('alunoSelecionado');

      if (alunoQS) {
        const nomeDecod = nomeQS ? decodeURIComponent(nomeQS) : 'Carregando aluno...';
        select.innerHTML = '';
        const opt = document.createElement('option');
        opt.value = alunoQS;
        opt.textContent = nomeDecod;
        select.appendChild(opt);
        select.value = alunoQS;
        select.disabled = true; pesquisa.disabled = true;

        seloAluno.style.display = 'inline-block';
        seloAluno.textContent = `Aluno selecionado: ${nomeDecod}`;

        try {
          const { ok, status, data } = await getJSON(API(`/alunos/${alunoQS}`));
          if (status === 401) { window.location.href = '/login.html'; return; }
          if (ok && data && data._id) {
            opt.textContent = `${data.nome} (${data.turma || ''})`;
            seloAluno.textContent = `Aluno selecionado: ${data.nome} (${data.turma || 'turma não informada'})`;
            if (![...select.options].some(o => o.value === data._id)) {
              const optNew = document.createElement('option');
              optNew.value = data._id;
              optNew.textContent = `${data.nome} (${data.turma || ''})`;
              select.appendChild(optNew);
              select.value = data._id;
            }
          }
        } catch (_) {}
        return;
      }

      try {
        const { ok, status, data } = await getJSON(API('/alunos'));
        if (status === 401) { window.location.href = '/login.html'; return; }
        if (!ok) throw 0;

        const alunos = Array.isArray(data) ? data : [];
        function atualizarOpcoes(filtro = '') {
          select.innerHTML = '';
          alunos
            .filter(a => (a.nome || '').toLowerCase().includes(filtro.toLowerCase()))
            .forEach(a => {
              const opt = document.createElement('option');
              opt.value = a._id;
              opt.textContent = `${a.nome} (${a.turma})`;
              select.appendChild(opt);
            });
        }
        pesquisa.addEventListener('input', () => atualizarOpcoes(pesquisa.value));
        atualizarOpcoes();
      } catch (err) {
        console.error('Erro ao carregar alunos');
      }
    }

    const tipoRegistro = document.getElementById('tipoRegistro');
    const grupoIndisciplina = document.getElementById('grupoIndisciplina');
    const grupoElogio = document.getElementById('grupoElogio');
    const tipo = document.getElementById('tipo');
    const motivo = document.getElementById('motivo');
    const tipoMedida = document.getElementById('tipoMedida');
    const tipoElogio = document.getElementById('tipoElogio');
    const valorNumerico = document.getElementById('valorNumerico');
    const qtdDias = document.getElementById('quantidadeDias');
    const lblDias = document.getElementById('lblDias');

    function toggleGrupos(){
      if (tipoRegistro.value === 'elogio') {
        grupoElogio.classList.remove('hidden');
        grupoIndisciplina.classList.add('hidden');
        tipo.value = ''; motivo.value = ''; tipoMedida.value = ''; qtdDias.value = '';
        document.getElementById('detalhesMotivo').classList.add('hidden');
        aplicarValorElogio();
      } else {
        grupoElogio.classList.add('hidden');
        grupoIndisciplina.classList.remove('hidden');
        aplicarValorIndisciplina();
      }
    }
    tipoRegistro.addEventListener('change', toggleGrupos);

    tipo.addEventListener('change', function () {
      const gravidade = this.value;
      motivo.innerHTML = '<option value="">Selecione</option>';
      document.getElementById('detalhesMotivo').classList.add('hidden');

      if (motivosPorTipo[gravidade]) {
        motivosPorTipo[gravidade].forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          motivo.appendChild(opt);
        });
      }
      aplicarValorIndisciplina();
    });

    motivo.addEventListener('change', function () {
      const motivoSelecionado = this.value;
      const m = listaCompletaMotivos.find(x => x.motivo === motivoSelecionado);
      const box = document.getElementById('detalhesMotivo');

      if (m) {
        document.getElementById('artigoTexto').textContent = m.artigo;
        document.getElementById('incisoTexto').textContent = m.inciso;
        document.getElementById('classificacaoTexto').textContent = m.classificacao;
        document.getElementById('artigo').value = m.artigo;
        document.getElementById('inciso').value = m.inciso;
        document.getElementById('classificacaoRegulamento').value = m.classificacao;
        box.classList.remove('hidden');
      } else {
        box.classList.add('hidden');
      }
    });

    function aplicarValorIndisciplina() {
      if (tipoRegistro.value !== 'indisciplina') return;
      const base = medidasNegativas[tipoMedida.value] || 0;
      const precisaDias = ['A.E.C.D.E', 'A.I.A'].includes(tipoMedida.value);
      lblDias.classList.toggle('hidden', !precisaDias);
      qtdDias.classList.toggle('hidden', !precisaDias);

      let dias = 1;
      if (precisaDias) {
        dias = parseInt(qtdDias.value, 10);
        if (!Number.isInteger(dias) || dias < 1) dias = 1;
      }
      const valor = round2(base * dias);
      valorNumerico.value = valor ? valor.toFixed(2) : '';
      valorNumerico.className = valor < 0 ? 'negativo' : '';
    }
    tipoMedida.addEventListener('change', aplicarValorIndisciplina);
    qtdDias.addEventListener('input', aplicarValorIndisciplina);

    function aplicarValorElogio() {
      if (tipoRegistro.value !== 'elogio') return;
      const v = elogiosMapa[tipoElogio.value];
      if (typeof v === 'number') {
        const r = round2(v);
        valorNumerico.value = r.toFixed(2);
        valorNumerico.className = 'positivo';
      } else {
        valorNumerico.value = '';
        valorNumerico.className = '';
      }
    }
    tipoElogio.addEventListener('change', aplicarValorElogio);

    // ===== SUBMIT AJUSTADO =====
    document.getElementById('formNotificacao').addEventListener('submit', async function (e) {
      e.preventDefault();

      const tipoRegistroValor = document.getElementById('tipoRegistro').value;

      const dadosBasicos = {
        aluno: document.getElementById('aluno').value,
        observacao: document.getElementById('observacao').value || '',
        data: document.getElementById('data').value,
        tipoRegistro: tipoRegistroValor
      };

      let body;

      if (tipoRegistroValor === 'elogio') {
        // --- ELOGIO ---
        if (!tipoElogio.value) {
          alert('Selecione o tipo de elogio.');
          return;
        }

        const valor = elogiosMapa[tipoElogio.value] ?? 0;

        const textoMotivoElogio = {
          elogioVerbal: 'Elogio verbal',
          boletimInternoIndividual: 'Boletim Interno Individual',
          boletimInternoColetivo: 'Boletim Interno Coletivo',
          mediaAlta: 'Média ≥ 8,5',
        }[tipoElogio.value] || 'Elogio';

        body = {
          ...dadosBasicos,
          natureza: 'elogio',
          gravidade: 'Elogio',
          tipo: 'Elogio',
          tipoMedida: 'Elogio',
          tipoElogio: tipoElogio.value,
          motivo: textoMotivoElogio,
          quantidadeDias: 1,
          valorNumerico: round2(valor),
          artigo: '',
          paragrafo: '',
          inciso: '',
          classificacaoRegulamento: '',
          comentarioMonitor: ''
        };

      } else {
        // --- INDISCIPLINA ---
        const gravidadeSelecionada = tipo.value || '';
        const motivoSelecionado    = motivo.value || '';
        const tipoMedidaSelecionada = tipoMedida.value || '';

        if (!gravidadeSelecionada) {
          alert('Selecione a gravidade do ato.');
          return;
        }
        if (!motivoSelecionado) {
          alert('Selecione o motivo do ato de indisciplina.');
          return;
        }
        if (!tipoMedidaSelecionada) {
          alert('Selecione o tipo de medida aplicada.');
          return;
        }

        const base = medidasNegativas[tipoMedidaSelecionada] || 0;
        const precisaDias = ['A.E.C.D.E', 'A.I.A'].includes(tipoMedidaSelecionada);

        let dias = precisaDias ? parseInt(document.getElementById('quantidadeDias').value, 10) : 1;
        if (!Number.isInteger(dias) || dias < 1) dias = 1;

        const valor = round2(base * dias);

        body = {
          ...dadosBasicos,
          natureza: 'indisciplina',
          gravidade: gravidadeSelecionada,
          motivo: motivoSelecionado,
          tipo: tipoMedidaSelecionada,
          tipoMedida: tipoMedidaSelecionada,
          quantidadeDias: dias,
          valorNumerico: valor,
          artigo: document.getElementById('artigo').value || '',
          paragrafo: '',
          inciso: document.getElementById('inciso').value || '',
          classificacaoRegulamento: document.getElementById('classificacaoRegulamento').value || '',
          comentarioMonitor: ''
        };
      }

      console.log('Body enviado para /api/notificacoes:', body);

      try {
        const r = await fetch(API('/notificacoes'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body)
        });
        const resultado = await r.json().catch(() => ({}));

        if (r.status === 401) {
          window.location.href = '/login.html';
          return;
        }

        if (r.ok) {
          const msg = document.getElementById('mensagem');
          msg.textContent = '✅ Registro salvo com sucesso!';
          msg.className = 'msg ok';

          this.reset();
          document.getElementById('detalhesMotivo').classList.add('hidden');
          toggleGrupos();
          valorNumerico.className = '';

          if (alunoQS) {
            const select = document.getElementById('aluno');
            const pesquisa = document.getElementById('pesquisaAluno');
            select.disabled = true;
            pesquisa.disabled = true;
            select.value = alunoQS;
          }
        } else {
          const msg = document.getElementById('mensagem');
          msg.textContent = resultado?.mensagem || resultado?.message || resultado?.error || '❌ Erro ao cadastrar.';
          msg.className = 'msg err';
          console.error('Erro ao cadastrar notificação:', resultado);
        }
      } catch (err) {
        console.error('Erro de conexão ao cadastrar notificação:', err);
        const msg = document.getElementById('mensagem');
        msg.textContent = '❌ Erro de conexão com o servidor.';
        msg.className = 'msg err';
      }
    });

    (function init(){
      document.getElementById('data').value = axDateOnlyHoje();

      verificarAutenticado();
      carregarAlunos();
      carregarMotivos();
      toggleGrupos();
    })();
  </script>

  <script src="/axoriin-ajuda/ajuda-contextual.js"></script>
</body>
