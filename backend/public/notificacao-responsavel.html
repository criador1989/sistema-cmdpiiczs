<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciência da Notificação Disciplinar</title>
  <style>
    :root{
      --rubi:#8B0000;
      --rubi2:#B22222;
      --bg:#f3f4f6;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(circle at top right,rgba(139,0,0,.12),transparent 34%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:min(760px,100%);
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 18px 50px rgba(0,0,0,.12);
      overflow:hidden;
    }

    .head{
      background:linear-gradient(135deg,var(--rubi),var(--rubi2));
      color:#fff;
      padding:22px;
      text-align:center;
    }

    .head h1{
      margin:0;
      font-size:1.35rem;
    }

    .head p{
      margin:8px 0 0;
      opacity:.92;
    }

    .body{
      padding:22px;
      display:grid;
      gap:14px;
    }

    .box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fafafa;
      line-height:1.55;
    }

    .box b{
      display:block;
      color:var(--muted);
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:4px;
    }

    textarea{
      width:100%;
      min-height:110px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      font:inherit;
      resize:vertical;
    }

    button{
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--rubi),var(--rubi2));
      color:#fff;
      padding:13px 18px;
      font-weight:800;
      cursor:pointer;
      font-size:1rem;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .muted{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.45;
    }

    .success{
      border-color:#86efac;
      background:#f0fdf4;
      color:#166534;
    }

    .error{
      border-color:#fecaca;
      background:#fef2f2;
      color:#991b1b;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="head">
      <h1>Ciência da Notificação Disciplinar</h1>
      <p>Consulta e confirmação eletrônica pelo responsável.</p>
    </div>

    <div class="body" id="conteudo">
      <div class="box">Carregando informações...</div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const conteudo = document.getElementById('conteudo');

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function fmtData(v) {
      if (!v) return '—';
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString('pt-BR');
    }

    async function carregar() {
      if (!token) {
        conteudo.innerHTML = `<div class="box error">Link inválido. Token ausente.</div>`;
        return;
      }

      try {
        const resp = await fetch(`/api/controle-notificacoes/publico/${encodeURIComponent(token)}`, {
          cache: 'no-store'
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok) {
          throw new Error(data.message || 'Não foi possível carregar a notificação.');
        }

        const n = data.notificacao || {};
        const aluno = n.aluno || {};
        const rc = n.responsavelCiencia || {};

        conteudo.innerHTML = `
          <div class="box">
            <b>Estudante</b>
            ${esc(aluno.nome || '—')} — ${esc(aluno.turma || '—')}
          </div>

          <div class="box">
            <b>Notificação</b>
            Nº ${esc(n.numeroSequencial || '—')}<br>
            Data: ${fmtData(n.data)}<br>
            Medida: ${esc(n.tipoMedida || n.tipo || '—')}
          </div>

          <div class="box">
            <b>Motivo/Descrição</b>
            ${esc(n.motivo || '—')}
          </div>

          ${n.observacao ? `
            <div class="box">
              <b>Observação</b>
              ${esc(n.observacao)}
            </div>
          ` : ''}

          <div class="box">
            <b>Status da ciência</b>
            ${rc.confirmouCiencia
              ? `✅ Ciência já confirmada em ${fmtData(rc.confirmouCienciaEm)}.`
              : '⚠️ Ciência ainda pendente.'}
          </div>

          ${rc.confirmouCiencia ? '' : `
            <div>
              <label class="muted" for="resposta">
                Observação opcional do responsável
              </label>
              <textarea id="resposta" placeholder="Caso deseje, registre uma observação breve."></textarea>
            </div>

            <button id="btnConfirmar" onclick="confirmarCiencia()">
              Confirmar ciência
            </button>

            <div class="muted">
              Ao confirmar, o sistema registrará data, horário e informações técnicas do acesso para controle institucional.
            </div>
          `}
        `;
      } catch (err) {
        conteudo.innerHTML = `<div class="box error">${esc(err.message || 'Erro ao carregar notificação.')}</div>`;
      }
    }

    async function confirmarCiencia() {
      const btn = document.getElementById('btnConfirmar');
      const resposta = document.getElementById('resposta')?.value || '';

      try {
        if (btn) btn.disabled = true;

        const resp = await fetch(`/api/controle-notificacoes/publico/${encodeURIComponent(token)}/confirmar-ciencia`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ resposta })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok) {
          throw new Error(data.message || 'Não foi possível confirmar ciência.');
        }

        conteudo.innerHTML = `
          <div class="box success">
            ✅ Ciência confirmada com sucesso.
          </div>
          <div class="muted">
            A escola já recebeu o registro eletrônico da confirmação.
          </div>
        `;
      } catch (err) {
        if (btn) btn.disabled = false;
        alert(err.message || 'Erro ao confirmar ciência.');
      }
    }

    carregar();
  </script>
</body>
</html>
