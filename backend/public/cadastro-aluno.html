<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Aluno - Colégio Militar Dom Pedro II</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#941a1d" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" href="/icons/icon-192x192.png" />

  <style>
    /* =========================
       VARIÁVEIS DO TEMA GLASS
    ========================== */
    :root{
      --glass-bg: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.40);
      --glass-highlight: rgba(255,255,255,0.7);
      --glass-radius: 22px;
      --glass-blur: 18px;
      --glass-shadow:
        0 2px 6px rgba(0,0,0,0.15),
        0 8px 22px rgba(0,0,0,0.20);

      --text-main: #ffffff;
      --text-soft: rgba(255,255,255,0.78);

      --rubi-1:#941a1d;
      --rubi-2:#d82327;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100vh;
    }

    /* =========================
       FUNDO — MESMO DO PAINEL
    ========================== */
    body{
      font-family:"Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--text-main);
      background:url("img/bg-painel-smart.png") center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color-scheme:dark;
    }

    /* =========================
       CARD PRINCIPAL GLASS
    ========================== */
    .container{
      width:100%;
      max-width:420px;
      padding:28px 24px 30px;
      border-radius:var(--glass-radius);
      background:rgba(10,10,12,0.88);
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:var(--glass-shadow);
      backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));
      text-align:center;
      position:relative;
      overflow:hidden;
      animation:fade .6s ease-out;
    }

    .container::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 18%,
        transparent 45%
      );
      pointer-events:none;
    }

    .container > *{ position:relative; z-index:1; }

    @keyframes fade{
      from{opacity:0; transform:translateY(40px);}
      to{opacity:1; transform:translateY(0);}
    }

    /* =========================
       CABEÇALHO
    ========================== */
    .logo{
      width:80px;
      margin-bottom:10px;
      filter:drop-shadow(0 8px 20px rgba(0,0,0,.7));
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    h2{
      margin:10px 0 18px;
      font-size:1.35rem;
      font-weight:800;
      text-shadow:0 10px 22px rgba(0,0,0,.8);
    }

    /* =========================
       FORMULÁRIO
    ========================== */
    form{
      display:flex;
      flex-direction:column;
      gap:12px;
      text-align:left;
    }

    label.campo-label{
      font-size:.86rem;
      color:var(--text-soft);
      margin-bottom:4px;
    }

    label.campo-label small{
      color:rgba(255,255,255,0.55);
      font-size:.75rem;
      display:block;
      margin-top:2px;
    }

    input, select{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.28);
      background:rgba(0,0,0,0.45);
      color:#ffffff;
      font-size:0.95rem;
      outline:none;
      backdrop-filter:blur(6px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    }

    input::placeholder{
      color:rgba(255,255,255,0.55);
    }

    input:focus, select:focus{
      border-color:rgba(255,255,255,0.8);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.35),
        0 10px 26px rgba(0,0,0,0.85);
    }

    input[type="file"]{
      padding:6px;
      background:rgba(0,0,0,0.35);
      border-radius:10px;
    }

    /* =========================
       BOTÃO — RUBI GLASS
    ========================== */
    button{
      width:100%;
      padding:12px;
      margin-top:6px;
      border:0;
      border-radius:999px;
      cursor:pointer;
      font-size:1rem;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,var(--rubi-1),var(--rubi-2));
      box-shadow:0 10px 26px rgba(0,0,0,0.85);
      transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    button:hover{
      transform:translateY(-2px);
      filter:brightness(1.06);
      box-shadow:0 14px 32px rgba(0,0,0,0.95);
    }

    button:active{
      transform:translateY(0);
      box-shadow:0 8px 20px rgba(0,0,0,0.85);
    }

    /* =========================
       FEEDBACK
    ========================== */
    #mensagem{
      margin-top:12px;
      text-align:center;
      font-weight:700;
      min-height:1.3em;
    }

    /* =========================
       BOTÃO VOLTAR
    ========================== */
    .voltar{
      display:block;
      margin-top:18px;
      color:#ffffff;
      opacity:.85;
      font-size:.9rem;
      text-decoration:none;
      text-align:center;
    }

    .voltar:hover{
      text-decoration:underline;
      opacity:1;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="img/logo.png" class="logo" />
    <h2>Cadastrar Novo Aluno</h2>

    <form id="form-aluno">

      <input type="text" id="nome" name="nome" placeholder="Nome do aluno" required />

      <label class="campo-label">Turma</label>
      <select id="turma" name="turma" required>
        <optgroup label="Fundamental II">
          <option value="6ºA">6ºA</option>
          <option value="6ºB">6ºB</option>
          <option value="7ºA">7ºA</option>
          <option value="7ºB">7ºB</option>
          <option value="7ºC">7ºC</option>
          <option value="7ºD">7ºD</option>
          <option value="8ºA">8ºA</option>
          <option value="8ºB">8ºB</option>
          <option value="9ºA">9ºA</option>
          <option value="9ºB">9ºB</option>
          <option value="9ºC">9ºC</option>
        </optgroup>
        <optgroup label="Ensino Médio">
          <option value="1ºA">1ºA</option>
          <option value="1ºB">1ºB</option>
          <option value="1ºC">1ºC</option>
          <option value="1ºD">1ºD</option>
          <option value="2ºA">2ºA</option>
          <option value="2ºB">2ºB</option>
          <option value="2ºC">2ºC</option>
          <option value="3ºA">3ºA</option>
          <option value="3ºB">3ºB</option>
          <option value="3ºC">3ºC</option>
          <option value="3ºD">3ºD</option>
        </optgroup>
      </select>

      <label class="campo-label">
        Data de entrada no colégio
        <small>(pergunte ao aluno a data em que ingressou)</small>
      </label>
      <input type="date" id="dataEntrada" name="dataEntrada" required />

      <label class="campo-label">
        Telefone do responsável
        <small>(com DDD, sem espaços ou traços)</small>
      </label>
      <input type="tel" id="telefone" name="telefone" placeholder="Ex: 5599999999999" required />

      <label class="campo-label">Foto do aluno (opcional)</label>
      <input type="file" id="foto" name="foto" accept="image/*" capture="environment" />

      <input type="hidden" id="instituicao" name="instituicao" />

      <button type="submit">Cadastrar</button>
      <div class="mensagem" id="mensagem"></div>
    </form>

    <a href="/painel.html" class="voltar">⬅ Voltar ao Painel</a>
  </div>

  <!-- =========================
       JS ORIGINAL (INALTERADO)
  ========================== -->
    <!-- =========================
       JS PARA CADASTRAR ALUNO
  ========================== -->
  <script>
    (async function () {
      const form       = document.getElementById('form-aluno');
      const msgEl      = document.getElementById('mensagem');
      const instInput  = document.getElementById('instituicao');

      // 1) Buscar usuário logado para pegar a instituição
      try {
        const res = await fetch('/api/usuario', {
          method: 'GET',
          credentials: 'include'
        });

        if (!res.ok) {
          throw new Error('Falha ao carregar usuário (' + res.status + ')');
        }

        const data = await res.json();
        console.log('Dados do usuário logado:', data);

        if (!data.instituicao) {
          msgEl.textContent = '⚠ Não foi possível identificar a instituição do usuário logado.';
          msgEl.style.color = '#ffb4b4';
        } else {
          instInput.value = data.instituicao;
        }
      } catch (err) {
        console.error('Erro ao buscar /api/usuario:', err);
        msgEl.textContent = 'Erro ao carregar dados do usuário. Tente sair e entrar novamente no sistema.';
        msgEl.style.color = '#ffb4b4';
      }

      // 2) Submit do formulário
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msgEl.style.color = '#ffffff';
        msgEl.textContent = 'Salvando cadastro...';

        const payload = {
          nome:        form.nome.value.trim(),
          turma:       form.turma.value,
          dataEntrada: form.dataEntrada.value,
          telefone:    form.telefone.value.trim(),
          instituicao: instInput.value || null
          // se quiser depois, pode incluir mais campos aqui (nomePai, nomeMae etc.)
        };

        console.log('Enviando para /api/alunos:', payload);

        try {
          const res = await fetch('/api/alunos', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify(payload)
          });

          let body = {};
          try {
            body = await res.json();
          } catch (_) {}

          console.log('Resposta de /api/alunos:', res.status, body);

          if (!res.ok || body.ok === false) {
            const msgErro = body.error || body.message || 'Erro ao salvar aluno (verifique os campos).';
            msgEl.textContent = '❌ ' + msgErro;
            msgEl.style.color = '#ffb4b4';
            return;
          }

          // Sucesso
          msgEl.textContent = '✅ Aluno cadastrado com sucesso!';
          msgEl.style.color = '#9effb4';

          // limpa os campos principais (mantém instituição)
          form.reset();
          form.turma.value = '6ºA'; // volta pra primeira turma, se quiser
        } catch (err) {
          console.error('Erro de rede ao cadastrar aluno:', err);
          msgEl.textContent = '❌ Erro de comunicação com o servidor. Tente novamente.';
          msgEl.style.color = '#ffb4b4';
        }
      });
    })();
  </script>

  <script src="notify.js"></script>
</body>
</html>
