<!DOCTYPE html> 
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindo(a) - Colégio Militar Dom Pedro II</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0A1322" />

  <!-- Ícone principal -->
  <link rel="icon" href="/icons/icon-512x512.png" />

  <style>
    :root{
      --bg-1:#020617;
      --bg-2:#0b1120;
      --accent:#38bdf8;
      --accent-soft:rgba(56,189,248,0.28);
      --card-bg:rgba(15,23,42,0.92);
      --card-border:rgba(148,163,184,0.6);
      --txt:#f9fafb;
      --txt-muted:rgba(148,163,184,0.9);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--txt);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 10% 0%, rgba(56,189,248,0.18), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(59,130,246,0.16), transparent 55%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      -webkit-font-smoothing: antialiased;
      color-scheme: dark;
      padding: 16px;
    }

    .container {
      position: relative;
      max-width: 520px;
      width: 100%;
      padding: 28px 26px 30px;
      border-radius: 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.85),
        0 0 0 1px rgba(15,23,42,0.9);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .container::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        radial-gradient(circle at 0 0, var(--accent-soft), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(248,113,113,0.22), transparent 55%);
      opacity:0.8;
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:1;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 999px;
      object-fit: contain;
      margin-bottom: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.85);
      border: 1px solid rgba(148,163,184,0.6);
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.28), transparent 60%);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    p {
      font-size: 0.98rem;
      color: var(--txt-muted);
    }

    .hint{
      margin-top: 4px;
      font-size: 0.85rem;
      color: var(--txt-muted);
    }

    .spinner {
      margin: 26px auto 0;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 3px solid rgba(148,163,184,0.4);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 0 18px rgba(56,189,248,0.45);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .dots{
      margin-top: 10px;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: var(--txt-muted);
    }

    @media (max-width:480px){
      .container{
        padding: 24px 18px 26px;
        border-radius: 18px;
      }
      h1{font-size:1.4rem}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">

      <!-- LOGO COM CAMINHO CORRETO + FALLBACK -->
      <img src="/icons/logo.png"
           onerror="this.src='/icons/icon-512x512.png'"
           alt="Logo do Colégio"
           class="logo" />

      <h1>Bem-vindo(a) ao Sistema</h1>
      <p>Preparando o painel principal do Colégio Militar Dom Pedro II…</p>

      <div class="spinner"></div>
      <div class="dots">● ● ●</div>
      <div class="hint">Você será redirecionado automaticamente em alguns segundos.</div>
    </div>
  </div>

  <script>
    // Redirecionamento dinâmico
    const params = new URLSearchParams(location.search);
    const destino = params.get('next') || '/painel.html';

    setTimeout(() => {
      window.location.href = destino;
    }, 4000);

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('✅ Service Worker registrado'))
        .catch(err => console.error('❌ Erro ao registrar Service Worker:', err));
    }
  </script>
</body>
</html>
