<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bem-vindo(a) - SmartClass</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0A1322" />
  <link rel="icon" href="/icons/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/icons/icon-512x512.png" />

  <!-- Fontes SmartClass -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg-1:#020617;
      --bg-2:#0b1120;

      --sc-primary:#00D1FF;
      --sc-secondary:#7A5CFF;

      --card-bg: rgba(15,23,42,0.92);
      --card-border: rgba(148,163,184,0.55);

      --txt:#f9fafb;
      --txt-muted: rgba(148,163,184,0.92);

      --shadow:
        0 18px 45px rgba(0,0,0,0.85),
        0 0 0 1px rgba(15,23,42,0.9);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    html, body { height:100%; }

    body{
      font-family: "Rajdhani", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--txt);
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding: 16px;
      background:
        radial-gradient(circle at 10% 0%, rgba(0,209,255,0.16), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(122,92,255,0.14), transparent 55%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color-scheme: dark;
      overflow:hidden;
    }

    .container{
      position: relative;
      width: 100%;
      max-width: 560px;
      padding: 26px 26px 28px;
      border-radius: 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      transform: translateZ(0);
    }

    .container::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        radial-gradient(circle at 0 0, rgba(0,209,255,0.22), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(122,92,255,0.18), transparent 55%);
      opacity:0.9;
      pointer-events:none;
    }

    .content{
      position: relative;
      z-index: 1;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(170,200,240,.28);
      background: rgba(10,19,34,.35);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      font-size: 13px;
      color: var(--txt-muted);
      margin: 0 auto 14px;
    }

    .dot{
      width:8px; height:8px;
      border-radius:999px;
      background: linear-gradient(135deg, var(--sc-primary), var(--sc-secondary));
      box-shadow: 0 0 12px rgba(0,209,255,.55);
      flex: 0 0 auto;
    }

    /* ===== Mascote Stage ===== */
    .mascote-stage{
      width: 168px;
      height: 168px;
      margin: 0 auto 10px;
      position: relative;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.55);
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.10), transparent 60%),
        radial-gradient(circle at 70% 80%, rgba(0,209,255,0.10), transparent 55%),
        linear-gradient(180deg, rgba(21,40,76,.55), rgba(13,28,54,.65));
      box-shadow:
        0 14px 34px rgba(0,0,0,.75),
        0 0 26px rgba(0,209,255,.10);
      overflow:hidden;
    }

    .mascote-stage::after{
      content:"";
      position:absolute;
      inset:-30%;
      background:
        radial-gradient(circle at 30% 20%, rgba(0,209,255,0.22), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(122,92,255,0.16), transparent 55%);
      opacity: .7;
      animation: glowPulse 2.6s ease-in-out infinite;
      pointer-events:none;
    }

    .mascote{
      width: 126px;
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
      transform-origin: 50% 85%;
      animation: sway 2.8s ease-in-out infinite;
      position: relative;
      z-index: 2;
      user-select:none;
      -webkit-user-drag: none;
    }

    /* Piscar (overlay) */
    .blink{
      position:absolute;
      /* Ajuste fino: pode variar se sua imagem mudar */
      left: 66px;
      top: 62px;
      width: 22px;
      height: 12px;
      border-radius: 999px;
      background: rgba(15,23,42,.88);
      box-shadow: 0 0 0 1px rgba(255,255,255,.06);
      transform: scaleY(0);
      transform-origin: 50% 50%;
      animation: blink 4.6s infinite;
      z-index: 3;
      pointer-events:none;
    }

    /* Riscando no tablet (SVG overlay) */
    .scribble{
      position:absolute;
      /* Ajuste fino: região do tablet */
      right: 36px;
      bottom: 40px;
      width: 60px;
      height: 46px;
      z-index: 4;
      pointer-events:none;
      opacity: .95;
    }

    .scribble path{
      fill: none;
      stroke: rgba(140,255,120,.95);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(140,255,120,.35));
      stroke-dasharray: 140;
      stroke-dashoffset: 140;
      animation: draw 1.5s ease-in-out infinite;
    }

    .brand{
      font-family: "Orbitron", system-ui, sans-serif;
      font-size: 1.55rem;
      letter-spacing: .08em;
      margin-top: 10px;
      background: linear-gradient(135deg, var(--sc-primary), var(--sc-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 14px rgba(0,0,0,.45);
    }

    .title{
      margin-top: 8px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: rgba(236,242,255,.96);
    }

    .sub{
      margin-top: 6px;
      font-size: 1.02rem;
      color: var(--txt-muted);
      line-height: 1.35;
    }

    .sub strong{ color: rgba(236,242,255,.96); font-weight: 800; }

    /* loader */
    .spinner{
      margin: 20px auto 0;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 3px solid rgba(148,163,184,0.35);
      border-top-color: var(--sc-primary);
      animation: spin 0.9s linear infinite;
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 0 18px rgba(0,209,255,0.35);
    }

    .dots{
      margin-top: 10px;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      color: var(--txt-muted);
    }

    .hint{
      margin-top: 6px;
      font-size: 0.92rem;
      color: var(--txt-muted);
    }

    /* ===== Fade-out suave ===== */
    .fade-out{
      animation: fadeOut .6s ease forwards;
    }
    @keyframes fadeOut{
      to{
        opacity: 0;
        transform: scale(0.98);
        filter: blur(6px);
      }
    }

    /* ===== Animations ===== */
    @keyframes spin{ to { transform: rotate(360deg); } }

    @keyframes sway{
      0%, 100% { transform: translateY(0) rotate(-1.2deg); }
      50%      { transform: translateY(-2px) rotate(1.2deg); }
    }

    @keyframes glowPulse{
      0%,100% { opacity: .45; transform: scale(1); }
      50%     { opacity: .85; transform: scale(1.04); }
    }

    @keyframes blink{
      0%, 92%, 100% { transform: scaleY(0); opacity: 0; }
      94%           { transform: scaleY(1); opacity: 1; }
      96%           { transform: scaleY(0); opacity: 0; }
      98%           { transform: scaleY(1); opacity: 1; }
      99%           { transform: scaleY(0); opacity: 0; }
    }

    @keyframes draw{
      0%   { stroke-dashoffset: 140; opacity: .2; }
      25%  { opacity: 1; }
      55%  { stroke-dashoffset: 0; }
      80%  { opacity: .9; }
      100% { stroke-dashoffset: -140; opacity: .2; }
    }

    @media (max-width:480px){
      .container{ padding: 22px 18px 24px; border-radius: 18px; }
      .mascote-stage{ width: 154px; height: 154px; }
      .mascote{ width: 116px; }
      .brand{ font-size: 1.35rem; }
      .title{ font-size: 1.05rem; }
      .sub{ font-size: 0.98rem; }
    }
  </style>
</head>

<body>
  <div class="container" id="card">
    <div class="content">

      <div class="badge"><span class="dot"></span> Ambiente seguro • Preparando acesso</div>

      <div class="mascote-stage" aria-hidden="true">
        <img
          src="/assets/smartclass-coruja.png"
          alt="Mascote SmartClass"
          class="mascote"
          onerror="this.onerror=null; this.src='/icons/icon-512x512.png';"
        />

        <div class="blink"></div>

        <svg class="scribble" viewBox="0 0 60 45" focusable="false" aria-hidden="true">
          <path d="M10 25 L22 34 L46 10 M14 16 L20 20 M30 30 L40 22" />
        </svg>
      </div>

      <div class="brand">SmartClass</div>
      <div class="title">Bem-vindo(a) ao sistema</div>

      <div class="sub">
        Preparando o painel principal de
        <strong id="nome-colegio">Colégio Militar Dom Pedro II</strong>…
      </div>

      <div class="spinner" aria-label="Carregando"></div>
      <div class="dots" aria-hidden="true">● ● ●</div>
      <div class="hint">Você será redirecionado automaticamente em instantes.</div>

    </div>
  </div>

  <script>
    // Destino dinâmico (?next=...)
    const params = new URLSearchParams(location.search);
    const destino = params.get('next') || '/painel.html';

    // Nome do colégio dinâmico
    (async () => {
      const el = document.getElementById('nome-colegio');
      if (!el) return;

      // 1) tenta localStorage (setado no login)
      const ls = localStorage.getItem('smartclass_nome_colegio');
      if (ls && ls.trim().length > 2) {
        el.textContent = ls.trim();
        return;
      }

      // 2) tenta /public/tenant (se existir no backend)
      try {
        const r = await fetch('/public/tenant', { cache: 'no-store' });
        if (!r.ok) return;
        const data = await r.json();
        const nome = data?.nomeColegio || data?.nome_escola || data?.nome;
        if (nome && String(nome).trim().length > 2) {
          el.textContent = String(nome).trim();
          localStorage.setItem('smartclass_nome_colegio', String(nome).trim());
        }
      } catch {}
    })();

    // Fade-out suave e redireciona
    const card = document.getElementById('card');
    const TEMPO_TELA_MS = 3600;     // tempo exibindo a tela
    const TEMPO_FADE_MS = 650;      // duração do fade (deixe >= 600)

    setTimeout(() => {
      if (card) card.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = destino;
      }, TEMPO_FADE_MS);
    }, TEMPO_TELA_MS);

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('✅ Service Worker registrado'))
        .catch(err => console.error('❌ Erro ao registrar Service Worker:', err));
    }
  </script>
</body>
</html>
