<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atendimentos APH — Lista | CMDPII</title>
  <meta name="theme-color" content="#0B0C10" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    :root{
      --bg-0:#0b0c10; --bg-1:#101217; --bg-2:#131722; --ink:#e7e9ee; --muted:#9aa3b2;
      --line:#202534; --radius:14px; --shadow:0 20px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
      --rubi:#d82327; --rubi-2:#8B0000; --gold:#e7c873;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -10%, #2b0b0b40, transparent 60%),
        radial-gradient(900px 500px at 110% 0%, #24120040, transparent 60%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
    }
    .topbar{
      position:sticky; top:0; z-index:10; background:linear-gradient(180deg,#0d111bcc,#0d111bb0);
      border-bottom:1px solid var(--line); backdrop-filter: blur(10px) saturate(140%);
    }
    .topbar .inner{max-width:1200px; margin:0 auto; padding:12px 16px; display:flex; gap:10px; align-items:center}
    .brand{font-weight:800; display:flex; align-items:center; gap:10px}
    .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--rubi),var(--gold));box-shadow:0 0 12px #d82327aa}
    .spacer{flex:1}
    .btn{
      appearance:none; border:1px solid #ffffff12; background:linear-gradient(135deg,#1a1f2b,#151a26); color:#fff;
      border-radius:12px; padding:9px 12px; cursor:pointer; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:8px;
      box-shadow: var(--shadow); transition:.2s transform,.2s filter,.2s border-color;
    }
    .btn:hover{ transform:translateY(-1px); filter:saturate(1.05); border-color:#ffffff24 }
    .btn.primary{ background:linear-gradient(135deg, #8B0000, #d82327); border-color:#ffffff22; box-shadow:0 12px 28px rgba(216,35,39,.35)}
    .btn.ghost{ background:linear-gradient(135deg,#0f1420,#0c111a); color:#c9d1e1 }
    .btn:disabled{opacity:.6; cursor:not-allowed}

    main{max-width:1200px; margin:18px auto 40px; padding:0 16px}
    .card{ background:#0b1019; border:1px solid #ffffff12; border-radius:var(--radius); box-shadow: var(--shadow); padding:14px; }
    .row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}

    .filters{display:grid; grid-template-columns:1fr repeat(2,170px) 140px 120px; gap:10px}
    @media (max-width:900px){ .filters{grid-template-columns:1fr 1fr} }
    input[type="text"], input[type="date"], select{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid #ffffff22; background:#0f1420; color:#e7e9ee;
      box-shadow: var(--shadow);
    }
    table{width:100%; border-collapse:separate; border-spacing:0; color:#e7e9ee }
    th, td{ padding:10px 12px; border-bottom:1px solid #202534; text-align:left; vertical-align:top; }
    thead th{ position:sticky; top:0; background:#0d111b; z-index:1; }
    tbody tr:hover{ background:#0f1420 }
    .muted{color:var(--muted)}
    .chip{display:inline-block; padding:2px 8px; border:1px solid #ffffff18; border-radius:999px; background:#0e1420; font-size:.78rem; margin:2px 4px 2px 0}
    .actions{display:flex; gap:6px; flex-wrap:wrap}
    .badge{display:inline-block; padding:2px 8px; border-radius:999px; border:1px solid #ffffff22; background:#0f1420; font-size:.78rem; color:#cfd7e6}
    .hint{font-size:.85rem; color:var(--muted)}
    .pager{display:flex; align-items:center; gap:8px}
    .toast{
      position:fixed; right:16px; bottom:16px; background:#0d111b; color:#fff; padding:12px 14px; border-radius:12px;
      border:1px solid #ffffff1a; box-shadow: var(--shadow); opacity:0; transform:translateY(8px); transition:.2s; z-index:1000;
    }
    .toast.show{opacity:1; transform:translateY(0)}
  </style>

  <script>
    if (location.hostname === 'localhost') {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(rs => rs.forEach(r => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }
  </script>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <div class="brand"><span class="dot"></span> Atendimentos APH</div>
      <span id="contextAluno" class="hint"></span>
      <div class="spacer"></div>
      <button class="btn ghost" id="btnVoltar">← Voltar</button>
      <a class="btn ghost" href="painel.html">Painel</a>
      <button class="btn primary" id="btnNovoAtendimento">+ Novo atendimento</button>
    </div>
  </div>

  <main>
    <div class="card">
      <div class="row" style="width:100%">
        <div class="filters" style="flex:1">
          <input type="text" id="q" placeholder="Pesquisar (aluno, responsável, local, tipos...)" />
          <input type="date" id="dtIni" />
          <input type="date" id="dtFim" />
          <select id="limit">
            <option value="10">10 / pág</option>
            <option value="20" selected>20 / pág</option>
            <option value="50">50 / pág</option>
            <option value="100">100 / pág</option>
          </select>
          <button id="btnFiltrar" class="btn primary">Aplicar</button>
        </div>
        <div class="row" style="justify-content:space-between; width:100%; margin-top:10px">
          <div class="hint">Exibindo <span id="range">0–0</span> de <b id="total">0</b> registros.</div>
          <div class="pager">
            <button class="btn" id="first">« Primeiro</button>
            <button class="btn" id="prev">‹ Anterior</button>
            <span class="badge">Pág. <span id="page">1</span></span>
            <button class="btn" id="next">Próximo ›</button>
            <button class="btn" id="last">Último »</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px; overflow:auto">
      <table>
        <thead>
          <tr>
            <th style="min-width:110px">Data</th>
            <th style="min-width:64px">Hora</th>
            <th style="min-width:220px">Aluno</th>
            <th style="min-width:90px">Turma</th>
            <th style="min-width:180px">Responsável</th>
            <th style="min-width:220px">Tipos</th>
            <th style="min-width:180px">Local</th>
            <th style="min-width:220px">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8" class="muted">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="toast" id="toast"></div>
  </main>

  <script>
    const $ = (s)=>document.querySelector(s);
    const byId = (id)=>document.getElementById(id);
    function bind(idOrSel, ev, fn){
      const el = idOrSel.startsWith('#')||idOrSel.startsWith('.') ? $(idOrSel) : byId(idOrSel);
      if(el) el.addEventListener(ev, fn);
    }
    const params = new URLSearchParams(location.search);
    const alunoId = params.get('alunoId') || '';

    function toast(msg, kind='default'){
      const t = byId('toast'); if(!t) return;
      t.textContent = msg;
      t.style.borderColor = '#ffffff18';
      t.style.background = kind==='ok' ? '#0c1a12' : kind==='warn' ? '#1f1a0c' : kind==='err' ? '#1f0c0c' : '#0d111b';
      t.classList.add('show'); clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'), 2200);
    }
    const fmtData = (d)=> d ? new Date(d).toLocaleDateString('pt-BR') : '—';
    const escapeHtml = (s)=> String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function tiposPreview(arr){
      if (!Array.isArray(arr) || !arr.length) return '<span class="muted">—</span>';
      const max = 3;
      const shown = arr.slice(0, max).map(t=>`<span class="chip">${escapeHtml(String(t))}</span>`).join('');
      const extra = arr.length > max ? `<span class="chip">+${arr.length - max}</span>` : '';
      return shown + extra;
    }
    function alunoCol(doc){
      const nome = doc.alunoNome || doc.aluno?.nome || '—';
      const id = doc.alunoId || doc.aluno?._id || '';
      if (!id) return escapeHtml(nome);
      return `<a href="/ficha-aluno.html?id=${encodeURIComponent(id)}" class="badge" title="Abrir ficha">${escapeHtml(nome)}</a>`;
    }
    function turmaCol(doc){
      const t = doc.alunoTurma || doc.aluno?.turma || '—';
      if (t==='—') return t;
      return `<a class="badge" href="/turma.html?turma=${encodeURIComponent(t)}" title="Abrir turma">${escapeHtml(t)}</a>`;
    }

    const API = {
      async getAluno(id){
        const r = await fetch(`/api/alunos/${id}`, { credentials:'include' });
        if(!r.ok) return null; return r.json();
      },
      // GET /api/aph/atendimentos?alunoId&dtIni&dtFim&q&page&limit
      async list({ alunoId, dtIni, dtFim, q, page, limit }){
        const usp = new URLSearchParams();
        if (alunoId) usp.set('alunoId', alunoId);
        if (dtIni) usp.set('dtIni', dtIni);
        if (dtFim) usp.set('dtFim', dtFim);
        if (q) usp.set('q', q);
        usp.set('page', String(page||1));
        usp.set('limit', String(limit||20));
        const r = await fetch(`/api/aph/atendimentos?${usp.toString()}`, { credentials:'include', cache:'no-store' });
        if(!r.ok) throw new Error('Falha ao listar');
        return r.json(); // { total, page, limit, items }
      },
      async remove(id){
        const r = await fetch(`/api/aph/atendimentos/${id}`, { method:'DELETE', credentials:'include' });
        if(!r.ok) throw new Error('Falha ao excluir'); return r.json();
      }
    };

    const state = { page:1, limit:20, total:0, dtIni:'', dtFim:'', q:'', items:[] };

    function getFiltersFromUI(){
      return {
        q: byId('q')?.value.trim() || '',
        dtIni: byId('dtIni')?.value || '',
        dtFim: byId('dtFim')?.value || '',
        limit: Number(byId('limit')?.value || 20)
      };
    }

    function renderTable(items){
      const tbody = byId('tbody'); if(!tbody) return;
      if(!items.length){
        tbody.innerHTML = `<tr><td colspan="8" class="muted">Nenhum atendimento encontrado.</td></tr>`;
        return;
      }
      tbody.innerHTML = items.map(it=>{
        const id = it._id || '';
        const pdfUrl = `/api/aph/atendimentos/${id}/pdf`; // ajuste se for outra rota
        return `
          <tr>
            <td>${fmtData(it.data)}</td>
            <td>${escapeHtml(it.hora || '')}</td>
            <td>${alunoCol(it)}</td>
            <td>${turmaCol(it)}</td>
            <td>${escapeHtml(it.responsavel || '—')}</td>
            <td>${tiposPreview(it.tipos || [])}</td>
            <td>${escapeHtml(it.local || '—')}</td>
            <td>
              <div class="actions">
                <a class="btn ghost" href="/aph-atendimento.html?atendimentoId=${encodeURIComponent(id)}${alunoId ? `&alunoId=${encodeURIComponent(alunoId)}`:''}" title="Editar/Ver">Editar</a>
                <a class="btn" href="${pdfUrl}" target="_blank" rel="noopener" title="PDF">PDF</a>
                <button class="btn" data-del="${id}" title="Excluir">Excluir</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      tbody.querySelectorAll('button[data-del]').forEach(btn=>{
        btn.addEventListener('click', async (e)=>{
          const id = e.currentTarget.getAttribute('data-del');
          if(!id) return;
          if(!confirm('Confirma excluir este atendimento? Esta ação não pode ser desfeita.')) return;
          try{ await API.remove(id); toast('Atendimento excluído.','ok'); await loadPage(state.page); }
          catch(err){ console.error(err); toast(err.message || 'Erro ao excluir.','err'); }
        });
      });
    }

    function updatePager(){
      byId('page').textContent = String(state.page);
      byId('total').textContent = String(state.total);
      const start = state.total ? ((state.page-1)*state.limit)+1 : 0;
      const end = Math.min(state.page*state.limit, state.total);
      byId('range').textContent = `${start}–${end}`;
      const lastPage = Math.max(1, Math.ceil(state.total / state.limit));
      byId('first').disabled = state.page <= 1;
      byId('prev').disabled  = state.page <= 1;
      byId('next').disabled  = state.page >= lastPage;
      byId('last').disabled  = state.page >= lastPage;
    }

    async function loadPage(page=1){
      const f = getFiltersFromUI();
      state.q=f.q; state.dtIni=f.dtIni; state.dtFim=f.dtFim; state.limit=Number(f.limit||20); state.page=Number(page)||1;
      try{
        const { total=0, items=[], page:pg=state.page, limit=state.limit } = await API.list({
          alunoId, q: state.q, dtIni: state.dtIni, dtFim: state.dtFim, page: state.page, limit: state.limit
        });
        state.total = Number(total)||0;
        state.items = Array.isArray(items) ? items : [];
        state.page = Number(pg)||state.page;
        state.limit = Number(limit)||state.limit;
        renderTable(state.items);
        updatePager();
      }catch(err){
        console.error(err); toast(err.message || 'Falha ao carregar lista.','err');
        renderTable([]); state.total=0; updatePager();
      }
    }

    async function showAlunoContextIfAny(){
      if(!alunoId) return;
      const span = byId('contextAluno'); span.textContent = 'carregando aluno...';
      try{
        const aluno = await API.getAluno(alunoId);
        if(!aluno){ span.textContent = ''; return; }
        const nome = aluno.nome || 'Aluno';
        const turma = aluno.turma ? ` • Turma ${aluno.turma}` : '';
        span.innerHTML = `| <b>${nome}</b>${turma}`;
      }catch{ span.textContent = ''; }
    }

    function voltarSmart(){
      try{
        const ref = document.referrer || '';
        if (ref && new URL(ref, location.href).origin === location.origin) { history.back(); return; }
      }catch(_){}
      if (alunoId) { location.href = `/ficha-aluno.html?id=${encodeURIComponent(alunoId)}`; return; }
      location.href = '/painel.html';
    }
    function novoAtendimento(){
      if (alunoId) location.href = `/aph-atendimento.html?alunoId=${encodeURIComponent(alunoId)}`;
      else location.href = `/aph-atendimento.html`;
    }

    function init(){
      const q = params.get('q'); const di = params.get('dtIni'); const df = params.get('dtFim'); const lim = params.get('limit');
      if (q) byId('q').value = q;
      if (di) byId('dtIni').value = di;
      if (df) byId('dtFim').value = df;
      if (lim) byId('limit').value = lim;

      bind('btnFiltrar','click', ()=> loadPage(1));
      bind('limit','change', ()=> loadPage(1));

      bind('first','click', ()=> loadPage(1));
      bind('prev','click', ()=> loadPage(Math.max(1, state.page-1)));
      bind('next','click', ()=> loadPage(state.page+1));
      bind('last','click', ()=> { const last = Math.max(1, Math.ceil(state.total / state.limit)); loadPage(last); });

      bind('btnVoltar','click', voltarSmart);
      bind('btnNovoAtendimento','click', novoAtendimento);

      showAlunoContextIfAny();
      loadPage(1);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once:true }); else init();
  </script>
</body>
</html>
