<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>APH · Atendimentos Registrados</title>
  <style>
    :root{
      --rubi-1:#8B0000; --rubi-2:#B22222; --rubi-3:#d82327;
      --gold:#E7C873; --bg:#0f0f12; --card:#14161a; --muted:#a3a7ad; --text:#e7e9ee;
      --line:#2a2f37; --shadow:0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(900px 400px at 0% -10%,rgba(216,35,39,.2),transparent),
                 linear-gradient(180deg,#0b0c10,#0a0b0f);
      color:var(--text);
    }

    /* Topbar rubi fixa */
    .topbar{
      position:sticky; top:0; z-index:50;
      background:rgba(139,0,0,.9); backdrop-filter:blur(8px) saturate(140%);
      border-bottom:1px solid rgba(231,200,115,.35);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 16px;
    }
    .topbar .btn{
      border:1px solid rgba(231,200,115,.4);
      background:linear-gradient(135deg,var(--rubi-1),var(--rubi-2));
      color:#fff; border-radius:10px; padding:8px 12px; font-weight:700; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px;
    }
    .topbar .btn.ghost{background:transparent}
    .topbar .btn.primary{background:linear-gradient(135deg,var(--rubi-1),var(--rubi-3))}
    .topbar h1{margin:0; font-size:18px}

    .wrap{max-width:1100px; margin:20px auto; padding:0 16px}
    .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:16px}
    h2{margin:0 0 12px;color:var(--gold);font-size:20px}
    .muted{color:var(--muted);font-size:14px}

    /* Resumo + busca */
    .summary{
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px
    }
    .summary .kpi{background:#171a21;border:1px solid #2a2f37;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:6px}
    .summary .n{font-size:20px;font-weight:800;color:var(--gold)}
    .searchbar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .searchbar input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:#0f1116;color:var(--text)}
    .searchbar .btn.small{font-size:13px;padding:6px 10px;border-radius:8px}

    /* Navegação por mês */
    .month-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 12px}
    .month-nav .btn.small{font-size:13px;padding:6px 10px;border-radius:8px}
    .month-nav select{padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:#0f1116;color:var(--text)}

    /* Mini KPIs do mês */
    .mini-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
    @media (max-width:900px){ .mini-wrap{grid-template-columns:1fr} }
    .mini{background:#171a21;border:1px solid #2a2f37;border-radius:12px;padding:12px}
    .mini h3{margin:0 0 8px;font-size:15px;color:var(--gold)}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tagchip{
      display:inline-flex;align-items:center;gap:6px;
      background:#1d2026;border:1px solid #2a2f37;border-radius:999px;padding:6px 10px;font-size:12px
    }
    .tagchip .count{
      background:linear-gradient(135deg,var(--rubi-1),var(--rubi-3));border:1px solid rgba(231,200,115,.45);
      color:#fff;border-radius:999px;padding:2px 8px;font-weight:800;font-size:11px
    }
    .mini .empty{color:var(--muted);font-size:13px}

    /* Tabela */
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{border-bottom:1px solid #2a2f37;padding:10px 8px;text-align:left}
    th{color:var(--gold);font-weight:600;background:#16191f;position:sticky;top:52px;z-index:1}
    tr:hover{background:#1a1d23}
    td .chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#1d2026;border:1px solid #2a2f37;font-size:12px;margin-right:3px}
    td.actions button{margin-right:6px}

    /* Paginação dentro do mês */
    .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
    .pager .btn.small{font-size:13px;padding:6px 10px;border-radius:8px}
    .pager select{padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#0f1116;color:var(--text)}

    .btn.primary{background:linear-gradient(135deg,var(--rubi-1),var(--rubi-3));border-color:rgba(231,200,115,.45)}
    .btn.small{font-size:13px;padding:6px 10px;border-radius:8px}
    .btn.danger{background:linear-gradient(135deg,#c0392b,#e74c3c);border-color:#e74c3c}
  </style>
</head>
<body>
  <div class="topbar">
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn ghost" id="btnVoltarFicha">← Ficha do Aluno</button>
      <button class="btn" id="btnPainel">🏠 Painel</button>
    </div>
    <h1>Atendimentos APH</h1>
    <div style="display:flex;gap:8px">
      <button class="btn primary" id="btnNovo">➕ Novo atendimento</button>
    </div>
  </div>

  <div class="wrap">
    <section class="card">
      <div class="summary">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="kpi"><span>Total deste aluno:</span><span class="n" id="count">0</span></div>
          <div class="muted" id="alunoNome">Aluno: —</div>
        </div>
        <div class="searchbar">
          <input id="busca" type="text" placeholder="Buscar por tipo, material, observação (somente no mês atual)..." />
          <button class="btn small" id="btnBuscar">Buscar</button>
        </div>
      </div>

      <!-- Navegação por mês -->
      <div class="month-nav">
        <button class="btn small ghost" id="mPrev">⟵ Mês anterior</button>
        <select id="mSelect"></select>
        <button class="btn small ghost" id="mNext">Mês seguinte ⟶</button>
        <div class="muted" id="mInfo" style="margin-left:auto"></div>
      </div>

      <!-- Mini KPIs do mês -->
      <div class="mini-wrap">
        <div class="mini">
          <h3>Tipos mais frequentes</h3>
          <div class="tags" id="kpiTipos"></div>
          <div class="empty" id="kpiTiposEmpty" style="display:none">Sem dados neste mês.</div>
        </div>
        <div class="mini">
          <h3>Materiais mais usados</h3>
          <div class="tags" id="kpiMateriais"></div>
          <div class="empty" id="kpiMateriaisEmpty" style="display:none">Sem dados neste mês.</div>
        </div>
      </div>

      <!-- Tabela -->
      <table id="tabela">
        <thead>
          <tr><th>Data</th><th>Responsável</th><th>Local</th><th>Tipos</th><th>Materiais</th><th>Ações</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="vazio" class="muted" style="margin-top:10px;display:none">Nenhum atendimento registrado neste mês.</div>

      <!-- Paginação interna -->
      <div class="pager">
        <span class="muted" id="pInfo">Página 1 de 1</span>
        <label class="muted">Itens por página
          <select id="pSize">
            <option>10</option>
            <option>20</option>
            <option>50</option>
            <option>100</option>
          </select>
        </label>
        <button class="btn small ghost" id="pPrev">⟵</button>
        <button class="btn small ghost" id="pNext">⟶</button>
      </div>
    </section>
  </div>

  <script>
    const qs = s => document.querySelector(s);
    const alunoId = new URLSearchParams(location.search).get('id') || '';

    // Navegação topo
    qs('#btnVoltarFicha').onclick = () => location.href='/ficha-aluno.html?id='+encodeURIComponent(alunoId);
    qs('#btnPainel').onclick = () => location.href='/painel.html';
    qs('#btnNovo').onclick = () => location.href='/aph-atendimento.html?id='+encodeURIComponent(alunoId);

    // Estado
    let all = [];                 // todos os atendimentos
    let groups = [];              // [{key:'YYYY-MM', label:'Mês Ano', items:[...]}, ...]
    let curIdx = 0;               // índice do mês ativo
    let page = 1;                 // página atual no mês
    let pageSize = 10;            // itens por página
    let lastFilter = '';          // busca aplicada ao mês ativo

    // Util: label PT-BR do mês
    const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    function monthLabel(ts){
      const d = new Date(ts);
      return (MONTHS[d.getMonth()] || '').replace(/^./, c=>c.toUpperCase()) + ' ' + d.getFullYear();
    }
    function monthKey(ts){
      const d = new Date(ts);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }

    // Dados do aluno
    (async()=>{
      try{
        const r=await fetch('/api/ficha/dados/'+alunoId,{credentials:'include'});
        if(r.ok){
          const j=await r.json();
          qs('#alunoNome').textContent='Aluno: '+(j.aluno?.nome||'—');
        }
      }catch{}
    })();

    // Carregar atendimentos e preparar grupos
    async function carregar(){
      const corpo=qs('#tabela tbody'); corpo.innerHTML='';
      qs('#vazio').style.display='none';
      try{
        const r=await fetch('/api/aph/atendimentos/'+alunoId,{credentials:'include'});
        if(!r.ok) throw new Error();
        const arr=await r.json();

        // normaliza datas e ordena desc
        all = (arr||[]).map(a=>{
          const d = a.createdAt || a.data || Date.now();
          return {...a, __ts: new Date(d).getTime()};
        }).sort((a,b)=> b.__ts - a.__ts);

        qs('#count').textContent=all.length;

        // agrupa por mês
        const map = new Map();
        all.forEach(a=>{
          const key = monthKey(a.__ts);
          if(!map.has(key)) map.set(key, []);
          map.get(key).push(a);
        });
        groups = [...map.entries()]
          .map(([key, items])=>{
            items.sort((a,b)=>b.__ts - a.__ts);
            const label = monthLabel(items[0].__ts);
            return { key, label, items };
          })
          .sort((g1, g2)=>{
            const [y1,m1]=g1.key.split('-').map(Number);
            const [y2,m2]=g2.key.split('-').map(Number);
            if(y1!==y2) return y2-y1;
            return m2-m1;
          });

        // seletor de meses
        const sel = qs('#mSelect');
        sel.innerHTML = groups.map((g,i)=>`<option value="${i}">${g.label}</option>`).join('');
        curIdx = 0;
        if(groups.length === 0){
          corpo.innerHTML='<tr><td colspan="6">Nenhum atendimento registrado.</td></tr>';
          qs('#vazio').style.display='block';
          qs('#mInfo').textContent = '';
          qs('#pInfo').textContent = 'Página 1 de 1';
          renderMiniKpis([]);
          return;
        }
        sel.value = String(curIdx);
        page = 1;
        lastFilter = '';
        qs('#busca').value='';
        render();
      }catch{
        qs('#tabela tbody').innerHTML='<tr><td colspan="6">Falha ao carregar atendimentos.</td></tr>';
      }
    }

    // Top N helper a partir de arrays (tipos/materiais)
    function topNFromArrays(items, field, N=5){
      const freq = new Map();
      items.forEach(a=>{
        (a[field]||[]).forEach(v=>{
          const key = String(v||'').trim();
          if(!key) return;
          freq.set(key, (freq.get(key)||0)+1);
        });
      });
      return [...freq.entries()].sort((a,b)=> b[1]-a[1]).slice(0,N);
    }

    // KPIs do mês (sempre sobre TODOS os itens do mês, não sobre o filtro da busca)
    function renderMiniKpis(monthItems){
      const kTipos = qs('#kpiTipos');
      const kMat   = qs('#kpiMateriais');
      const eTipos = qs('#kpiTiposEmpty');
      const eMat   = qs('#kpiMateriaisEmpty');

      kTipos.innerHTML = ''; kMat.innerHTML = '';
      eTipos.style.display = 'none'; eMat.style.display = 'none';

      const t = topNFromArrays(monthItems, 'tipos', 5);
      const m = topNFromArrays(monthItems, 'materiais', 5);

      if(t.length===0){ eTipos.style.display='block'; }
      else{
        kTipos.innerHTML = t.map(([lab, c])=>`<span class="tagchip"><span>${lab}</span><span class="count">${c}</span></span>`).join('');
      }

      if(m.length===0){ eMat.style.display='block'; }
      else{
        kMat.innerHTML = m.map(([lab, c])=>`<span class="tagchip"><span>${lab}</span><span class="count">${c}</span></span>`).join('');
      }
    }

    // Lista filtrada para a tabela (mês ativo + busca)
    function filteredMonthItems(){
      if(groups.length===0) return [];
      const items = groups[curIdx].items;
      const f = (lastFilter||'').trim().toLowerCase();
      if(!f) return items;
      return items.filter(a=>{
        const alvo = [(a.tipos||[]).join(' '),(a.materiais||[]).join(' '),a.observacoes||'',a.local||'',a.responsavel||''].join(' ');
        return alvo.toLowerCase().includes(f);
      });
    }

    // Render principal
    function render(){
      const corpo=qs('#tabela tbody');
      corpo.innerHTML='';
      if(groups.length===0){
        qs('#vazio').style.display='block';
        renderMiniKpis([]);
        return;
      }
      const g = groups[curIdx];

      // info do mês
      const totalMes = g.items.length;
      qs('#mInfo').textContent = `${g.label} · ${totalMes} registro(s)`;

      // KPIs do mês
      renderMiniKpis(g.items);

      // filtro da tabela
      const data = filteredMonthItems();
      if(data.length===0){
        qs('#vazio').style.display='block';
        corpo.innerHTML='';
        qs('#pInfo').textContent = 'Página 1 de 1';
        return;
      } else {
        qs('#vazio').style.display='none';
      }

      // paginação
      const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
      if(page > totalPages) page = totalPages;
      const start = (page-1)*pageSize;
      const slice = data.slice(start, start+pageSize);

      corpo.innerHTML = slice.map(a=>`
        <tr>
          <td>${new Date(a.__ts).toLocaleDateString('pt-BR')}</td>
          <td>${a.responsavel||'—'}</td>
          <td>${a.local||'—'}</td>
          <td>${(a.tipos||[]).slice(0,2).map(t=>`<span class="chip">${t}</span>`).join('')}${(a.tipos||[]).length>2?' …':''}</td>
          <td>${(a.materiais||[]).slice(0,2).map(t=>`<span class="chip">${t}</span>`).join('')}${(a.materiais||[]).length>2?' …':''}</td>
          <td class="actions">
            <button class="btn small ghost" onclick="ver('${a._id}')">👁 Ver</button>
            <button class="btn small" onclick="imprimir('${a._id}')">🖨 PDF</button>
            <button class="btn small danger" onclick="excluir('${a._id}')">🗑 Excluir</button>
          </td>
        </tr>
      `).join('');

      // status pager
      qs('#pInfo').textContent = `Página ${page} de ${totalPages}`;
      qs('#pPrev').disabled = (page<=1);
      qs('#pNext').disabled = (page>=totalPages);
      qs('#mPrev').disabled = (curIdx >= groups.length-1);
      qs('#mNext').disabled = (curIdx <= 0);
    }

    // Ações UI
    qs('#btnBuscar').onclick = ()=>{ lastFilter = qs('#busca').value || ''; page = 1; render(); };
    qs('#pPrev').onclick = ()=>{ if(page>1){ page--; render(); } };
    qs('#pNext').onclick = ()=>{ page++; render(); };
    qs('#pSize').onchange = (e)=>{ pageSize = parseInt(e.target.value,10)||10; page=1; render(); };

    qs('#mPrev').onclick = ()=>{
      if(curIdx < groups.length-1){ curIdx++; page=1; qs('#busca').value=''; lastFilter=''; qs('#mSelect').value=String(curIdx); render(); }
    };
    qs('#mNext').onclick = ()=>{
      if(curIdx > 0){ curIdx--; page=1; qs('#busca').value=''; lastFilter=''; qs('#mSelect').value=String(curIdx); render(); }
    };
    qs('#mSelect').onchange = (e)=>{ curIdx = parseInt(e.target.value,10)||0; page=1; qs('#busca').value=''; lastFilter=''; render(); };

    // Ações por linha
    function ver(id){ location.href='/aph-atendimento.html?id='+encodeURIComponent(alunoId)+'&view='+encodeURIComponent(id); }
    function imprimir(id){ window.open('/api/aph/atendimento/'+id+'/pdf','_blank'); }
    async function excluir(id){
      if(!confirm('Tem certeza que deseja excluir este atendimento?')) return;
      try{
        const r=await fetch('/api/aph/atendimento/'+id,{method:'DELETE',credentials:'include'});
        if(r.ok){
          // remove do array all e reconstrói o agrupamento para não refazer chamada
          all = all.filter(x=>x._id!==id);
          qs('#count').textContent = all.length;
          const map = new Map();
          all.forEach(a=>{
            const key = monthKey(a.__ts);
            if(!map.has(key)) map.set(key, []);
            map.get(key).push(a);
          });
          groups = [...map.entries()].map(([key, items])=>{
            items.sort((a,b)=>b.__ts - a.__ts);
            return { key, label: monthLabel(items[0].__ts), items };
          }).sort((g1, g2)=>{
            const [y1,m1]=g1.key.split('-').map(Number);
            const [y2,m2]=g2.key.split('-').map(Number);
            if(y1!==y2) return y2-y1;
            return m2-m1;
          });

          // se mês ficou vazio, ajusta curIdx e seletor
          if(groups.length===0){
            qs('#tabela tbody').innerHTML='';
            qs('#vazio').style.display='block';
            qs('#mSelect').innerHTML='';
            qs('#mInfo').textContent='';
            renderMiniKpis([]);
            return;
          }
          if(curIdx >= groups.length) curIdx = groups.length-1;

          // refaz seletor de meses mantendo seleção
          const sel = qs('#mSelect');
          sel.innerHTML = groups.map((g,i)=>`<option value="${i}">${g.label}</option>`).join('');
          sel.value = String(curIdx);

          // re-render
          render();
          alert('Atendimento excluído com sucesso.');
        }else{
          alert('Erro ao excluir atendimento.');
        }
      }catch{
        alert('Falha ao comunicar com o servidor.');
      }
    }
    // expõe para onclick
    window.ver = ver; window.imprimir = imprimir; window.excluir = excluir;

    // Boot: carregar dados e montar tela
    (async()=>{
      await carregar();
    })();
  </script>
</body>
</html>
